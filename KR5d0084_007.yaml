front:
  text: 上清太玄集卷之七上七
  hash: sha256:c78f14bb5f5142df5af290c9a62d552e44ee4dd0c15580a979888921714108f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0084_HFL_007-001a, image: hfl/0731/0731-004.png}
body:
  text: 姑射侯善淵述七言全篇離坎交並合聖機兩條截路接天夷周天萬返龍張勢大地千尋虎鬥威趕退外魔除六害趁回陰鬼併三尸眉間索出蝦蟆劔一剪浮雲補漏池逍遙無事樂清間引鶴擕笻玩水山風捲翠霞橫碧嶂月輝輕霧達青巒洞前水迸珠千顆澗下雲凝雪一團瑩淨玲瓏光道眼神清清爽逼人寒鴻濛初闢二儀分始變三才造化根升降往來騰日月浮沉上下立乾坤飄飄玉屑空中降粒粒金丹逆上奔兩箇青童遊碧嶂抱鸞飛入太玄門訣然一性悟真宗頓覺心珠處處通繟奕純亨歸雅趣威靈精粹滌塵蒙雲收現出深潭月霧斂方生太古風無上遍知周匝界圓明獨體照虛空擘開混沌見天心日月精華塞太陰斗柄斡回天地匝法輪推轉太虛深交光迸出珠千顆混物迎將萬點金至寶不須方外覔頥神知覺道相任抱常知足頓元神樂逸安間養至真勦鋭除貪全可道蠲鋒玄覽换彝身外搜珙璧非為貴內滌琅函未足貧鶴馭風飊何處止洞中惟報四時新常存志氣絶囂華返照龍鄉紫府家恍惚元神冲浩氣杳冥真息放紅霞瑶池浪淨浮金蘂碧海波澄泛玉花香艷放開天地瑩凝空飛出夜明砂神火炎炎起艮山尾閭一撞出三關擎天大象空中繞混海蛟龍物外蟠凝結一爐天地髓混成兩鼎太陽肝達人悟此升仙去御易登真跨綵鸞斡回斗柄運靈樞大士門開一物無外抱一天元始道內藏兩卷活人書無中砌就千層玉空裏粧成萬點珠功行兩全超物外騎鯨穩步赴瀛都宏開慧目闡清眸兩翼神風趁日頭壬毋雲中乘玉象丁公海底跨金牛紅煙冉冉蟠龍閣紫霧重重繞鳳樓欲問此間何福地青童謹報是瀛州屏欲除情志篤堅荒蕪鶉野變芝田心如碧漢深潭月性似紅爐火裏蓮遊宴上清真境外徘徊元始大羅天中皇號我重玄子姑射神居太古仙陰陽顛倒是真修一泒黃河水逆流萬道素光穿宇角千條紅熖出山頭日魂皓皓隨方顯月魄輝輝遍匝周大闡威風開古道乘鸞按劔九天遊頥神頌性適真空子母完初機鬼神交遘透泥丸神鬼相交二儀太始須歸一三要之道六合同途在一觀六合同機九氣玄玄身外體九陽之道星流天癸象中端上機之道須憑總要師明諦下言之教了了重玄最上詮玄象頌恍來神化玉關開一點胎光降慧臺自有離陽精暐曄回光返本焰皚皚重玄妙指人難測衆妙之門愚不猜湛兮或存朝象帝抱將心月赴蓬萊育性頌惚去蟾宫育性胎潜龍水底沐丹胚須知守黑為根蒂自有靈華燭性臺混沌之中明太一杳冥不測瑩心懷堪遵慧魄陽生處灼灼玄珠自往來天瑞頌無為天寶自然然去智離形萬化先遺性儔空光遍照運神玄覽燦瑶天任教物我成虛幻自有星華焕目前海月含輝光萬道化成天瑞玉壺仙乾元亨利顯吾神五氣朝元用至真周易闢闔明動變萬機同會出諸塵隨機應處觀玄象終日乾乾與道鄰內外玲瓏通表裏靈華瑩我赴蓬瀛藏頭詩氣相交萬物亨然知睛氣煉真陰魄散覺海黃宫室道圓中太四入靈帝象通聚虛開返辰醒魂醉寶明門洞瑩山三斂霧澄又居寂寞近林泉碧溪千年苦行憑心正深三真妙體徒輕紀照混成仙飛化舉殷滿物煉裏然自合勤天有明耀兩生形無道行香子天地玄黃率化無彊太虛高日月飛揚龍磨星斗鳳熾玄綱見海神潮江神會谷神張焕焕煌煌照耀十方混三宫一𣲖流陽不離日用目下承當漸返真空歸真正得真常小重山陰陽顛倒一聲雷忽然驚睡覺夢中回迷雲拂盡慧光開隨風去抱箇日頭來溫養結仙胎空中明顯現越靈臺四維上下看蓬萊堪歸玉洞作仙才連理枝挫鋭無羞恥遇寵無歡喜好弱平常隨緣且過坦然無繫步林泉深入翠雲中樂清間一世欲要離生死達彼真常理煉氣成神神超碧落太虛同體任天寬地闊永無憂得長生久視一剪梅一箇塵勞一箇忙一自别離一得真常一天精秀一天涼一點清光一帶凝陽一氣相交一氣張一結神丹一命延長一靈透入一雲房一對金童一引仙鄉出俗輕枝翠嫩長不比松筠獨耐風霜歲寒心以表嘉祥小蕾初生壓盡群芳勿遣𡟛婷越粉墻儘任桓伊品弄何妨天然姿秀坼黅黃絶艷清奇一剪梅香訴衷情陰陽返復勿令差守正莫心邪常進藥爐丹鼎龍虎動三車收神水煉精華結靈砂水晶宫裏玉兔金雞吐秀瓊花一天秋色翠如描鴻雁囀聲高山秀水明相照煙樹映溪橋傾雪浪泛雲濤拂輕袍歸來沉醉直到黃昏月上松梢唐多令休恁苦爭儸人生得幾何奈百年有似南柯富貴功名俱遂意難免死生磨也囉隨分養天和陽生滿鼎多內烹煎凝結靈波煉就金丹光透體混一氣貫娑婆也囉歸來曲長生道日用在虛無一氣初分明動靜三才應化見沉浮玉兔趁靈烏轟宇宙一撞出昏衢光射三山白虎額焰飛兩道赤龍鬚照見夜明珠修行事割愛斷攀緣身淨心清明道眼內持無漏氣神全真汞煉真鉛安爐鼎進火任烹煎款款撈來槌作片團團結就寶珠圓身外化飛仙真常道日用遍三千大則包羅天地外小周沙芥亦如然物物盡通玄威神力混裏任循還撞破虛空七八片明珠滚出海鰲邊光接焰魔天忘俗念萬類悉皆空𣣱枕宵眠遊夢斷半窗明月一簾風迤邐覺朦朧披衣坐照見本來容靜室生白沖浩氣虛堂祥瑞現神功光射玉壺中江神子丹華虛托假形骸久沉埋惹非災冗冗蜉蝣都被死生催頓覺悟知亡彼我任空色眼中來海底金烏初出現碧天開絶纖埃密布天光光奕面前回交燦瑞童顔勝玉似雪映一枝梅聲聲慢人心剛硬不肯回頭深沉苦海淹留酒色財氣不捨甚日方休聞早尋歸出路樂陶陶雲水間遊無縈繫也無煩無惱無喜無愁漸入清涼活計抱天真純粹一氣和柔配合鉛霜攝化鼎中頻收迤邐金丹漸結後功成奪取仙儔堪歸去跨鸞鶴升入紫府瀛洲心浮易動熟景難忘驅馳鎮日忙忙已過中年有若日暮之光恰如殘燈怕曉似風飄敗葉凋黃最苦處歎星移物换人被無常識破尋歸出路向玄門懇切討論仙方付汝親傳寧心靜室消詳擬拭冰臺瑩撤現神光混入靈陽圓明顯得長生久視永劫安康韶光迅速似蟻循環往復不斷相連過了一歲不覺又早一年忽然無常限到向前程著甚推延修行事道他人有分自己無緣若也回頭省悟弃功名富貴物外翛然保養元精玉爐片雪烹煎恍惚乾坤瑩徹燦玲瓏日耀輝鮮三光秀混一靈真性送上瑶天忙郎癡騃不識人擡狂圖捏怪胡來執戇無智空恁亂覓胡猜口急虛脾厮䛭鬥無明馳騁竒乖强作壤把他人障閉自己沉埋若悟天機指訣叩玄關一擊寶洞門開玉姹金嬰出入左右相偎自然陰陽匹配向空中産箇仙胎真人顯越鼇宫日殿恣意徘徊剛强柔弱善惡分明天地報應不同濫濁榮家貞烈志德長貧清淨無為妙道被愚徒返謗邪門怎理會見修真上士有若讎人高道猜為賊盜把凶頑小輩却做賢人馬飾衣襟具禮曉甚卑尊太家學些打懂也胡來講甚人倫抹截了换雲袍簪髻搭箇頭巾賢愚間異曲直叢林清濁事急難分多少無知開口信意胡葷鵷雛呼為斥鷃把靈椿唤作朝菌便假饒是隋何陸賈辨正無門牛缺謾施仁義相肩吾鎖目自昧天真摸象盲夫晝夜曉甚明昏玉罄權為煮料把瑚璉假作虀盆最苦處爨瑶琴烹羽悮殺騏驎光陰迅速暑往寒來俄然又報新年物换形移都被暗裏催殘誰省人人越舊改青春皓髮蒼顔虛過了似落花飛絮逝水無還若也回光返照運靈樞一撞擊碎雙關耀海玄珠晞煌焰接崑山寶性因明貫體换凡軀養就仙丹玉辰顯向中天遊奕物外翛然南柯子未悟千般有心開一物無有無爭覺頓清虛混內傾陽一點透靈烏瑞氣盤金鼎祥煙玩玉壺玉壺金鼎煉神珠光璨流霞冉冉上天吳添字採桑子利名叢裏抽身早勸汝回心絶盡荒淫動有群魔當下擒莫教侵九蟲斬盡三尸滅與相任誰是知音清夜無塵月上岑望騫林减字採桑子嗟恨這形骸百般做紐捏狂乖如今省也尋歸路冰清玉潔昂霄峻鄂奚失俗崖心靜若冰臺靈光瑩不染纖埃厥然别有真奇妙䁎晟合璧升玄羽化脫下凡胎踏莎行混沌之中杳冥踪跡鴻濛溟涬初開闢洞虛一點太陽星神風氣象恢洪奕婥約冰肌玉嵓橫碧駭天驚地鶴一隻不惟出入太虛間京山撞透千重壁養氣全神至精堅固琅函濁質奚能悟心珠躍入太虛中玉嬰神變通玄户趕退金烏趁回玉兔凝陽點化升仙去清音香送别瑶臺真人醉卧蓬萊務使牛子精虧𩲸散魂游漾把天真變成虛妄逐境性昏沉苦海忙忙任流浪前程路嶮如何向勸汝等早修無上無上遍知明明照離婁焕師曠虞美人洞元一點天光密瑩淨如千日銀霞瀲灧貫寰瀛萬神攢簇恍惚曠然明空中産箇胎仙出婥約風飄逸撞開天頂上雲瑛寶闕瓊樓玉簿掛仙名搗練子說金翁論黃婆自然匹配煉沖和鑄紅砂滿鼎多神光顯照天河胎光一點出洪波現三清上大羅真鉛汞坎和離兩般顛倒自相宜煉金丹耀日輝通玄妙得幽微姹嬰常把虎龍騎上仙都合聖機四塊玉一點皎然冰玉潔浩劫無生滅跨古騰今無暫歇遍極目真空攝此法方知通妙訣玄理人難别兩路曹溪分關節映水照天空月又假裏尋真真本别慧照寥天徹瑩日晶空靈光攝印碧落凝翠色達此心開通妙訣物我俱休歇無了了時離生滅應别有長天月楊柳枝偃息團圞玩寶窺目無疵滌除玄覽似嬰兒正容儀欲問今宵何處也赴仙期滿船空載月明歸上瑶池內闡規函致本宗道相通寂寥常在混元宫悟直空上下觀之無一物與誰同逍遙獨坐月明中伴清風頓識圓明象易沖妙無窮祥煙飛入玉清宫月臨空物性自然純古道與誰同楊柳枝插寶瓶中好家風寶性完容上下沖內推窮氤氲三色射瑶宫焰飛空洞濟玉陽澄寶瑞自和同谷神翔翥混元中玩仙風孰見西明畫錦粧景非常煙波柳岸映斜陽水雲鄉咫尺家山人不到好風光步虛升入碧雲房洞天長鶴性紹紹望遠攀過潼關秋深雨霽乍衣單水雲寒爭忍昔年名利染早回還夕陽村落杏標間望家山丱歲飄蓬住遠山水雲間須知千載厭人間欲回還换骨脫胎歸舊路返童顔步虛升入古星壇泛雲鸞辭百師野鶴孤雲去復還欲留難斷腸恩愛兩情關淚瓓珊秋後凄涼歸路遠速躋攀洛西煙浦柳標間望家驀山溪男兒一志莫把初心退决正處貞廉把狂心一齊割弃隨緣任運雲水作生涯青松下翠筠中别有真滋味清虛恬惔便是余生計氣定自神和迸玄珠出離坎位殷紅璨璨髣佛入離宫通上下照十方攝境歸心地無夢令地水火風四大為你百端為害逐便各别離遣我法身輕快自在自在攝化超靈三界故友全無一信獨坐古嵓誰問回首返江鄉散瑞漂萍相近愁恨愁恨一葉風帆輕送愁對碧溪南岸流水落花無限回首帶晴煙道侣看看不見長嘆長嘆一葉風舟輕泛慷慨男兒潔列除此一無分别孤月鎮長圓混入碧潭澄徹凝結凝結清勝玉壺冰雪夜行船虎繞天罡吞鳳尾火輪轉艮山初起注鼎炎炎烹煎神水交泰地精天髓煉就純陽丹貫體换凡軀以别塵世鶴駕匆匆相從仙侣朝現玉清元始設誓明言衷腸話弃般般物情俱捨心口相違不分真假把玄門返成功價縱意為非難勸化業深大罪愆無捨寒夜風刀鬼神牽惹相汝怎生不怕迎仙客道非遙崑山隔宴坐神思密探𧷤箇中修非籌策一點晶金寶璨炎爐赫靈芝折蟠桃摘瑞氣通流盈紫陌玉童吟金童拍皓鶴青鸞間簇迎仙客洞天春二首道要仙機頓悟方知物物盡捐見本來一性衝開昊境朗如秋月清似寒泉湛湛澄澄纖塵不染出入龍鄉紫府天歸元處應無極太始浩劫之先混元一氣綿綿任暑往寒來無變遷似太虛微密無瑕玼任三災劫壞依舊安然是故空中無生滅自亘古常存不記年真常道是玄元聖祖萬代留傳剖判初分一變潜龍混開二儀見日精月髓凝鉛結汞陰陽返復虎躍龍飛否泰相交屯蒙復卦易象還亢出坎離純精粹焕童蒙奕羽瑩化瑆微大哉至道真竒又誰肯將心復舊閭鎮地鼇托出蒼穹巨際嵋山橫秀孤月澄輝海淨天空飛塵不到爽氣神清絶妙機通真路换凡軀婥妁順風而歸滿庭芳萬物之中為人最貴內存一點精微至靈至聖日用有誰知隱顯存亡順化方圓應曲直投機從伊變行居坐卧動止鎮相隨焕然光透體真人出現别有威儀玉簪朱履環珮錦纓衣寶蓋香車鳳輦雲瑛覆窈窕真妃仙音奏金童捧盞喫得醉如泥去質貪華還淳復古本源濁以徐清卑謙處厚能弊不新成知足無榮無辱彝然御非躁非輕還知否存亡得失進退若虧盈如斯全可道心中出屑眼裏抽釘瞳矇奕羽虛谷曠然明三氣氤氲密降純陽焕形釋心凝歸來處風恬浪淨明月照寰瀛玉屑琳霜雲瑛幽粹混沌三寶持盈盈還而已日月透崑明㪇抧圓通昊界氤氲降天寶華嬰於中妙五陵飛雪人在水晶城靈瑶開古道神風易御孰保遐齡念吾流久視玄坒終誠密付丹須换質從斯致遊宴華清金童詔玉辰宫裏身屬少微星西江月寂靜茅庵瀟灑危峯密鎖煙霞朝陽軒外一枝斜待客清茶淡話默坐翛然淨潔不占半點塵沙冰臺心似白蓮花長在西江月下迷覽千經亦少悟知一字猶多太虛鼎裏煉沖和養就玄珠萬顆順理徑遊寶界衝玄道上星河萬神聚會透煙羅一體無分彼我小隱不容沙芥大通遍滿諸方混然靈廓杳無疆一性執其大象火裏燒成白雪水中養就紅陽玉嬰神變跨鸞凰飛入西江月上不肯內尋諸己堅剛外覓多求傍門小法久淹流此輩難為拯救把似守株待兔爭如冒雪騎牛華胥國裏恣遨遊午夜能令返晝長思仙妙中玄汞和鉛進火功夫鼎沸煎靈砂顆顆圓內功全外登仙神水淵流逆上天輕乘一葉蓮道平夷性依俙水火相交坎與離陰陽自有期用華池浴琅肌瑩𩲸兒童天外飛靈光耀紫微月華池浴靈龜口吐祥雲化玉霓神光耀紫微昱朱衣蔽冰肌婥約隨風天外飛琳宫自有期棹棹楫鋭出玄精終宵末陽熖瑛華祛妖惡寶梵晶空通照過丹風秀萬靈無不可自然妙用無為作結角羅紋勿差錯朋儔那裏全無箇說與呵清風明月我玄溟精心從初末罔象恢恢司善惡暗察無私非失過真與假會盡都小可存亡得失由人作但向玄門無令錯退隱林泉誰與箇俗情無青山緑水我厭世憶朝元雲收霧斂天風潔顯出玲瓏月形釋心凝澄徹亘古無圓缺千潭現寒光攝洞濟溟陽哲仙丹煉就真歡悅異日朝金闕黃鶯兒歡喜歡喜漸得清活計透煙蘿湛湛圓明照蓬瀛徹底物外逍遙無拘繫任水雲霞際料家中指望還鄉我不去不去漁家傲一笠一蓑堪倚靠波光曲岸垂鈎釣醁𨣞浮巵自頻告高吟笑儘教人道漁家傲獨弄無絃琴一操箇中始覺知音少江月盈山空相照誰登眺蟾宫唯我親曾到上清太玄集卷之七
