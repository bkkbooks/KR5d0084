front:
  text: 上清太玄集卷之二上二
  hash: sha256:e0f91662ff6e199af56a4912b362be5f6abe07fb3a5b28de1be975f8074d16b2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0084_HFL_002-001a, image: hfl/0730/0730-038.png}
body:
  text: 姑射侯善淵述符陽論玉清聖境章第一玉清聖境元始開明無幽不燭象帝之先天無化不生易御之太素窮之無窮測之不測無名焉無形焉無形無名者故無不形名者也曰瞟奕瑆然環居而已天道覨而無不周心式苠而無不感往來相接睿質無方無方者是謂無不方者也暣顡不晟章第二暣顡不晟奚先賢之矩厥後傍門殽怋不正嬜叨進鋭孰以泠然悲夫大道故不蓁塞者哉曰玄子然覠得一悟而已象無昋奕始畫其恆至道朝夕而不已鮮無嗜欲𧖧息善鞠其命者歟瘞眪存亡章第三瘞眪存亡幽㒑之不相若矣生之死死之生生死之中孰能𥄱于正倫者哉俔曰惎婩於冥司所攝於玄子欲返其命玄子聞之笑曰斷汝之首奚能辨對傷汝之性孰為見聞惎婩鋭釋亮久而惺舍然大喜我今有悟御適頥殅之道者哉墿俁周方章第四墿俁周方孰契其政𥌛𥅪之不測唭㘈之無窮愢踈未失其體𡙐襲未至其真曰子䁴彝然開元合璧玩室精思政于惺臒者自適三明之道者也絧演嫴靈章第五絧演嫴靈間不可𥅞㝁悱富而至脦其福者施德於先矣懋漻貧而志懲其佶者惟福至後後矣及以存亡得失此一也彼一也玄子相若用言無不信之𥊴之不聰章第六𥊴之不聰𦖞之不慧明眲有期機由物障曰𢜱吁何然聲和音而物接空往來相聞奚能至晟者哉桃逸氏曰空之不空物之非物物物自然自然常然無不至然矣瞟然幽邃章第七瞟然幽邃如水制淵㴭然漻御御之則㽬適其道湛然象存存之則窫適其心曰憼氏瑩然如目撼水冰心非制其淵湛兮不動冷然遂通涣然虛淨者孰無測㴭溟者也御冠開常章第八御冠開常瞺聆隨化耽邃之䙷若顔瞀之忒惺寱同玄無不賴其真矣曰圓覯至明明之大訥媔奕至辨辨之不晟玄陽曰混合流明眩入一如一無不臻其理也應哲無窮章第九應哲無窮修耽不測測之無方者孰能衍之者也朚質機目能明而耳能聰也曔氏曰不然汝之心愠由瞀之不精曰晄然相若𥇓之至聰𦖞然相若䁩之至明玄子聞之笑曰觀彼用心費形胥失其道也吾之心非視聽者至於聰明者也非一形者至於多身者也然則不窮而極不為而成不行而至不匠而工無可也無不可也無能也無不能也挑達暀圍不可盡然至然無然而然無不然者也探賾神功章第十探賾神功奕象賾真剖分造化摶握洪濛臒𠖩制𩲸𥇓𢙅飛魂鼎耽精粹鋭逐眃奔靈古道愰達辰倫晶凝雲瑞寶璨氤氲日宫水宰月殿炎君極陽幽邃抱朴歸純光輝地户炳焕天門崑山傾液河海流津羣靈復命萬化歸根無用之用不神而神浮沉定體清濁自分頑嚚一輳哲睿齊臻虧盈成彼送故迎新瑆如玉輾眼若冰輪换虛易象御奕無塵含橫神暀浩劫常存通真論太始之初章第一太始之初先天地而生生化無窮為率性之主宰玄而莫測為萬化之根元皓然昛際者是為至道之精者也曰子䁇晫然奕遊水月之間非制有形换若窖圛之至泠然漺然㴭溟自適其道者歟政易元通章第二政易元通徯得劉純至精焉其神不能憮之至明焉其鬼不能𥋱之䠳奕致懋晤資靈眰慡然扃悱者無不俌於道也曰忠子不忒望軒移室棄室精搖其真有闓逼之正者也哉嘸然陽應章第三嘸然陽應心瞀之不精故懩幻之尤悇以至其殛矣孰能蔽焉知夫郭子詹公斯於高士暨乎太玄之憷雖遠千里之外湊晶瑆神奕飛丹之昈羽集臻源窮於大方奚為顡惢之情者哉𥉋奕翏伴章第四𥉋奕翏伴其道不為憂也𨶅然通之曪然入之大矣哉其體曠然無𢆶矣曰子烋敏邪耳能𥋞而目能䁩之非乎由瞀之至其惟聖人乎不為明𦖢至于神化者故無用無不用者也元一之肁章第五元一之肁玄坒中央神率化詡集𧖧方曰𧡹不空之空瞴不有之有神明焉道生焉撩於虛實者昛乎有無之理也曰魜制深淵無覗於上善鴁制其氣非理於真元嗚呼侄哉心目𥄱然奚能眐𥅞其道者歟道昶純精章第六道昶純精氤氲天瑞噴鬱瑛華芝蘭秀野碧桃金粟悅羣靈皆饗其禎曰目子懲然隺乎謹貌非瞟嫖之心永無癡𤶠之見復明𥌮𣌜之精其道曰可聖哉精微純皓章第七精微純皓熠叕張華摎摎之形奚能至明虛虍之容焉能政真曰䁘子惺然昂霄于衆象之諧暳然昛之率萬靈而自䐓之至上下闓𢤐期詁漻於正中耳神奕無方章第八神奕無方寂然之不動道闡無形奂然而遂通曰晶子睼之焉邇其𦖞聶士之聰非𥋱其精二子惢然未深其要曰覿近而不可親親之者遠矣瞀遠而不可踈踈之者近矣雖頑嚚哲睿未嘗逃於此者哉導億尋方章第九導億尋方極其悼慏兩奕精華由如列瑮之儀大闓古道羽升絳霄之闕臒子琅然奂乎天地之中虛白吉祥之兆非為目用目䴦之最明非無目無目蠢之為尚曰無用之用用之無形無化之化化之無象至於元象者由來尚矣迿懝生成章第十迿懝生成斯於至理曠然無心曰道純而不雜曰精皓然幽粹曰氣感而遂通曰神浮沉定體曰人主上下升降曰賔和氣流陽曰化神明象帝曰生導合真元曰溥精思丹體曰通九陽凝象曰玄玄之又玄玄由豫咇至於不可思議洞微論博善瞦章第一博善瞦拯於素靜暗也者希其聲者也明也者融其形者也輯䁻于常仁臸以矣惹於心聑者孰無正信者也俔曰諭元子景巨頂琨珸之瑩合為寶珏之光虛白盈奕至道之精與物不雜至道之元矣㦛睩常章第二㦛睩之常機遌容可故曰無可無不可者可道也非常非不常者常道也疏混物至理臱㝰聏聏以矣俔曰諭穆子周諟矐裕殅之精粹瑱德至純奚籲之有者哉冪䛿盈孺章第三冪䛿盈孺熙熙而以大矣哉宬天地之𧶷變萬物之愈物我非常我物非彼俔曰諭劉子通眮𢯼之貞鶴翯𢝌臸煢而𡧭化焕然覺粲者眐嫿𡣬奕之晟者也惎惟斫岸章第四惎惟斫婩覗欲迂心物㝁㝁奚之而㥴致偽者哉如雺霧之浮沉終不能成其雨露㪇抧而已政于䀖眽者歟俔曰諭李子正䜅壑承桃斃幻頥殅故心竀焉奕閎焉晟之粹者畀然以政于致殅者也侄邃精妍章第五侄邃精妍䁝之容債致矏𧰙裕致裕嫴靈暨乎真絧者乎天卶者也俔曰諭引子明䁵復逢於兕虎臨危而豫死之殅瞟然而䁻㦁然而通通機𠋝𠋝者仢約于太始之先者也天樞運𨷱章第六天樞運𨷱䁴𥊪臨中巨乎之聇者奕乎之聇者也曰乘天地之至精順天地之至神迪覯澄虛無不致其敒俔曰諭王子林䁎晟合璧仚敫盈虛肱肱至靈者諓致于少微之瑆者哉逯逯䫤舒章第七逯逯䫤舒𢞎叕朎朧返歟之䦯者窔然幽粹者也政以無靘者亦非𩆚𧡢者也曰著萬物之內處萬物之外德合神明嬛嬛而以俶繹含真御質還于象者上合至道之精者也俔曰諭張子華媔𢓜朎朧豈琳道與物不雜者自適忘形之德者也上清太玄集卷之二
