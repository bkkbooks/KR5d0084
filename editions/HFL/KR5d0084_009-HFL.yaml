甚處家童笑指寥陽玉牌金字號南昌别是人間天上不在瞻星禮月何須誦戒看經今朝與汝付叮寧生死須憑性命道啓遍知无上神通法界圓明不勞作用自功成志在无爲清淨莫戀金銀財寳休窺玉貌花容百年終是落頑空背了无生法認欲識玄元正理須明太上家風至神至聖悟无窮此箇逍遥自分割斷銅繩鐵網敲開玉鎖金枷波濤苦海遇靈槎遊奕无陰樹下不在忘標指月何須折桂拈花太虛鼎裏煉丹砂結就玄珠無價務本頥生至理迷源入死之機亡邪守正更何疑自有玄玄妙趣赤子嬉遊閬苑青童笑指瑶池西江月裏折丹枝保益精神久視漁家傲日照陽魂空中煉璇璣運斡天綱轉咫尺眼前人不見通一線爐開鼎裂天光現瑞散瓊花飛片片香風闇佛靈雯面冷淡清虛情雅宴眞堪羡玉宸翐御寥陽殿地魄天魂勤烹煉日精月髓情相戀兩曜交光如激電分明見玉爐萬朵金花現欵欵撈來槌作片團團結就玲瓏面晃耀太虛烹玉霰神光眩飛丹透入通明殿百歲光陰如奔騎浮華眩目飛塵隙玄覽滌除運神力通消息無生路上知端的霧散瑶瞳昇天奕陽光漸著純陰匿萬點靈砂晃虛壁明皪皪丹瑛一色符金碧混沌杳冥經寰宇彩霞散盡明玉兔西落咸池復迴顧心開悟凝魂晦𩲸金烏趣美盻扶彝寒光露氤氲三色淳清素直遇瑶天携女婺无點污丹書永繫琳宫住大道至眞无言詰韜光退隱蔵深宻保煉元精无走失隳陰質瑞雲捧出靈陽日照破昏冥威天佖混然恍惚空中實瑩淨純白相輔弼通眞一丹書玉笈仙功畢仙鄉子易遘自然軒軒外清華混物鮮秀嶺連雲飛宇角靈泉柳岸煙波接遠川德士隱幽玄玄覽滌除物自捐内適虛壇眞有趣龍涎寳篆輕浮弄素絃大道本無爲内外恬然處妙機寂靜清虛眞有味揚眉冷淡靈光處處輝婥約好容儀坐卧行居左右隨翼御中天成玉象无疑位列南宫現紫微祖道宻相傳得兔亡蹄守自然眼界寛舒明太易純乾日燦精華物自鮮恍惚遍三千預覺陵溪任變遷海底浪翻龍出水沖玄迸彩神光上九天祖道闇相傳始信宗風合自然動靜有无賔主穆坤乾上下周流日月鮮光奕滿三千透谷靈華永不遷空裏結成眞玉象昇天寳易童兒執素玄玉籠𤧚守清淨憑志懇絶盡荒婬持内境月透雙林玉童戲遥指處碧潭波心撈摝取水中金靈寳燦慧燈明神光相任對面有没人推尋君還省明了了災禍不侵龍虎伏鬼神欽滿庭芳斗柄迴旋紫微初現緬平一色淳清雲瑛搗盡天寶耀華嬰玉桂瓊林素羽昇玄御光璨流精泠然妙丹黄金碧煒燁化微星星徽清雅宴純風隱韻忘相忘形願吾流開悟心釋浮榮勿念雲山路隔高著眼莫昧靈明如斯理青童飛去點破大蘭城盥腹齋心衝霜冒雪爲求神寳精瑛憑君一舉眸子見青冥四朗天无浮翳冰輪坼懸象俱明辰霄館玉牌金字誰是繫芳名途中人自昧便心跂徑有悮前程迴聆返故久動復徐生寳梵仙宫路穩瓊林宴光散霞輕神功妙純陽煉就朝現紫微星聲聲慢公鄰煙水我弊嵩峯天涯杳隔難通悟理非遥目前不二清風寳月孤高洞鑒印千潭普照玄洞无彼我混華元仙景一體眞空如此知心志友更何須貢馬驛路塵紅念某形疲不須遠遠相躬稽首同流勿罪施寛慈意莫忡悅開青眼用神光體入不動之宗又元初一性甚處安排虛无恍惚中來受炁成形父精母血凝胚迤邐胎完降誕未成能長大情乖自作壞向途中役役慢惹塵埃虛使一生顛倒昧天然至寳萬古沉埋若悟生前通玄鼎裂心開混日凝陽純秀聚五方霞彩曛迴玉辰顯便忘形遺照直御瑶臺鑿開混沌撞透崑崙斗柄斡轉天輪曲岸烏蟾交騰走𩲸飛魂汞鼎鈆爐赫奕煉金精木液朱辰星光顯散中元一炁萬國霞絪瑩靜清無塵翳振山川林苑萬突璘璘高下無殊緬平一色精純對面料斯孰悟謾徒勞背覺合塵休嗔道似盲夫摸象悮失天眞滿江紅春花秋月古徃今來暫時間貴賤賢愚曾經换幾翻死生似蟻任循環咫尺仙鄉人不到出塵徑路如隔萬山省悟歸眞正恬然養素自樂清閑世事俱無染一身清淨無爲心定觀耀璧輝金向外看迸萬斛明珠推出二關太極宫中凝結内丹純風馥奕透琅玕萬炁周流歸一體千眞妙用情無兩般混入中元界笙鶴縹渺瑞炁盤桓玉詔符空碧名充仙舉乘車駕鳳鸞昂簪策杖賞月披風信途然抱一冲和養刀圭汞鈆金精木液潤華田宻固三靈歸火府五雲覆地光徹梵天虎龍交宇宙明珠奪得炁象涓涓寳霞輝日燦顯陽光赫奕返照洞玄混内晞𣈷晝夜連法萬象清圓與物爭鮮湛寂冷源常在目前无中瀲灧泛精淵九色黄雲籠沆瀣三峯青靄遠接萬川道備純精粹陰氛蕩散萬物生全寳象含靈質向六塵堆裏捧出箇瑞仙一葉舟萬象衝開寥廓元炁混然虛託海月晏晶金照天心睫外威神輝豁冰體雪肌婥約穩穩過瓊琳上瑶岑歸來曲修眞理何在鬥禪機廣念葛藤空厮䛭多叅功案緫虛脾爭似悟无爲開道眼一性出昏迷竹宻不妨流水過山高難礙白雲飛昇上紫霄微虛无道元炁自相和玄覽滌除賢士少合塵背覺俗徒多終日謾蹉跎開法眼一性貫娑婆瑩淨淨如秋月冷冰清清似泛瓊波澆溉潤靈柯浪濤沙訪道與叅師設誓投詞愼終如始謹修持退己進人常忍辱諸事寬慈訣破上仙機守正无疑持行元始玉清微慧日當空憑誰照星眼芝眉採桑子力與命相譏憑實見誰是誰非北宫曾謁西門氏須知東郭誠言信美養拙何疑俗輩匪能知啓賢英與我同規樂天知命隨縁過他年功滿神霄舊路有約仙期吾輩可傷嗟棄玄珠流浪天涯浮雲飛絮无根蒂便心岐徑隨他念起舉步偏斜聞早悟煙霞仙景裏也好前巴三山咫尺非遥遠長春玉館陵溪兩岸滿目瓊花翫華胥古岸蟠桃初綻新月素光交燦塵世幾人窺惟我留心高盻長歎長歎迴首遠遊仙梵冒嘯古風溪月晃耀太虛澄徹美目盻清圓不見又還重缺光接光接玉桂寒林冰潔訴衷情林泉退隱作生涯寂寞棄繁華中山翠微仙子滿目泛靈砂凝素液混丹霞坼瑶葩雲濤煙浪島外方壺那裏人家太虛寥廓杳无涯元炁混中華迴眸斡旋鼎鼐玉液泛金砂輝神彩迸光霞晃瓊葩雲收波渺海淨天空廣漠之家夜行船盥雪囊中無俗物恣踈慵有誰拘束不患虛名無榮無辱佻佻幾人相逐獨坐絃歌巵盈醁昂簪看斷雲相續池上遊龜洞前行鶴風月水山松竹可借芳年窮妙理中途滯教門無主道院凄涼故人踈淡那更暮天愁雨塊坐賔横空無語赤心訴有誰知委拂袖歸山碧溪深處說與落花流水酹江月寂虛妙道混杳冥恍惚通微清絶出化先天明象帝滿目流霞光屑濁質消亡琅函滋益寳鼎靈砂結丹華凝秀素玄一色澄徹精䁘㪇抧盈空清如秋夜海桂無圓缺耀古輝今沖晧炁滿滿玉壺春雪瑩日純精貞心幽粹保益眞仙悅丹書迎詔上朝三景羅列玄元至道大無隅寂寂寥寥獨立遍應諸方通上下極目天光微宻隱顯存亡穿无貫有善用無轍跡琅然泄化太虛一點靈質登林透入眞陽圓明普照不許纖塵匿理必期然仍未悟說與門人端的日殿祥光蟾宫瑞彩萬派瓊波益神凝形釋玉嵒依舊横碧南柯子瞬目迷千劫揚眉隔萬山一眞分瑞出雙關混入華元到此有何難隳質飛金翼疑陽透玉環惺然洗覺夢魂間雲去無心物外獨清閑决列心清操眞剛志氣眞超然不落斷常坑眼界寛舒焕焕照華清錦繡乾坤瑩玲瓏世界明澄澄虛璧頓圓成蛻殻精䁘一點碧天星厭靜曾居市嫌喧却住山通眞何處不清閑内外逍遥不備利名攀蛻質空中顯忘形物外觀二神凝素出陽關鶴性佻佻一去古長安紅牕逈玄門尋休胡覓指汝等修行端的常清淨意不浮遊保元精无失煉陽魂消陰質兩眉間神光飛出通斗柄斡轉天關抱一輪紅日棄凡情歸眞理擊雙關玄門高啓吐神光射透簾幃現靈陽妙體金烏精玉兔髓晃乾坤清華光暐紅牕迥昞曜圓明照蓬壺徹底點絳唇背劔携笻躡徑穿雲過青苔破嵐嶂松邊拂石臨溪坐酒飲單巵一弄清音和無不可孰與朋儔明月清風我秀色氤氲鬱鬱繚空廓光飛爍夢適吞珠一點胎星落謫降人間愧恨當初錯情消索誘引門生共赴青都約江月晃重山斗柄指迴一性璇璣斡轉雙關滔天洪浪雪華翻中秋夜江月晃重山獨步上星壇劔光横宇角逼人寒五靈仙子抱青鸞飛入華胥閬苑太平令芝堂無事啓丹經香煙裊慧燈明聲和流水玉音清雲收絶霧歛眄平一色瑶池淨洞天玄照瑞光凝分明見豁然惺迴眸返入道圓成便忘形羽化虛皇付我天符令武陵春太上混元眞一炁瑩淨若瓊琚清勝白雲不卷舒明見有中無冷淡靈光空蕩漾變現總無拘上下周流出六虛一顆夜明珠一葉梧桐窗外落金菊出踈籬策杖昂簮信步移迷我曲江池鶴駕匆匆歸舊路回首赴仙期雲映青童笑問伊家住武陵溪黄鶯兒呆老呆老幻夢惑迷一生顛倒甚每日皺著眉兒把身心作惱勸汝迴頭歸大道搜玄微幽奥煉丹光混入中元現玉辰容貌惜嬰嬌猛悟迴頭把塵事都忘了急收心速歸大道空裏尋眞向無中傳明教最好現丹華迴光返照探賾精微表天奕幽深奥明内外浮沉顛倒一炁雙關混百神分三要玄妙瑞雲扶玉辰容貌轉調採桂枝分明相外歸宗祖道眼俱全出入綿綿昇降浮沉任徃還最幽玄日精月髓安爐内一炁烹煎丹就凝然皎皎光明衮上天化飛仙望遠行太玄妙訣悟來不須言說心地豁然開覺清涼内通徹透五藴山頭現山霜天皓月照千古分明無圓缺赤子琳宫歇敏把丹枝折翫長春景界洞鑒離生滅向無陰樹下獨坐逍遥靜絶聽無絃曲調於中别上平西啓玄精明眞炁洞元中間日魂月魄相融内分三色混然一體若芙蓉玉辰圓鑒瑞雲浮光射瑶宫散陰氛凝純粹歸神化運靈空象懸明燦耀玲瓏中天遊奕鬱羅霄景玉音清絳節霓旌捧瓊輿寳梵仙風沁園春處世爲人德重恩深莫過二親始懷胎十月三年乳哺迴乾就濕多少辛勤長大成人心生五眼外姓調唆各令門誰省悟似鴟梟𧓄報應因巡休休枉恁勞神更莫忘當初懷哺恩念靈烏返報寒猿避箭誠心孝敬何况爲人諸事不違順承顔色飲膳寒温時用均存終始道光于四海德播清淳啓訴芳年猛悟迴頭縱情任眞棄父娘兄嫂妻男姪女孤雲野鶴二十餘春風瑞漂萍隨方安分一任交人笑我慵君休恠厭浮生虛矯省悟前身明知相外元神燦寳淨无瑕絶點塵易四時乘馭指天爲蓋地權爲載日月爲輪輾破星河衝開牛斗聚散浮空五色雲通三界現虛皇聖祖元始天尊滿庭芳糧畚擔簦雲山水陸遠途不避風霜爲求天寳與汝訴衷腸至理先明一性二儀現三殿恢彰玄關外臨空奕奕杲日布紅光群靈皆受命誰能保守玉府元陽萬神交燦九炁混中央結就玄珠一顆輝神彩光列南昌寥陽館華房出入齊唱滿庭芳上清太玄集卷之九
