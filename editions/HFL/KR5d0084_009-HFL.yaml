front:
  text: 上清太玄集卷之九上九
  hash: sha256:f4e6e1b09c3396aa851a16481994ca3273b200480536120ff311406a3ce8ce19
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0084_HFL_009-001a, image: hfl/0731/0731-100.png}
body:
  text: 姑射侯善淵述訴衷情中朝金國聖皇明有慶賀清平天元運周甲子正是好修行歸眞靜體眞清氣神靈玄門闡化太上眞風接引群生玉爐金鼎虎龍蟠紅焰滿周天温涼自然水火晝夜轉烹煎精鬱鬱炁綿綿養胎仙功成遷轉寳輦香車捧上瑶天愛河深處好抽頭名利繫人愁迴首去遊江上煙鎖一孤舟琴一弄酒三甌樂清幽風鄰月伴醉卧瓊林夢入瀛洲初開江月透雙林隱映素波深風恬湛然瑩淨清夜好知音白醪酒自然斟信時吟無縈無繫豁暢開懷一任浮沉逍遥無繫樂清閑信步且隨縁人來問歸何處遥指曲江邊楊柳岸半籠煙乍晴天瀟瀟清夜悄悄無人月滿空船一天清秀一溪雲風月近爲鄰琴劔酒棊書畫隨分樂天眞竹籬映草堂新靜無塵朝菌不見滿目瓊花間隔靈椿古今多少利名人棄命鬥爭功英豪盡歸何處都緫落沉空爭如我洞庭中遣家童金觥輕泛醉卧當軒一枕清風衆生薄福樂聲聞精進謹持功修齋坐禪禮念終久落頑空眞實相有無中好家風玄元宗祖太始門開體照圓通英公清列出塵縁不擊利名牽逍遥任居雲水知命樂天然窮妙理悟幽玄謹修仙功成歸去引汝朝元穩步金蓮神仙妙訣古今傳誰會此幽玄龜蛇自然呼吸玄牝炁綿綿鈆中汞汞中鈆兩俱全抽添加减進火功夫煉就胎仙减字木蘭花無情苦海壤壤衆生由貪愛爭似余家寂寞林泉别世華頥眞養浩肌肉冰清如玉貌出入无間婥約隨風飄上天深根固蒂天寳流霞光滿濟返照連天冉冉程程玄又玄无生无滅湛湛孤然明皎潔昕散雲寥點破清虛上九霄秋風浩浩極目霞琳澄瑞遶隔岸蘆花隱映煙籠三兩家天眞秀鬱謫降寰中光滿室保祐千春朱頂青松延壽同初心奉道謹守精嚴光返照元始扶眞眞物相生恍惚中凝空落落明月清風相倚託達彼無憂迴首煙霞物外遊五行四象戊己攅盈如何樣黑水紅雲白馬青牛兩下分金車寳輦大道夷然烹玉線碾路如銀般載嬰兒出世塵功名富貴致使沉淪空手去改面迴頭一失人身永刼休歸純返朴背境滌塵眞正覺一顆圓光焕焕煌煌入大方今生不悟指望來生何處去六道交加一步危亡永劫差君還識破塵世般般都打過雲水逍遥穩泛虛舟物外漂浮生苦惱塵世忙忙何日了一旦無常福致他人業自當君還省悟棄捨冤親尋出路萬事都休性命之中子細搜居家學道兩事不成擔閣了欲要修眞不染浮華半點塵虛心實腹只此登仙眞軌則功滿朝元金闕寥陽化羽仙婬聲美色底死謾生難棄捨艷態嬌妻兒女恩情緫送伊除情去欲惜氣存神如珠玉一點精金失了難爲復再尋長思仙出家人要求眞徧計長空絶點塵明知虛谷神日爲鄰月爲親天地之中轉法身方知物外人默然澄湛然清晝夜三光性自盈頭頭物物明道无形育神靈透海穿山混杳冥眞人出世程恣遨遊翫清秋掩映曹溪細水流瓊花兩岸頭滿浮漚飲忘愁日落星稀月上樓沉沉醉玉洲看清音見浮沉法眼星眸運古今紅輪兩間侵火珠林水眞金不比他方去遠尋承當認本心虎龍調坎離交神水涓涓注玉瓢雲濤雪浪漂寳池澆溉靈苗初綻瓊梅翠嫩摇芳菲物外飄道无邊性光圓認得龜蛇兩下纏陰陽合地天汞和鈆氣神全光迸流霞耀晃然方知玄又玄勿行功免勞神清靜无爲認本眞和光不染塵外其身自然人閑向天邊翫日輪雲遊玉洞春聚玄霜浸瓊漿二物調和火裏蔵烹煎滿鼎香味非常色清光嚥罷還純透體涼醺醺現玉皇既爲人勿因循百歲光陰有幾能虛勞染世塵好修眞養元神兩耀交光碾玉輪陰精一點純秘精精滿盈盈宻扣金關逆上行玄珠顆顆傾内靈靈外明明内外相交一點星飛騰上玉瑛南柯子煉質心猿退焚眞意馬疎一靈圓覺頓眞如洞達淵玄光鑒照元初坎虎形如玉離龍色似珠雲奔電激貫虛无霹靂峥嶸舞弄戲玄珠大道親之遠玄機退未踈太虛凝秀自如如一派靈源瀲灧貫從初北海鸞渝黑南山鳳染朱翱翔雲外出虛无日月交光奪取夜明珠匹配陰陽理嬰公伴細腰調和鈆汞要終朝水底金精移入火中燒煉就通神劔修成智慧刀降龍伏虎斬邪妖夜吐光芒誰敢語聲高鳳去飛還遠鶴隨翼羽臯石中隱玉蛤珠韜木長沉丁草秀紫芝苗獸變獅麟象蛇渝化海蛟魚分水谷變鯨鰲人道相通雲步越丹霄雨過春將晚風來又早秋百年光景轉頭休富貴榮華渾似水中漚勸汝修身早玄門志意搜勿交塵事擊心頭秘息三田莫遣賊人偷太上玄元祖生居浩劫先首初傳教五千言演正無疑誰曉此幽玄盡喫迷心藥誰飡續命丹邪門曲教自纏綿死墮陰囚永刼鎭黄泉踏破塵勞網衝天志决貞手中持劔轉環睛日耀爭光睒爍瑩天明覺海千尋底靈波萬里傾群魔消散鬼神驚點化純陽永永住蓬瀛欲問修眞理君還會得麽鯨鵬出海透星羅夜宿蟾宫飛上桂枝柯吉善靈禽少兇邪恠鵬多一群一隊謾蹉跎荆棘爲巢不見鳳凰窠坐看華胥景神遊翫寳方一雙童子抱龍光焕焕煌煌撮聚入中央産出靈仙子功成入帝鄉玉霄榜上應科場奪取仙摽寳洞執珪璋不曉身中寳寧知物外篇不通眞教亂狂顛指望蓬萊仰卧摸青天欲識鈆中汞須知汞裏鈆兩般顛倒自如然放出靈飛空外舞胎仙仙鄉子咄這醜形骸臭穢蛆蟲塞滿懷地水火風虛積聚沉埋類我平生惹禍災欲免死生催莫執凡軀作聖胎保煉琅膏凝結處成胚沐浴嬰兒坐寳臺瀟洒古音庭獨坐榰頥看道經玄覽滌除塵事冗安寧一洗機心耳目醒恬惔冷清清一炷名香滿院馨門外不知誰到此璫玎風順微聞玉佩聲獨坐看黄庭始覺身心内外明瑩靜不交塵事惱心澄固養靈源徹底清輕泛雪花烹寰宇空浮瑞炁生雲綻霜天明月照相迎一顆靈砂逆上行一葉舟擺脫塵情寃業此是利名休歇清淨謹威儀宴瑶池水靜澄澄冰潔顯焕碧潭秋月月裏悟丹枝性光輝不覺形軀衰老受盡許多縈惱誰肯死前休苦貪求識破修行早早認取自家珍寳珍寳價无酬永存留道契希夷恍惚辯正其中有物物物自然通盡包容月白風清滿目寳篆玲瓏馥郁寥落遍精空有无中頂笠披莎歸去漸入蘆花深處渌岸纜漁舟釣綸收輕泛壺中一味野鶴孤雲相濟横筦韻清幽樂无愁大道本无一物遍納十方沖塞无外亦无心不容針要見闡開清目認得本元虛谷非淺亦非深滿壺金大道孤然獨立善用本元轍跡寰海好雲遊翫清秋月色扶空澄瑞微現桂紅輕翠嘉景最奇幽賽瀛洲運動一陽初出照破太空微宻萬象緫潜形炫然明凝化鼎中靈質丹就刹那功畢仙子上雲英翫蓬瀛海底凝珠鮮潔天上瑩然清絶中道太虛寛滚神丹光勝一輪秋月照鑒本无圓缺清爽逼人寒透琅玕照海凝珠光爍貴賤不分彈雀可惜本來珍污泥津認取勿令差錯瑩淨免繁縈縳决正出囂塵翫長春顛倒一陽初起萬化混元同體光燦射瑶宫滿堂紅瞭正圓明開啓上下貫穿无底天地悉皆空太玄中酹江月貪財競色利名牽縈繫何時休歇鎮日忙忙如夢想顛倒心猿馬劣昧地謾天多能已會以巧翻爲拙萬般虛假積成宿世冤業勸君省悟迴頭攀縁棄捨做箇逍遥客訪道求眞尋妙指早願超離生滅不悟玄機剔開毛塞付耳親傳說壺天景色現前秋夜明月幽微精粹混陽光一點殷紅清絶上下融和開慧目躍出心珠凝結闡化靈明神光顯現内外相通徹浮雲消散放開天外心月虛无運轉孤然圓明寂照萬古无纖缺與道同元包象法物物頭頭俱攝遍應諸方无極太始混一无分别古今賢聖盡歸此處休歇玄元道體大无方无隅无形无物濕化胎生皆受炁感應通玄潜伏包括乾坤含容天地日月皆收蓄迴光返照曠然攝化盈目分明頓著心珠沖虛豁朗燦燦開神谷養就胎仙肌貌雪出入隨風香馥暮嗅靈芝朝飡仙桂夜隱蟾宫宿怡然懽樂求同先聖眞福長江素靜夜瀟瀟天如玉案冰潔秀色氤氲寥象廓極目瑕琳光攝獨坐頥神簾幃光透顯出玲瓏雪凝然澄湛太虛一點通徹神飛兩翼翱翔蟾宫殿裏夜宿瓊枝歇得遇眞筌无損益永受眞人提挈功行雙全金童玉詔受命寥陽闕玉霄宫裏永排仙位羅列茅庵瀟洒靜无塵獨坐垂簾孤僻鎮日閑閑清澹泊别有恬然活計握固存眞心无雜念忘我兼忘世玉嬰神變自然與道相契光明照耀十方凝空燦燦大闡非爲細遍納无極通造化物物頭頭俱濟掌握乾坤完容法體玉貌眞清麗超凡出世上朝三暻神帝浮生似夢奈光陰百歲都能幾許富貴榮華時暫過剛甚厮牽厮繫緫爲兒孫嬌妻女婿生死難爲替迴頭省也瞥然不染塵翳逍遥物外无拘風鄰月伴便是余生計石上溪邊猿送果酒滿十方吟綴醉卧煙霞今宵還醒意欲歸何致玉霄宫裏月中攀折仙桂一天清翠混陽和微宻寂寥无物致靜頥心開上竅通化靈明虛谷育養元神眞人出現放曠无拘束皇天道父賜余无限清福天心正法盟威紫虛道德上品三乘籙金簡玄科封慧劔心印清光无欲己病先除心邪攝正百恠皆潜伏不繁法信自然被褐懷玉无形道體運陽光宻布通微恢鄂炫惚昏衢烹浩氣沖塞英華盈落瑩日千尋清風萬里顯焕神光爍夷門羽化太玄一派靈廓孤然脫灑无雙於中清淨不許纖塵著養就胎仙神貌雪出入无間婥約紫府遊行瑶宫飲宴賜我逍遥樂金童捧盞妙音引上龍閣初心奉道望功高仙舉超騰碧落歲久年深心反復不覺情迷縈縳伏虎銅繩降龍鐵索繫住踏雲脚難爲出路永沉千丈寥壑臨危受苦推誰情无决斷悔恨當初錯意欲修眞名利惱酒色財氣俱著家計不成修行退墮至死无撈摸勸君省悟免煩兩下擔閣太玄正教離繁華修整眞清眞靜清靜之中開道眼舒展銀霞流井溢落精空沖盈法界滿滿收金鼎烹煎日月混純天地齊永寂寥獨立无雙孤然不改萬法心俱省變化飛昇朝上帝返入清陽眞境不夜長春神仙聚會授命靈童請玉嬰吟送一盃長壽酩酊滿庭芳靜室頥神寧心默運内觀一點眞陽洞虛豁朗焕焕透明堂照見虛空法界先天地獨立无雙三光秀圓明實相浩劫應時長迴頭誰問己眼前頓著不用思量自然契道物我兩俱忘唯有清風皓月通神化无極之光昇玄路混元一炁拍塞徧諸方祖道无修眞常妙用悟來表裏相通靈光現處照見杳冥中晃耀清虛浩大无遮障拍塞冲融希夷甫從來面目返本復歸空眞空明皎潔唯然曠大難測難窮一天吾道寂湛出凡籠妙化方生正祖通元首返本歸宗超三界移神脫殻物外顯陽蹤太極精微天眞鬱秀混元溢目无涯玄珠升降輝耀迸光砂聚入壺中託化歸眞正不染囂華迴頭省清虛妙體返照秀靈芽汞鈆凝漸結純陽丹就永劫无差一瓢春醖三尺斬妖邪信步縱横自在龜鶴引深入煙霞逍遥處長春洞裏時復翫仙葩海角天涯尋朋訪友悄无一箇知音闘爭人我財色利名侵聞說邪婬妄語𢬵身命一向鑚尋眞常教余言直勸返報怨還深休休寧奈也澄清默運攝養眞心混元一炁昇降定浮沉迤邐收歸寶鼎純陽就點鐵成金通玄妙群魔消散方顯鬼神欽迅速韶光俄然過了筭來剛甚劬勞紅顔衰朽緑鬢漸踈焦由自爭名競利全不念生死難逃輪迴處似環螻蟻來徃幾千遭君還心省悟明通周象撥易窮爻地天通泰離坎自相交陰返陽生運化純精粹清炁沖霄胎光現神風綽約飛步翫瓊瑶臘正風交瓊梅初綻水寒冰潔嚴涼雀臨高樹魚入碧潭蔵海淨天空浩浩玄珠降睒爍凝祥胎星現清名播世道德自昭彰群仙皆喜聚壇前謹謹祝壽玄陽金虬浚液玉獸旋噴香唯願遐齡滿壽同天地永刼延長昇仙處鸞迎鳳引雲步現虛皇獨立星壇高穹仰望志誠修設威儀名香頻爇謹謹奏青詞唯願衆生慕道心通解无執无迷歸眞正玄門隱宻一志永无移都縁心返復狂圖捏恠紐班胡爲色