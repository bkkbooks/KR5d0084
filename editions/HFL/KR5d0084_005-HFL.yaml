front:
  text: 上清太玄集卷之五上五
  hash: sha256:0877150cdd878b79670b9da7ba78e331faa9b63e4a71d840f8d301148a6f5ca5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0084_HFL_005-001a, image: hfl/0730/0730-102.png}
body:
  text: 姑射侯善淵述七言絕句崑崙頂裂火龍飛寳晏天光耀紫微一顆靈砂交煒燁方知道力有神威瑶池宴淨日輪孤照破塵寰一物無寂寞太虛誰我伴水晶簾映夜明珠金明奕奕瑞雲浮瑩淨琅然點垢無藴素二神通一象翠微仙子妙功夫一包紅露滴芙蓉潤澤靈苗出太新小蕾乍開凝日笑東君還報一枝春神奇臭腐兩虛名患世浮遊寵辱驚爭似脫胎歸未始免交俗眼顧相輕三尺龍泉夜有聲斬邪誅魅擅通靈含光不染烏蛇血飛上瑶天化玉瑛二氣交宫守正陽陽光寳璨迸玄霜生天生地歸元祖獨立寥寥象帝鄉寂寂虛堂半掩扃神光迤邐内分明直饒月落咸池口猶現寒林數點星一輪杲日出踈林皓氣盈眸得意深悟入大全明可道象玄飛去碧天心外抱甲龍離水殿内驅庚虎入炎宫煉成一物純精粹𣌜御天元太古風坐斷羣機萬慮忘内澄心適頓清涼凝陽隳質陰消滅不覺神遊北帝鄉慷慨男兒志氣剛便充仙舉應科場鎮鎁劈碎崑山頂迸彩玄珠混玉陽虛心心適悟希夷更有玄元上上機雨點谷神飛月殿一天星彩潤芝眉鉛華金鼎瑞雲浮煉就無餘照海珠一粒亮能通法界九天光散入清虛蒼龍老虎媾紅爐玄牝丹風任吸呼灼灼焰輝三昧火明明照破舊昏衢二神交燦入中央點點泠然混玉陽玄象著明韜晏闕玉樓深瑣碧雲房閑騎白鹿翫瑶池悮入蟾宫折桂枝大梵巍巍唯有象便移星彩潤芝眉寳精童子採蟾華焰迸飛魂放紫霞混湜逆流霄漢外不須煙浪抱靈槎德厚先生貌若癡内容無血化冰肌頥然妙覺歸元象昇入中天謁紫微梵氣輕浮混帝先丹光昶奕亮通玄玉晨不假茅齋力頓覺虛飈執素天蕩蕩茫茫萬象初天元一氣混清虛玄陽普寔含靈質盡化無餘五色珠黑汞紅鉛化玉瑛潤眉金碧照玄精寒林寳桂靈砂結粧點琅玕散瑞星握固存神入妙機男兒一志永無移煉開天鼎心珠迸冐雪童兒翫玉溪黑水紅霞照碧天蒼龍老虎入閭淵相吞海底靈鰲髓迸甲驪珠顆顆圓列鼎魂遊混太蒼蒼吴夾夾焰飛颺三元宻固歸乾象宏佖無隅入大方瑞氣祥雲滿目生一天眞秀化丹嬰靈風不逐楊花去飛入炎宫伴曉星因出陽關舊路行聆然四顧任縱横精瑛非作占泥絮衝破長天一點清混沌元流梵氣昇通天惠日甚分明靜中一鑒憑誰力降落玄珠晃太清天風海日耀華清上下流金散寳晶叩道廓然光杲杲移神輝焰眼惺惺梵氣周流混百川威眸一顧泛靈煙雲山高枕華胥夢非欲長安市上眠紅日半含山色翠碧煙一抹水光微錦鱗不釣空歸去千尺綸絲安用爲撞透海門求罔象衝開虛谷索玄珠天庭至寳誰堪付說與人間大丈夫一醉人間四十春忽然驚覺夢中身忘形自有通霄路昇入南宫列玉宸寂寂虛堂半掩扉碧桃紅杏出踈籬南軒一枕春風外不比莊周蝶夢時倉角霧收紅日瑩江隅煙歛碧天清忘形逸士心通快冐雪神人眼界明昨宵獨坐夜更闌内守丹爐四體安恠得隔簾踈影白蟾華奣奣耀琅玕乾元太易妙含宏煉質流金紫氣生家有瑞童凝日笑一天風景爲誰明妙啓朱扉碧洞開五靈仙子任徘徊龍煙篆出詩千首琥珀量斟飲百盃恍惚魂遊太一家雲煙飛篆走龍蛇天祥以降人間有萬點流精混物華遠接瑶天近在眉象含天質妙清微始曾探𧷤歸元祖大梵寥寥化玉霓形槁心灰篤志堅抱神守一自遐年延齡不必長留世别有壺中日月天土釜怎煎金液沸石潭無底混周流驚天波浪沖牛斗獨駕虛帆一葉舟蔽蒙癡子内團海眼明明向外看游奕丹天精瀲灧碧眸微覺素光寒宵眠晨動兩忘情漸覺沖和上下昇蒼角半含紅日瑩嵋山一帶碧天清昨夜三更月色鮮玉霄舊路尚依然放開千里縱横目萬象由來一鑒圓瑞散丹光耀碧虛鉛華點點潤芝眉靈童有意趨陽館却逐鸞輿鳳闕飛結汞凝鉛煉玉霓化肌無血貌星徽超然一舉昇天去寔賴眞風道力威滿目陰氛盡化陽朱砂鼎裏發鉛霜烏蛇倒吸蒼龍血象適無形夜吐光亘古由來是客塵不知何物作天眞門生役役空相訪圖見今時未見人崑山風浪起瑶池吹綻瓊花處處飛晃耀太虛生瑞彩精英流散九清微地𩲸天𩲸日月精眞陽赫赫燦然明神風混裏歸三氣三復重生一點星保煉先須制六情惔然守素道之生羽山風味誰知意雲去無心月自明三元神秀氣綿綿五色瓊葩耀九天天瑞混成眞一象象玄飛入太清淵炎爐赫赫焰飛颺沸鼎濤濤迸玉漿寳運丹風盈秀目萬神和暢自清涼北溟南丹自有期二神倏忽造天機共謀一報渾淪死七返圓通出舊閭鬱霧妖氛透膽寒冥冥黑卵出泥丸神風一掃中天淨承影含光血不班洞元眞秀混清虛赫奕金丹耀九衢既把胎神歸一體内含靈質産玄珠層層薄霧徹丹霄咫尺丹霄路不遥大地連天芳草際神風迴化玉芝苖無垢清虛日一輪照開天頂駭人魂適然不覺忘形去遠繫靈陽過海門道德玄之玄又玄玄通地接未生前丹風吹透流星眼飛入華陽太一天一道輕霞透紫煙禹餘風息草綿綿日魂預覺靈華秀照破丹丘露出天倚松登望玉華峯冉冉巍峨數百重月魄日魂相間隔中間上下貌童容蟾華皎皎瀉銀河遍照乾坤皓氣多點魄益魂明太素化成仙子上天羅北溟煙水黑滄滄傾入炎宫赤帝鄉因此浪清龍睡穩黑鉛盡化紫金霜水國龍淵照海珠夜冥寰鑒若瓊酥無鞅仙子雙睛瑩正見瑆娥上碧都鳳髓龍膏滿國馨璨然凝結照環睛睛空别有神分彩一顆金丹耀太清内測玄中更有玄外捜天上復生天仰之彌遠無窮處不覺魂飛象帝先默默昏昏道未全劈開混沌見重玄自通九五藏諸用杳杳魂飛十八天自然之道本無形執此無形亦假名認取一輪晶赫日通玄始覺太虛明玄元大洞藏靈寳太上虛無隱内眞欲識本眞何物是不神而神所以神我本閑吟天上詩休將下法亂猜疑與君直指修眞路道接靈眸近在眉撥開寒霧露蒼穹海月澄空萬象通獨立寥寥孰配偶丹嬰遊奕襲天風神風役役破雲英洗出霜天氣象清方見玉岑孤月冷射開玄鼎豁然惺昔年昏昧心源閉今日分明道眼開喜見碧天如玉案雙輪碾破白雲堆斡轉玄關氣象迴靈烏飛過碧天開一眞頓啓雙眸瑩認取朝陽寳鑒臺一輪清日光寰宇兩點元精耀谷神寳益洞靈天癸秀瑶華開遍玉京春玉清元始大羅天氣象雄雄出帝先面啓紫微金闕内丹嬰遊奕貌華妍日精童子貌翛然羽蓋瑶華覆紫煙因得玄陽開寳鑒玉辰飛入太清淵兩刃霜鋒耀太華劈開天頂迸龍砂丹陽萬點純精粹盡屬元君紫府家浩氣融風透碧䆫翛然塵跡混眞陽玄同一體忘機止責互神輝鬼自亡金碧清兮玉華飛丹英秀兮紫雲歸雙童採兮過寒溪得不得兮誰得知神功有法煉刀圭鉛鼎温温火力微不假吹嘘並著力炎爐自有雪花飛一洗塵縁萬慮澄移神入海化丹嬰華元仙子相呼唤笑指雲深翫玉京雙鳳迎仙入翠微紫煙冉冉昱朱衣玉樓引動香風處吹得金花上下飛移神獨步入清虛瑩淨清虛點垢無换礸琇函精亹亹射開心鼎照冰壺内明眞性外通玄玄照陽關道始然内外惺瑶清珏珏交光飛上玉京山洞見靈瑶象易空混元直秀奪天風崑崙一𣲖西來水瀉入寒潭萬丈中放開一點混元精洞濟冥陽暗裏明不是玉嬰遊紫府靈宫爭得遇三星劈開混沌見龍光出入朱扉納桂霜因得五神明太易金丹一粒奪天常丹鳳煢颺下桂柯瑶池終日飲清波釋然忘却雙關意一變玄珠上大羅靈音飛出杳冥冥一覺香風入夢清闡匹雙關通古道玉霄親遇少微星屏絶塵縁萬事無無中方見混元珠亡形易象歸何處冉冉隨風上玉都仰象明玄宴碧鄉流鈴擲火入中央洞元一點天風秀益我三陰變九陽修行須下死功夫换質留眞體太無晦魄益魂金宴闕洞玄還照玉清都瓊梅初綻逐東風飄渺人間處處通有似月娥離寳殿全如仙子入龍宫孰見瑶池潄玉泉鳴瑯駭𩲸始驚天陽魂逐盡流鈴火夜適微星啓素玄不欲塵寰作計生佻佻鶴性憶東行玄門始覺知音少惟有靈嵓依舊横偶步南宫謁帝迴劔光飛過寳山摧傷嗟無限蒼生目不識蓬萊閬苑媒天韜晏色眞風瑩内襲龍光海上飛金洞美氤三疊疊玉神姿秀兩儀儀一輪皓月照清微水國神林映玉溪爽氣逼人侵骨冷星河猶自浴冰肌芝堂羽客話眞機直指瑶天路不迷清眼不交雲翳障玉霄筵宴貌星徽日月運移天地瑩神光交辮太虛明達人到此觀其妙易遘天風滿國清異俗移風出物情泠常一點湛然清含光默默融天質始信神功道可惺劈開混沌金烏窟撞透崑岡玉兔門不用雙瞳明法界故將一目照乾坤太玄清兮月華飛無極光兮日精歸芝蘭秀兮生玉溪神功採兮誰得知五言全篇劈碎崑崙頂眞元入杳冥一爐丹鳳髓兩鼎赤龍精五岳祥雲起三峯瑞氣生放開天眼照宇宙廓然明虎嘯風生壑龍吟霧滿垓瑞浮清宇散焰赫碧天開一馬投金礦雙輪碾玉堆象玄唯我索留意在天台銀蟾出素林下覆曲江心皎皎星河淡澄澄覺海深一聲雄虎嘯萬壑牝龍吟警覺靈眸顧交光玉間金塊坐任縱横灰然物自生炎天數九後日午打三更木馬火中出泥牛水底行不知顛倒意有眼恰如盲太上玄元祖生因浩劫時乾坤明宰輔日月闇扶持浩浩施仁德巍巍闡大慈萬天都教主歷代帝王師昇玄翫桂林瑶花覆五陰月影青童戲雲中丹鳳吟霧散星河淡精凝瑞彩深飛仙遊奕處宴坐碧天心渺渺大羅天玄中更有玄杳冥三界外恍惚五行前上下通周匝縱横出物先欲窮窮不盡萬古獨綿綿乾元合聖機至道不思議日海華精聚星河翠色輝龍飛離碧嶂虎走出寒溪聚化丹砂就相將謁紫微步虛入中華窈窕翫仙葩北帝蔵煙靄南冥放彩霞金童扶寳鑒玉女散瓊花側聲敲寒月靈音徹帝家悟入古音亭灰心萬慮澄風吹清夢覺月照醉魂醒赤帝離金鼎青童入寳瓶雙精執大象並化少微星風息乾坤靜雲收天地明澄澄秋月冷湛湛素波清寶桂留三性瓊林散五星玉辰濤雪浪遊宴水晶城太一含眞象靈臺秀玉肌精蟾凝碧嶂惠日化丹池晦𩲸盈環照冥陽合太微三華壺内秀暐曄鑒容徽澡雪香肌瑩籠精啓道經靈壇敲玉磬仙苑步虛聲寳篆飛天上星光下太清玉霄金榜上一一掛仙名獨坐松陰下流泉滴珮聲劔光飛日角寒霧瀉天庭玉女遊皇甫金童翫赤城眞人乘白象朝現紫微星混沌二儀分豁然露太空霜天凝寳鑒寒露滴芙蓉罔象求珠瑩精瑶拔萃紅神交靈珏照光透玉壺中玉樞隨斗轉金粟運神功海島龍吟霧天元虎嘯風星瑶天骨瑩慧照日頭紅混理明三素交光射寳宫青蓮浮碧沼黄鶴下幽庭水谷雲根靜瑶天氣象清空中琴韻響晴外雪花明慧照氤氲散靈童翫玉京洞玄開寳鑒玉户照金池蛻質遊天奕頥神入太微乾坤相否泰日月自然隨心鼎瓊花綻靈光燦日輝一悟太玄機崑岡列二儀驪珠光海島罔象照天池雪浪烹金液雲濤化玉肌忘形心適外遊奕化龍夔六言絕句玄精出乎衆類幻釋凝祥拔萃至理易俗移風運化靈陽天瑞蕩蕩十方道祖巍巍三界獨尊追薦靈魂授度啓兹元始勑文道太清虛渺邈神通寥廓無邊一點靈光出現昇玄遊奕丹天碧海輕浮丹桂泠源泛出瓊花飛童啓兹妙理玄靈立御昇霞元始帝一先天勑文受命沖玄寳益丹風途順玉辰宫裏飛仙青嶂日魂玄照眉間慧鑒精通黄甫三元翼御素天一色純風日照冥陽洞濟風吹頂裂天開滿國龍光迸彩神功兩翼徘徊昨夜雲收雨歇現出玉峯寳月靈飛混入中元萬派陽光照徹崑山一泉金水周流泛出瓊波本性盈虛處下沖玄逆上星河妙哉玉洞長春其中遊奕仙眞易性金堂羽客忘形送故迎新至道生天生地中流日月經盈運化四時成象混合一性高明道太無邊無際神遊廣漠之