知心無垢膩識性絶塵埃介月光三昧孤高照八垓曠然無動靜頓見佛如來員老宿問頓悟端坐覺朦朧澄澄佛眼通雙林穿皓月鹿野透清風瑞氣蟠金鼎祥煙篆寳宫太玄開正教隨化悟眞空牛老仙問金烏降落尋戊己金烏尋戊己玉兔見壬庚混物心珠燦凝空慧日明澄澄天地秀湛湛太淵清始覺乾元象沖和養至精小張仙問陰陽造化日月飛騰降天摇轉斗星龍吞金鳳髓虎飲玉蟾精鼎煉神丹就爐燒大藥成病人還入只無限鬼神驚題僧道同齋同會赴修齋欣然喜滿懷僧談般若路野客話蓬萊大道傳心印禪門法性開混然飛皎日光照射瑶臺和遇長老上善無嗔恚修眞豈用强知心衝昊景達道立玄剛照眼神通室明空入太蒼疑珠含寳月日用得天長李仙問京山永晶堂燦爛水晶堂玉蘭滿地粧白雲穿碧嶂紫霧照金光焕焕凝神室煌煌出洞房不因遊此地悟我入仙鄉勸門人十首眞言至訣貞何必懼人情指引清涼路提携業火坑不圖君子重孰怕小兒輕語嘿依天理忠心化普平學道戀居家年深事有差口頭誇淨潔心上鬧如麻酒色常增長氣財日轉加勸君聞早悟隨我卧雲霞人我太矜誇於眞返作邪狡心如兕虎狠性似蚖蛇好色非修道貪財豈養家兩般焉足正舉步有參差數年離慾海今日戀繁華未免孤槍苦還遭兩股杈不明飡異果暗地喫冬瓜棄慾重增慾離家却入家清秀艷風光妖嬈玉腕香柳眉星眼劔嫩臉絳唇槍錦帳爲牢獄幈幃建法場雖然頭未落損氣敗精堂嫉妬轉生嗔邪淫性不仁終朝迷酒色每日戀紅塵猪狗常爲伴狐狸日夜親色心猶未斷何幸論天眞說者飛龍前行之跛鱉後修山果未成作業功先就貪淫似野禽好色過山獸常作畜生心勿思天地祐學道無剛烈空將巧論舌常存意馬顛每使心猿劣暗地色情魔人前誇淨潔虧心業報深有日天公折口辯說奇功常居酒色叢未能通聖教自己立家風性染紅塵裏身居火院中臨危一念錯永劫墮沉空眞實又何曾虛脾鬥葛藤自知巢斥鷃豈見海鯨鵬行短誇機巧功虧衒己能不因多諂詐惡業萬重增盡在玄元祖都歸太上宗頭頭皆受命物物緫相通包廓乾元象含容太始中欲窮知古蒂認取五明宫河中府張六郎問神氣精神光眩物明隨化顯眞形湛湛青霄月澄澄碧落星杳冥歸紫府恍惚入黄庭至聖無窮測通玄萬化靈一氣始初分隨機四序通冥冥天地匝默默太虛縱升降分清濁浮沉定祖宗含靈皆受命無物不包容混沌杳冥精交光燦日明乾元知有象虛谷見無形純粹凝心鼎陽光混寳瓶含宏天地秀焕焕照華清贈牛殿試道號通亨子字國祥國祥呈瑞秀善利寳通亨霧歛金烏瑩雲收玉兔明三天居淨境四海播清名道德俱全備移神入帝京入定觀想十首極大寧心觀明知造化權日魂衝霧靄月𩲸趁雲煙照眼凝心瑩頥神混物蠲洞元光皎皎悟理達幽玄極目凝祥觀神遊天地通嬰兒離月殿姹女入辰宫同會香幃裏相邀錦帳中水晶簾下坐照見玉芙蓉剖覺開元觀明同日月長細微窮莫測至大妙無疆率化千功著周滋萬物張明知有造化誰肯細消詳日出扶桑觀方知道眼明觀天天本靜察地地安寧際物非無象凝空豈有形臨機相應對一體見圓成心目通眞觀通眞在目前兩條光徹地一道素衝天月照澄輝瑩星臨靜皎然若人逢此法立便化飛仙慧日心通觀光明遍十方善神皆擁護惡鬼盡消藏湛湛乾坤靜澄澄天地涼太玄眞體現靈覺透清光頓悟虛心觀符眞合自然萬神朝象帝一性達仙權面啓玄元祖心通浩劫先至眞明徹底返性上瑶天正一沖虛觀舒光萬里明遍天清瑞降滿國紫煙生玄牝通來徃眉間取自行眞人無阻隔四海任縱横通明融息觀極目是天眞寳殿香風異瓊臺翠色新華池澆惠谷神人灌靈椿滿樹花爭發光輝絶點塵離欲朝眞觀長春别有天繚繚紅霧燦冉冉紫光鮮赤子連雲卧青童抱月眠玉霄泠露逼微覺水晶寒上士十首上士鬼神欽災消禍不侵萬邪俱遠避衆聖福齊臨頓覺未來性能知過去心現前常不昧日用守清音上士煉還丹還丹透二關清光離九地紅焰出三山沖塞乾坤裏虛明天地間滿空諸聖現盡是列仙班上士悟玄眞凝然内外同囊中觀靜境身外看清風日月通天象虛無透世空混然歸一體至道永無窮上士悟乾元於中烹小鮮濤濤金鼎沸滚滚玉爐煎始覺神丹就方知大藥全餌因朝上界永住大羅天上士達玄微靈光滿室輝分明開道要脫洒露心機此法通知少靈文悟見稀若能知此意妙化入無爲上士處無爭無爭勝轉經展開明有象收默暗無形守一五神定存三七𩲸寧煉成仙子貌跳入玉虛城上士煉形神形神看合眞火中飛碧玉水底躍紅銀滿地皆爲寶沖天盡化珍玄珠知有象瑩淨絶囂塵上士棄纏綿逍遥入洞天雲霞爲伴侣松檜是家縁每誦黄庭卷常看道德篇悟玆眞妙理何慮不成仙贈知明子楊清上士棄榮華逍遥入洞霞鉛烹壺内雪汞煉鼎中砂藥就顔滋美丹成色轉加元黄分五彩至理妙無差贈湛然子許濟上士棄頑剛逍遥入洞房天空垂妙體心地混眞陽姹女眠蟾影嬰兒抱日光元神知有主萬古得清涼上清太玄集卷之五
