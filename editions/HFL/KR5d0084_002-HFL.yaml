front:
  text: 上清太玄集卷之二上二
  hash: sha256:e0f91662ff6e199af56a4912b362be5f6abe07fb3a5b28de1be975f8074d16b2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0084_HFL_002-001a, image: hfl/0730/0730-038.png}
body:
  text: 姑射侯善淵述符陽論玉清聖境章第一玉清聖境元始開明無幽不燭象帝之先天無化不生易御之太素窮之無窮測之不測無名焉無形焉無形無名者故無不形名者也曰𧢄奕瑆然環居而已天道覨而無不週心式𦳜而無不感徃來相接叡質無方無方者是謂無不方者也暣顡不晟章第二暣顡不晟奚先賢之矩厥後傍門殽怋不正嬜饕進銳孰以泠然悲夫大道故不蓁塞者哉曰玄子然覠得一悟而已象無昋奕始畫其恒至道朝夕而不已尟無嗜欲𥀿息善鞠其命者歟瘞眪存亡章第三瘞眪存亡幽㒑之不相若矣生之死死之生生死之中孰能䀟于正倫者哉俔曰㥍婩於冥司所攝於玄子欲返其命玄子聞之笑曰斷汝之首奚能辯對傷汝之性孰爲見聞㥍婩銳釋亮久而惺舍然大喜我今有悟御適頥殅之道者哉墿㒁周方章第四墿㒁周方孰契其政𥌛𥅪之不測唭㘈之無窮愢踈未失其體𡙐襲未至其眞曰子䁴彝然開元合璧玩室精思政于惺臒者自適三明之道者也絧演嫴靈章第五絧演嫴靈間不可𥅞㝁㥱富而至脦其福者施德於先矣𢘅漻貧而志懲其佶者惟福至後後矣及以存亡得失此一也彼一也玄子相若用言無不信之𥊴之不聦章第六𥊴之不聦𦖞之不慧明眲有期機由物障曰𢜱吁何然聲和音而物接空徃來相聞奚能至晟者哉桃逸氏曰空之不空物之非物物物自然自然常然無不至然矣𧢄然幽𢢝章第七𧢄然幽𢢝如水制淵㴭然漻御御之則㽬適其道湛然象存存之則窫適其心曰憼氏瑩然如目撼水冰心非制其淵湛兮不動冷然遂通涣然虛淨者孰無測㴭溟者也御冠開常章第八御冠開常瞺聆隨化𧡪邃之䙷若顔瞀之𢘋惺㦣同玄無不賴其眞矣曰圓覯至明明之大訥媔奕至辯辯之不晟玄陽曰混合流明眩入一如一無不臻其理也應哲無窮章第九應哲無窮脩眈不測測之無方者孰能衍之者也朚質機目能明而耳能聦也曔氏曰不然汝之心愠由瞀之不精曰晄然相若𥇓之至聦𦖞然相若𥆐之至明玄子聞之笑曰觀彼用心費形胥失其道也吾之心非視聽者至於聦明者也非一形者至於多身者也然则不窮而極不爲而成不行而至不匠而工無可也無不可也無能也無不能也挑達暀圍不可盡然至然無然而然無不然者也探𧷤神功章第十探𧷤神功奕象賾眞剖分造化摶握洪濛臒𠖩制𩲸𥇓𢙅飛魂鼎耽精粹銳逐眃奔靈古道愰達辰倫晶凝雲瑞寳璨氤氲日宫水宰月殿炎君極陽幽邃抱樸歸純光輝地户炳焕天門崑山傾液河海流津羣靈復命萬化歸根無用之用不神而神浮沉定體清濁自分頑嚚一輳哲叡齊臻虧盈成彼送故迎新瑆如玉輾眼若冰輪换虛易象御奕無塵含横神暀浩劫常存通眞論太始之初章第一太始之初先天地而生生化無窮爲率性之主宰玄而莫測爲萬化之根元皓然昛際者是爲至道之精者也曰子䁇晫然奕游水月之間非制有形换若窌圛之至泠然漺然㴭溟自適其道者歟政易元通章第二政易元通徯得劉純至精焉其神不能憮之至明焉其鬼不能𥋱之䠳奕致𢘅晤資靈眰慡然扃㥱者無不俌於道也曰忠子不𢘋望軒移室棄室精摇其眞有闓偪之正者也哉嘸然陽應章第三嘸然陽應心瞀之不精故懩幻之尤悇以至其殛矣孰能蔽焉知夫郭子詹公斯於高士暨乎太玄之憷雖遠千里之外湊晶瑆神奕飛丹之昈羽亼臻源窮於大方奚爲顡惢之情者哉𥉋奕翏伴章第四𥉋奕翏伴其道不爲忧也𨶅然通之曪然入之大矣哉其體曠然無𢆶矣曰子烋敏邪耳能𥋞而目能𥆐之非乎由瞀之至其惟聖人乎不爲明𦖢至于神化者故無用無不用者也元一之肁章第五元一之肁玄坒中央神䢦化詡亼𧖧方曰䚃不空之空瞴不有之有神明焉道生焉撩於虛實者昛乎有無之理也曰魜制深淵無𥄶於上善鴁制其氣非理於眞元嗚呼侄哉心目䀟然奚能眐𥅞其道者歟道昶純精章第六道昶純精氤氲天瑞噴鬱瑛華芝蘭秀野碧桃金粟悅羣靈皆饗其禎曰目子懲然隺乎謹貌非瞟嫖之心永無痴㾻之見復明𥌮𣌜之精其道曰可聖哉精微純皓章第七精微純皓熠叕張華摎摎之形奚能至明虛𧇁之容焉能政眞曰䁘子惺然昂霄于衆象之諧暳然昛之率萬靈而自䐓之至上下闓𢤐期詁漻於正中耳神奕無方章第八神奕無方寂然之不動道闡無形奂然而遂通曰晶子睼之焉𨖹其𦖞聶士之聦非𥋱其精二子惢然未深其要曰𧠫近而不可親親之者遠矣瞀遠而不可踈踈之者近矣雖頑嚚哲叡未嘗逃於此者哉導億㝷方章第九導億尋方極其悼慏兩奕精華由如列瑮之儀大闓古道羽昇絳霄之闕臒子琅然奂乎天地之中虛白吉祥之兆非爲目用目䴦之最明非無目無目蠢之爲尚曰無用之用用之無形無化之化化之無象至於元象者由來尚矣迿懝生成章第十迿懝生成斯於至理曠然無心曰道純而不雜曰精皓然幽粹曰氣感而遂通曰神浮沉定體曰人主上下昇降曰賔和氣流陽曰化神明象帝曰生導合眞元曰溥精思丹體曰通九陽凝象曰玄玄之又玄玄由豫咇至於不可思議洞微論博善瞦章第一博善瞦拯於素靜暗也者希其聲者也明也者融其形者也輯䁻于常仁臸以矣𢜪於心聑者孰無正信者也俔曰諭元子景巨頂琨珸之瑩合爲寳珏之光虛白盈奕至道之精與物不雜至道之元矣㦛𥉶常章第二㦛𥉶之常機遌容可故曰無可無不可者可道也非常非不常者常道也𤕟混物至理臱㝰聏聏以矣俔曰諭穆子周諟矐裕殅之精粹𦔿德至純奚龥之有者哉鼏䛿盈孺章第三鼏䛿盈孺熈熈而以大矣哉宬天地之𧶷變萬物之愉物我非常我物非彼俔曰諭劉子通眮𢯼之貞鶴翯𢝌臸煢而𡧭化焕然覺粲者眐嫿𡣬奕之晟者也㥍惟斫岸章第四㥍惟斫婩𥄶欲迂心物㝁㝁奚之而㥴致僞者哉如雺霧之浮沉終不能成其雨露㪇抧而已政于䀖眽者歟俔曰諭李子正䜅壑承桃斃幻頥殅故心竀焉奕閎焉晟之粹者畀然以政于致殅者也侄𢢝精妍章第五侄𢢝精妍䁝之容債致𥌂𧰙裕致裕嫴靈暨乎眞絧者乎天卶者也俔曰諭引子明䁵復逢於兕虎臨危而豫死之殅𧢄然而䁻㦁然而通通機𠋝𠋝者仢約于太始之先者也天樞運𨷱章第六天樞運𨷱䁴𥊪臨中巨乎之聇者奕乎之聇者也曰乘天地之至精順天地之至神迪覯澄虛無不致其敒俔曰諭王子林䁎晟合璧仚敫盈虛厷厷至靈者諓致于少微之瑆者哉逯逯䫤舒章第七逯逯䫤舒𢞎叕朎朧返歟之䦯者𡧮然幽粹者也政以無靘者亦非𩆚𧡢者也曰著萬物之内處萬物之外德合神明嬛嬛而以俶繹含眞御質還于象者上合至道之精者也俔曰諭張子華媔𢓜朎朧豈琳道與物不雜者自適忘形之德者也上清太玄集卷之二
