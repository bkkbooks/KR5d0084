body:
  text: 姑射侯善淵述繼古韻和骷髏頌十首骷髏非骷髏非一堆白骨卧沙堤榮華富貴今何在空伴白楊千古碑骷髏貪骷髏貪名利財色飽經諳劈碎塵勞居物外一靈眞性出雲庵骷髏嗔骷髏嗔滅火灰心絶我人養就神光沖碧落一天空淨掃紅塵骷髏癡骷髏癡識破般般總不知抱守一靈眞覺性祥光冉冉昱朱衣骷髏憂骷髏憂跳出浮華萬事休坐看一天元始道凝空心月照清秋骷髏知骷髏知迴光返照不思議認得本來眞面目靈光一派接天齊骷髏笑骷髏笑恩山裂破搜玄妙遍觀天地匝虛空圓明亘劫無虛耗骷髏言骷髏言了達希夷不假難空中養就無名物冥冥杳杳接光寒骷髏說骷髏說一條玉柱通天徹萬道霞光倚太空眞心始覺自然别骷髏休骷髏休逍遥坦蕩樂無憂蛻殻任遊天漢國乘鸞跨鳳入瀛洲又繼古韻地炁騰騰漸結凝亂横天漢太无晴被余拂盡昂簮看獨顯高空惠日明一掃碧天空宇靜皓然三界暮雲晴懷中抱出團團月萬象參羅絶點明迷雲拂盡三山瑩俗霧衝開四遠晴直下邊彊安足定昂頭一匝太虛明覺海澄澄秋水瀅寥空湛湛素波晴靈童捧出无瑕玉光耀无邊處處明久匿昏衢天地暗雲收霧歛豁然晴隨風抱下天邊月萬象叢中獨自明舒手擘開雲漢頂杳冥廓落太空晴乾元許我神通大睒爍陽光萬里明又繼古韻豁然一點達眞機奪得玄珠世罕稀瑩淨不繁塵污染侍香金鼎篆煙飛琴堂默默頓玄機門外苔青過跡稀道院寂寥无俗物松風飄落亂紅飛了達眞詮上上機空中髣髴絶塵稀陽光一點穿无有穩駕香風鶴亂飛吾留一法奪天機占了神功絶世稀自有靈童朝玉闕汨羅江上跨龍飛了得玄玄絶妙機予家至道罕然稀空中蠢出无名朴一點靈光天外飛金關斡轉運樞機數點流星出世稀神力拶開乾坎位撼摇滄海搏天飛遍應十方遍滿塞氤氲飄落人間處處通神契道淵炎日瑩性同圓海月華風元始天尊設化遍娑婆普濟蒼生道炁和返照還元抛雪浪迴光玉露洒星河通眞識破皮囊幻化身細搜玄妙躍凡籠坎离迸出神光爍日月相交透鼎紅體用道力神威遍大千无形无影透山川曹溪浪淨遊魚戲天岸波清覺海淵背覺衆生不覺過青春昧了靈明浩劫眞躁性兇頑多執閉无明火發縱貪嗔迷眞眼前日月隔天涯滿目清虛翳膜遮洗滌囂塵明返復玉嬰神變洞雲霞運化一炁虛无太始中高空爛熳曉霞紅包羅宇宙无纖翳照破乾坤慧力通沖和祥煙塞户藴金關橐籥虛空任徃還流注水銀平滿鼎雲濤高泛玉京山開元初發玄元道炁生壺中一味雪花烹通流灌鼎瑶池淨嚥罷還純透體清混合鈆汞相吞入鼎爐烹煎日月煉虛无崑崙火發无煙焰養就神丹射玉壺神淵渺渺仙源海眼深雙泉輕泛水中金龍蔵潭底風波定虎卧溪邊運古音聚化皆成大道化神功撮聚玄機入鼎中煉就金丹光皎潔一丸封上五明宫擒玄江邊扯住烏龍尾頂上扳翻白虎頭奪得夜明珠一顆千條光焰接天流雙關神鬼相交各所情自然心定顯眞靈能教姹女扶桑戲解使嬰兒弄月明昇降三宫昇降産靈芽爐鼎飛霜吐翠砂輝落滿天紅蘂綻乾坤遍撒美金華開明道眼觀天一派清還將寳鼎水銀平紅霜片片飄金户白雪團團降玉京生成陰陽交换禀天然萬化生乎一法蠲得一无拘眞自在逍遥獨暢箇中玄眞人靈寳眞人法位尊常登月殿躍神林三清境上遊空廓四海鳴聞玉珮音神化眞人獨坐隱雲寥凝翠煙嵐接遠朝寂上撮睛光月聚玉蓮羅列兩三苗胎光周天一點流星落遍照壺中光閃爍煉就胎仙入故鄉悠悠永住三清閣通明火翳點開通法眼无明撥盡透星羅高天推出千堆玉平地騰空萬丈波曠體无名无我亦无形一體同觀古帝京淺智鈍根生執見豈知光列眼淵明眞筌太玄眞覺出塵勞頓悟虛心道眼高自有玉童朝紫府鬱羅天上跨金毛威神予抱天風眞夙骨因師點化作仙才寰中莫有銅頭漢舞劔交光劈寳臺仙桂月宫丹桂无人折紫府蟠桃向日開二物採來收入鼎一般香味馥仙階混物凝眞森森接蒼天浩鬱臨空鎖翠煙高捲碧霞開月殿夷門羽化列金仙神劔磨開三尺如霜雪日曜爭光飛電撤昨夜三更法報讎青鋒點污猩猩血識破利名財色勿剛求火院何時是徹頭爭似逍遥雲水客杳冥空外得眞修岀關笻杖横挑巨藥瓢雲袍風送過浮橋袖携三尺青鋒劔斬斷烏龍數百條精微精聚玄微道太明移神寰海樂清平一陽運入三花鼎二炁收歸七寳瓶水火東溟滚出燒空火西海澄凝浪碧紅二物混成天地秀滿朝精耀遍和融廣慧劔斫金山石火流三尸併盡萬縁休被予撒起謾天網撈箇虛空似日頭有无空裏尋空認得空豁然空裏見神通從今不問紅塵事自有瓊花滿洞中秋夜一氣盤浮絶漢晴蕭蕭夜雨洒秋聲時人不見常娥桂唯我蟾宫獨自行威光萬縁豁盡消諸業頓覺希夷絶妙玄數片黑雲揮島外一懷心月滿空天元和一炁初分天地判三才立象化靈機移心返入黄金室産箇明珠照幌幃訣正道德陰符太始篇學人不曉謾求仙金書玉篆人輕弃怎辨吾師玄又玄靜用誰向玄中立靜機湛然常守太淵池日輪斡轉開心徑天地常觀作細微絶念身靜心清意亦清内容常守炁神寧搜開寳藏玄珠燦光鑑蓬壺萬象明降龍擘開天頂任遨遊正見蛟虬戲廓舟大喊一聲山海破劔尖追下赤龍頭神丹一顆飛丹鎮上方元神精燦日爭光炎凝焰爍燒空界嚇退群陰盡化陽神通按劔神威過華陰咬牙忿怒騁胷襟攅眉諕破群魔膽睁目驚摧百恠心通玄離欲虛心開慧目凝空晴倚无瑕玉玲瓏翠色放英華遍照十方知可足混合降落天魂騰地魄沖和上下无瑕謫太方周匝遍无隅走玉飛金相間隔功高道德清名播海涯天厨賜福善功加有朝翔翥飛霄漢昇入雲深弄翠霞神威偶因携劔上天羅殺退群陰百萬多玉兔驚迴尋窟竅金烏飛上桂枝柯威靈坐間飛劔騁神威摧落天綱太華齊扳下月宫擒玉兔蹉翻日殿捉金雞離降聖觀已同達士明眞僞不契迷徒說是非有日丹成飛宇宙太虛曠體是余歸陳仙問空中不空至道无形若太空移神混物體皆同江山極數猶存此天地无窮在彼中賈仙問不空不有不空不有是圓成執此圓成亦假名了達太玄生實相相中无物湛然清郭仙問玄之又玄問道玄中復有玄立機天外一重天混元上下无纖障妙化圓通大覺仙党仙問杳㝠杳杳冥冥精恍惚神威拶碎天筋骨凝空豁落太淵明獨立乾坤无一物劉老先生問體用不知仙路神用仙機體大方凝陽闡岀好祥光先生已得歸眞路不覺隨風入帝鄉焦小仙問岀家擺脫塵清業火牽功名富貴盡除蠲男兒已立衝天志奪取名標掛列仙劉先生問眞空妙用眞空至道杳无蹤妙用頥神萬象同太一壺中收皓月廣寒殿裏弄清風董仙問至死不退盡終一志若初心至死无由入罪林常守藥爐三鼎玉每存丹竈一壺金李仙問不屬中間與内外外遍无體内无修中道離微絶所求萬法一齊俱拂盡更无閑事繫心頭齊長老問大道忽然頓覺悟心珠照破塵寰一物无道士得資爲正教禪僧以此號眞如陳仙問龜毛兔角木馬嗥天磨兔角泥牛吼地刮龜毛生擒二物歸黄道永鎭乾坤不動摇梁仙問入道歸眞幼年貞烈若冰清夙有仙風慧骨靈睡裏唤迴開道眼夢中驚覺頓圓成大張仙問不居山不住庵只此一著如何頓放以此故述二頌不繫青山不住庵神飛天外出煙嵐鶴隨紫府朝仙主鳳引寥陽謁老聃跳出茅閭不隱山蹉𧿶信任樂清閑隨風永住乾坤裏抱月常居天地間張仙問不觀假相所認眞形一堆臭穢終歸假兩點睛光不足矜欲認本源眞法體同觀相外若飛星齊長老問鵝在缾中長大飛出兩般俱不壞生居小隱入缾中不懼翔鸞意氣雄欲問兩全俱决聖鵝飛天外寳缾豐郭仙問火裏清涼焰火炎炎燦日光形神俱妙得清涼永同太始无增减已得玄元立久長李仙問證道相逢目擊道知通識破千經萬法空不在名山頻禮問免伊雲水苦叅同郭仙問至死不迷大道一條平穩路蓋因自昧不知歸予今指你通天徑昇入瑶宫辨細微董仙問曹溪認得曹溪兩路侵京山掩映對雙林雖流小水成涓滴透入靈源覺海心党仙問上天梯先生欲識上天梯立玉横金倚翠微若到蟾宫觀此景也教惺爽悟丹機雷仙問至神合道道法三才已久長神通至妙覺清涼混成一炁歸元首獨立先天道德鄉郭仙問不神而神凡夫都總祭邪神誰肯迴觀認本眞若向此中心决正清涼路上笑紅塵閻仙問内外相通閉目澄虛達妙玄開光應物混先天沖和一道祥光起透入寥陽象帝前張老問國之利器中元上德明金國三寳盈留光美玉物利常將潤百關皇天賜我眞清福王仙問希言自然希言至道自然别不似飄風時暫歇道德常同樂亦之通玄无失妙清絶張仙問知白守黑放開慧日照千光上下容明盡化陽夜靜抱元常默默寂然不動應時長大閻仙問妙法大清妙式洞虛玄達者心開渡法船越出洪波登彼岸元神透入焰陽天劉老仙問三教歸一如來妙法談眞性太上玄機說太丹孔子五常明日用三乘混一太虛間老子如來孔聖同世人不曉鬥爭風假名三教云何異總返蒼蒼一太空小張仙問生之畜之道發機生德畜之陰陽泄化自依時若將此理迴光照仰望蟾宫看桂枝董公問虛无生有道法虛无本自然生成大地覆三天中間日月明空象開闢陰陽萬古傳張老宿問甚門户是修行清淨門中認的端莫教塵事向心攅林間若指曹溪路坐看如來入涅槃張仙問天性人也天性冥冥通祖道達人以此稱名號頥心機宻混中元此是神仙眞秘奥王先生問日用道德慈惠忠廉志氣清澄空顯出谷神靈執其大象安平泰左右逢原翫玉京陳仙問無遮无閉太始門開通慧目靈光照徹明虛谷谷神不死永安康遍納諸方无偃塞大閻仙問善惡果報惡行自招災禍應善功天賜福相隨吉凶兩事由人造至在臨時各自爲王仙問三要混一剔起上天一鼎竅精光赫日通明照玄元生殺立初機三一混成眞要妙張仙問内中日月日月交光大小分燒丹方使鼎爐薰聖功漸覺神明出乘鳳凝陽謁帝君張公問升降浮沉日魂月魄定浮沉上下融明大小侵聖智剖開天井玉神功拶出滿坑金大閻仙問三一无分靈波滚底三光秀神水盈流一法均獨立寥寥知有象孤然默默混元分勸道衆學爐火時人都總學燒金誰肯除貪煉本心達道不教財色染修眞何用利名侵陳仙問絶學絶學无憂通妙理乖慵懶墯不成眞若將懵懂爲仙道騃女忙郎盡出塵大張先生問性命視之无物聽无聲視聽猶然亦假名這箇本來无可比有如風月照天庭惜炁存精養命機坎中神火復燒离一陽生起乾元象丹就昇仙謁紫微陳哥問无疑離覺无聞絶見知契神合道兩忘機心中不起无明障妙化昇玄入太微陳公問北斗七元横海運樞機斡轉天輪萬象隨斗柄指迴開上竅衆星拱受至玄微陳小仙問大國烹小鮮大國无爲帝象權民安其業若烹鮮鬼神相會中黄位日月扶眞合自然勸門人善惡不定心有二用天網恢恢覆載通察人善惡在其中好將志氣歸眞正免使功勤盡落空許仙問獨立而不改上清至道獨爲先混一无生大象全寂靜卓然无易變亘初常在立幽玄許仙問混物而无窮一顆靈光射太空混然獨立徧无窮古今不改長如此大納乾坤一體同張仙問歸眞明物開元剖覺明眞物善達先賢同上德内抱靈源杳杳精外存神識昏昏默党仙問天地爲體虛空爲用天象乾元地象坤陰陽否泰併相吞剛柔已定浮沉位中道虛心慧日奔張仙郭仙問在家修行同塵不染善居家在欲无私别世華不若張騫超苦海張河天賜抱靈槎柳老宿問佛因果大覺金僊說遍知化人佛眼悟菩提通天上下无因果蓋爲衆生各自迷衆道友問邪者以幻爲患必遭其殃執幻施功養患軀恰如垢膩污心珠合塵背覺千眞遠弃道離微萬物拘又問正者以導爲道必獲其福育性存精至道明沖玄髣髴化神嬰凝陽大闡祥光燦應用飛玄徑上升祐仙問岀无入有出无通顯明寥象入有還元合本機顛倒兩般俱訣正勿生分别是和非許仙問岀有入无出有洞淵明造化入无還覺頓元初空中自有天珍寳露現玲瓏照海珠答問一問出有入无一問出无入有同用如何下手出无見有元神象入有還无悟性珠有有无无俱可弃開明太古立元初趙仙問人心合天心人心須是合天心内外明知性海深認正法身非色相靈光高渺照清音丘仙問天人合發天人合發立其機萬變之中定至微左右逢源明寳鑑滿天飛炫素光輝董仙問物性存根根生於上芸芸萬物返歸根花發成榮至上存復命善亨知古蒂頥神叩道入玄門僚仙對衆不問以此爲題因甚僚仙不索題廣通玄覽善搜機存三默語明眞覺守一忘言絶見知贈茹老宿劉老宿論如來覺性善通天眼悟如來頓見靈音慧日開阿耨池中生五葉青童移向火中栽趙仙問谷神不死谷神不死立天根玄牝綿綿亘古存北海溟溟騰地魄南洋灼灼降天魂趙先生問虛谷元神上玄虛谷靜无塵萬𣲖陽光觸目新利物一源明覺性善生三要頓元神王仙問陰性陽神陰陽返復定中央内外相通道德長閉目靜思庚虎性開睛明現甲龍光趙公問上善若水萬點靈波穿宇宙千淵神水灌乾坤混源一𣲖生天地澆溉黄芽長蒂根李仙問還將上天炁九五魂飛徑上奔還將元炁入天門洞玄靈寳生成體大化虛皇第一尊丘先生問道眼道眼明知至本眞隨機應化善通神開天分地歸元始正見堂堂妙法身同官李問上清之道上清元首道之尊天命司神萬化存物利百源沖坎户混成一炁躍離門焦先生問无罣礙靈明通化外其身脫洒孤然絶點塵心若凝珠无染污更將何物礙於眞相老仙問道契其理太玄合發定其機固蒂存眞志不移藥就還童清骨格丹成返老永无衰柳居士問精進六時精進念彌陀慈惠无邊施利他兩輳清風收地陌一輪明月上天河柳老宿問般若船般若船中一物无月明空載出昏衢雙林樹下開心寳鹿野園中悟性珠相老仙問太玄太玄眞覺出塵情露一凝珠照海清龍躍浪飜光宇宙射開天鼎曠然明柳仙問丹藥一瓢仙藥一壺丹貨賣凡間入市鄽幾度不逢眞烈士復將此物上瑶天劉二仙問虛廓靈源虛廓正无餘露出天晶照眼珠元始已來呼祖道至今由此唤眞如贈張李二公鐵爐橐籥風煽熾火光爐中閃爍聚眞陽鋼鍒煉就飛神劔兩刃青鋒耀太蒼柳先生問陰陽顛倒法陰陽返復生乾位龍虎相吞入兌方兩箇玉童扶寳鑑焕然光射水晶堂羅先生問大道頥神天地沖和養至精混成一炁谷神靈放開皓月千尋底躍出胎光萬里明常先生問賔主至道精宏純莫立運行大象天空日定光永鎮入中元煉就陽神功可畢張謀克問六洞飛玄之炁道行三要自然機神運精華炁象隨德化靜光蟾𩲸踴道頥清爽日魂飛張先生問萬變定機萬變靈樞物我隨威光順化應其機天人相發生成位合抱純風永不迷劉家郎君問陽神元精一𣲖匝天心灼灼凝祥匿幻陰渾似流星騰古月有如走玉間飛金馬校尉弃假還眞得眞何徃凡胎濁骨非眞體玉貌清肌是法身出入夷門風作伴雲堂高卧月爲鄰張仙問絶妙機欲付重玄絶妙機恐君无信轉生疑有朝跳出塵勞網拊耳丁寧說細微李仙問獨坐蓮臺獨坐蓮臺守自然寳池凝望月華鮮蟾宫幾度親曾到敢對常娥說妙玄康校尉問太玄太玄眞覺出塵忙佩劔携笻入大方野鶴孤雲爲伴侣林泉風月是家鄉王先生問始達妙音照了名爲達妙音闡開清目絶荒淫一靈眞性通元象應用隨時運古今劉先生問天上混无分上玄虛化混无分聚攝陽光致法身永契道機无别體化成仙骨自然人陳校尉問眞風花眞風吹綻翠煙霞日殿蟾宫散寳華結就一爐天地髓聚成兩鼎夜明砂尹行者問靈源覺海靈源古佛堂金門出入善開張菩提路上清心瑩般若池中露性光庵主劉先生問壺天一壺精爍一壺天恍惚之中達妙玄幻夢頓抛飛宇宙塵情割弃化雲仙牛老仙問心香一道清香出玉瓢結成華蓋入紅霄月中寳篆烹非走日裏金精煉不凋牛仙問斡運斡轉天輪翻牝馬推開地户運乾牛離宫赤子擒星月坎殿青童捉日頭牛老宿問一言可悟萬法皆通自從剔起眉毛睫萬法門開俱總攝定慧圓明塞太空靈光照滿恒沙劫趙二仙問身中寳鑿開荆谷見天心露出无瑕七寳琳玳瑁叢中觀美玉瑠璃堆裏看精金張老宿問見聞洗耳旋聞敲玉磬滌睛常見擊金鍾幽人欲識禪家意笑指庭前古老松牛道首問如意寳珠如意機同聚寳瓶珊瑚碼碯燦華英瑠璃八色渠中有顆顆明珠逆上行田老仙問彼我太一門開无彼我清涼潑殺燒身火无明化作紫玄霜變就神砂丹一顆鐔仙問如何是靈寳洞玄靈寳揚眉處妙色如來瞬目間赤鳳翼歸金水谷青鸞飛上玉京山柳老仙問心月撥開雲翳見天心放出秋蟾十萬尋沖滿太空千塊玉盈流道眼兩錢金王二仙問通元通元妙覺正无餘頓見靈音照眼珠遍體旋翻紅霧起渾身拶出素光舒天大仙問雙關日殿龍蟠金鼎靜月宫虎遶玉爐寒一雙玉女乘丹鳳兩箇童兒駕彩鸞高仙問元始懸珠元始空懸黍米珠衆眞相會喜安居大包天地猶然剩遍納乾坤亦有餘衛仙問内外一元不著空見相交内外本无形混一純精合利貞不著有无何是我碧天星炫照寰瀛華陰張仙問鈆汞鈆汞收歸火裏蔵煉成一鼎紫金霜團團結作神丹象燦燦流明焕日光孟老仙問有人認得靈靈物百元來是一千開元始覺靈靈物至聖通玄精恍惚善計方知一大千不離神式明虛谷霍校尉問空中顯性大音无物物皆空躍出玄珠太古同神入翠霞擒皓月性遊煙浪捉清風馮仙問居家出塵清廉貞潔任家居運化神光出幻軀混海蛟虬吞日月穿山兕虎戲明珠王仙問岀家富貴功名一劔揮塵情棄捨恰如泥鯨鵬出海摩天翼鳳去離巢趁日飛劉仙問色身衰老法體青春妙體方知倚幻身有如茅屋寄居空兩軒明月陽精爍一户清風浩氣沖贈王四郎亡母收淚莫謂恩深繫遠情到頭都是一虛名收睛始覺清眸瑩歛淚方知道眼明小張仙問神化婥約神風出洞天玉嵓横碧掃空煙沖玄應象千眞瑩至道精宏一物鮮單法師索問休收憂修四字爲題休意隨雲水利名休仗劔寰中取自遊遇到山頭擒兕虎每逢海底斬蛟虬收團團日月鼎中收慧進炎凝熾火流撥焰青童乘牝馬開煙赤子跨乾牛憂善通靈覺永無憂泛泛陽光遍匝周鳳熾日輪歸海嶠龍張月角出山頭修漸入玄門已得修指開天眼悟青眸巨靈扯斷烏龍尾廣惠扳翻白虎頭又四韻全取一絶世累塵情意欲休盈流天寳洞玄收爐中大藥憂無就鼎内金丹喜有修庵主劉先生問太玄太玄眞覺出囂塵慧日祥光觸目新釋子悟之明覺性道人知此頓元神梁二仙問混俗和光雖在塵居志氣剛訣然清操守眞常閑中暗覺乾坤大靜裏明知日月長安仙問虛无之用虛无无象絶知音杳默忘形極遠深龍尾纏迴天海眼鼇頭飛出曲江心崔仙問本來面目慧日盈流濟物无物无其物頓清虛傾陽一𣲖燒天火混沌雙穿照海珠段郎中問紫府黄庭神遊紫府更何疑性入黄庭自合機一顆金丹明歷歷兩丸仙藥朗輝輝閻仙問獨體圓明剖開靈覺照圓通赫破塵勞物物空大悟玄門無内外混成至道獨爲宗上清太玄集卷之八
