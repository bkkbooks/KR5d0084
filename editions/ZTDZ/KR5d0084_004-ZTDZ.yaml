front:
  text: 上清太玄集卷之四上四
  hash: sha256:57c00ac7073af058cd728b2deb648d5c54feac2337e4a5f54311bd15863ed5f3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0084_SJB_004-230775a, image: sjb/23/230775a.png}
body:
  text: 姑射侯善淵述太始金光玉容銘且君子立身行道嚴尊國法謹奉玄眞勦除嗜欲屏絶囂塵積功而恤孤念寡累行而愛老憐貧仰賢善勿生懈怠舉頑嚚莫起勝心上和下睦建德以慈悲爲本内正外端至道以清淨爲門事繁則心無内適絶念則意不外遊止盈防虧須明進退之機居安慮危可辨存亡之理有無相濟動靜同源靜之曰道動之曰神寂然有應感而無心通元益氣洞徹淵明聚陽魂燦然純粹换陰𩲸昞曜天眞星凝玄照道釋華風至理研窮朝聞之夕死可矣是有死而不亡豈羡啓期三事之美非無長生久視不圖林類百年之期胡不念有身有患終落沉空無相無形始超象外愼守勤功功成名遂墮質昇仙奚足爲難矣者哉讚曰太極高渺洞濟淵玄一氣盈虛萬物生焉靈風秀麗皓月華妍山藏玉瑞草坼金鈿滋榮一國潤植百川無心俱妙有欲臨邊迷之爲鬼悟則登仙出乎無窮象帝先天太淵辰境清心銘夫道者默然而不弊應化之無方德者顯然而不忒隨變之有位立象則明日月乾坤之理安爻則體陰陽否泰之機坎中滿在天爲月在人爲耳耳能廓震巽風雷之聲是謂聞而知之曰聖離中虛在天爲日在人爲目目能鑒艮澤山水之秀是謂望而知之曰神仰之則法象於天俯之則法象於地沖玄則觀象於變變則通幽明之故原始返終故知死生之說易曰探𧷤索隱鉤深致遠遠不可窮近不可測杳杳冥冥莫能知其然而然也毁之費之不失其體信之奉之不見其形天長地久孰能功以高遷彼奉其道自爲志信不厚蓋中路而退者此之謂也讚曰含横神秀翠影瑶岑蟾華東出日色西沉道明玄境德合辰衿雲泠澡雪元氣齋心羣仙下降衆聖齊臨腰金珮玉寳瑞盈簪光垂素羽韻出寒琳輕敲玉磬再舉清音太清玄明玉辰銘太清玄䏶無化不生象帝開明無幽不燭二神藴素焕乎日月之前一氣盈虛混於天地之表玄之又玄探𧷤無窮妙中爲妙精思莫測惠施能辯辯之未證其容端木能言言之訊無啓口離婁擅視方晝舒眉眐而望之弗見其形師曠擅聦方夜俛首而聽之弗聞其聲拔其萃出乎類始爲物先而未嘗全其理也忘其氣益乎神方成道紀混於太初而未嘗盡其機也然則玉煉金容純眞滋益寳式琅函濁質消忘海靈凝秀象出丹華三一混然精流天佖内適星懸寳晏未始之先矣讚曰太清之道純一眞孚天風高潔海月清孤昂霄晦跡俯坒忘圖璿岡峻澤釗湜潤虞玄精玉璨妙質靈無光華遊奕瑞氣祥符混元凝秀丹象流珠内含星彩遊宴靈都太空圓象通神銘夫道者寂兮無聲寥兮無色亘古亘今獨立而不改無狀之狀迎之不見其前無物之象隨之不見其後言乎弘包羅天地不足爲其大稱乎微貫穿沙芥不足爲其小探𧷤無方襲之彌遠精思有感測之彌近失然若昏聽之内聦冥冥杳杳藏乎至精照然獨見視之外明恍恍惚惚運乎至靈靈源一致導化三成一者奪陰陽之氣二者焕日月之精三者誘天地之秀知之脩煉千日有期混然適之明於象罔象罔通玄穿金透石泳水蹈火履鋒涉危千變萬化無以窮極迕物而不慄其謂何哉廼純氣之守有如事者是謂修眞德士神聖之功者也讚曰内適杳冥外通辰景道此一無德斯三省玄象著明幾心耀昺四氣朗清五神虛靜冠韡華軒貌乘雲鉼天外風清潭心月泠曠兮若昏默然如烱隱顯分明妙哉吉慶太玄寳晊星徽銘玄元垂教感無不應道德開元物無不生且太虛浩浩而無涯天地茫茫而有象乾坤含化庶物流形陰陽受氣代謝相因禀化者不止於一生含胎者豈盡於一形在天垂象可見吉凶之兆在地成形可辯有無之理在人爲變可明動靜之機釋子啓之曰佛儒賢理之曰聖德士通之曰仙異派同源道斯一矣然則天眞地祇神明帝主日月星辰仙眞上聖玉女金童官僚將吏古佛羅漢天龍八部四恩三有山川大澤江河淮濟珠玉金石玄黄甘苦廼至胎生卵生濕生化生有色無色有相無相有化無化非化非非化同一尊奉者乃無上之道也化而通之者廼無極之神也其神者在下則爲鬼在中則爲人在上則爲星星釋無形返於太易之先先天無祖然而通之是謂至道之元矣讚曰幽玄純粹天眞微宻儒釋道風天地人悉分而爲三妙歸精一執有本無體虛若實形釋清聦慧通靈質神遊海角魂飛天奕醉抱瑛華眠雲卧日九色星氛萬法俱畢太冥皓濟頥神銘道者虛無之體德者神化之用體用相須是謂大通夫大通者在乎眞氣精神之理也其氣者輕清而簡妙也其精者放曠而飄逸也其神者浩渺而幽邃也默然則昏瞑而意存昭然則炳曜而心忘曲成則闢天地玄黄之色正化則泄陰陽否泰之機翛然而隨風雲之出没厥然而歷江海之波濤凝然而冐山川之秀麗鬱然而容草木之茂植煌煌兮發金玉之光華溟溟兮興魚龍之變化然則不渝而色不彫而形不疾而速不爲而成無可無不可無能無不能玄之又玄妙之爲妙隳質神游洞達於廣寞之鄉也讚曰宗乘至道祖聖流傳非持像法何假名言無用之用不然而然二神啓妙一氣通玄龍遊碧漢鳳翼丹天明輝寳界光耀芝田中正剛健精粹純乾易乎未始象帝之先玉清玄上登辰銘道明玄覽始一先天象帝出乎萬梵肇氣以御三元天地澄徹日月鮮明精照無外微妙玄通愛物利生和而不暢换然則易乎不神而神隳然則適乎無體之體志凝宇宙混入中元虛室生白是謂吉祥之兆其道靜而生神其神感而通道非視非聽現于天瑞益神聖之無方非動非靜虛無澄湛惠靈寳之有應寂兮寥兮藏乎諸用恍兮惚兮示顯諸仁妙哉玄道至德神功曠然大啓𣌜乎星奕之元矣讚曰玉清玄上帝一登辰混沌溟涬元始赤文丹皇奕御靈寳滋純神凝宇宙玄照天風黄華流素精耀璘㻞忘形適象契道生神交光焕爛皎潔華瑛中元奕象是謂玄眞頌曰昔年昏昩心源閉今日分明道眼開喜見碧天如玉案雙輪碾破白雲堆太極玄精神游銘原夫入道修眞宗崇三寶孝敬二親戒除嫉妬解釋貪嗔逢三教而勿生彼我遇四衆之共結良因含靈授化皆如父母之恭誠羣居則卑謙愼口獨坐則進慧防心行須欵步語要低聲見如不見視大象之無形無形曰道眐而至明是謂通神之妙理聞如不聞聽大音之希聲希聲曰德𥆐而至聦是謂入聖之玄機内適則上下沖融肌肉若一純精無象瑩似玄霜外感則忘形流素混氣傾陽曠然虛寂淨若天光然則内外一居周流六出易遘重玄成乎美之爲美李士方明忘水月而登眞列禦親窮易靈風而入聖道不遠人人之遠道嗚呼世家之子多迷酒色緫惑功名失妙道之根源墮沉淪之惡趣若也迴頭省察潔列灰心授乎至道原慤行之登辰脫質昇玄於妙境之中矣讚曰抱道懷德善美無加玄中寳鑑睫内瑯鎁䤋毒妖氛勦銳矜夸存眞釋僞守正亡邪爐瞿鳳彩鼎戬龍沙南辰昞耀北帝流霞神遊天繹星適中華玉京金闕元始之家太易生神變象銘道玄德妙全神會靈浮沉天地昇降陰陽緫三才之造化統四序之生成通元益氣混物流精施之則山川華麗感之則日月鮮明光而不耀默契眞宗爲而不恃雕刻衆形形神俱妙各適其眞頥神曰五氣其氣者蒼丹黅素玄也育形曰五味其味者酸苦甘辛鹹也味之無味是謂眞味色之無色是謂眞色聲之無聲是謂眞聲大無不周細無不應應天曰清應地曰寧應山曰秀應水曰泠應虛曰化應物曰生應形曰質應象曰星星懸高潔位列華清玄齡久視寶福延生衆眞享祚皆賴於太上之風也讚曰順動天道運化人倫威明顯德光奕含眞寂然妙理會精全神晴凝寳篆慧接氤氲元靈亹亹雯質彬彬百姓日用萬物化純日容昱昱神貌誾誾藏雲羽士玄谷眞人太虛寳鑒容神銘夫建德修仁明施道行闇積神功澄心止念息慮忘機韜光兮若石中隱玉晦跡兮似蚌蛤離珠蒿目蓬心多迷像法慧眼靈源廣達無生體天行道隨日月之高奔容地方儀用璇璣之斡運三宫妙啓六洞玄明有無察浮沉之理動靜審昇降之機金爐火熾迸陽光遍通道體玉鼎湯煎泛雪花滋益神肌虛白華麗柔弱浮輕入水不溺蹈火不焦遊乎大方透山澤不躓其步體入圓明越雲霧不硋其窺達五行之外出萬法之前親遠踈近左右逢元元分未始視之不見其形道適玄精聽之不聞其聲非無非有亘萬古而不弊不動不摇沖一性以長存闢而入之物無不理推而行之道無不亨通元益氣氣之益精精之益象象之益星星華光麗遊奕太清清微無上是謂圓成讚曰大道無形常居杳冥始分一氣法禀三成天地鬱秀日月華精神交煒燁物焕圓明陽光聚鼎陰質離形寂然沖妙感而通靈潔白純素元亨利貞剛徤中正柔順輕清昇玄入聖玉霄徽星上清太玄聚寳銘陰符經云機在於目黄帝曰朕不知機在目此者何也天眞皇人曰道之遠者在於八荒之外道之近者在於眉睫之間大則包含天地細則貫穿毫毛矣廣成子曰神機内動目睫飛鉛故神機在目也爲目間有神光動則在目也夫九天祕宻之機出自在目前機者换動之變也呼陽召陰把握權輿出清入玄故在目兩大角頭號曰眉青穴上貫泥丸下通兩腎乃卯酉之户也亢倉子曰我體合於心心合於氣氣合於神神合於無其有介然之有唯然之音雖遠在八荒之外近在眉睫之間來干我者我必知之乃不知是我七孔四肢之所覺心腹六臟之所知其自知而已矣列子曰精神者天之分骨骸者地之分屬天清而散屬地濁而聚精神離形各歸其眞故謂之鬼鬼歸也歸其眞宅眞宅者太虛之域也黄帝曰精神入其門骨骸返其根我尚何存太上曰道沖而用之或不盈淵兮似萬物之宗挫其銳解其紛和其光同其塵湛兮似或存吾不知誰之子象帝之先吕公曰温温鉛鼎光透簾幃徐神翁注云混温即人體也鉛鼎初交神光發溢閉目見簾幃也目者眼目也故指玄子曰凝神栖洞府閉目下簾幃也造化爭馳言人運用神功與造化爭馳是人之神用也海蟾子頌曰温温鉛鼎入中元放出三光養瑞蓮蓮就自然通聖法步步神光在眼前宋齊丘曰目所不見設明鏡而照之耳所不聞設虛氣聞之精神在我視聽在彼又云耳中磬我自聞之目中花我自見之我之晝夜彼之晝夜是晝不得謂之明夜不得謂之昏能齊昏明者其唯大人乎又云水至清而潔冰不清神至明而結形不明冰釋返清形散返明能知其死者可以遊太上之京也上清太玄集卷之四
