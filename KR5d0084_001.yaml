front:
  text: 上清太玄集卷之一上一
  hash: sha256:d87464670c9457e5f37ee768a09088b71a7993d2ca93b565de2bc4032ecd35d4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0084_HFL_001-001a, image: hfl/0730/0730-004.png}
body:
  text: 姑射侯善淵述通明論上清元化章第一上清元化隆睦開圖豫而為之者道也終而復始者性也崇宗則含德之容沖玄髣佛象若瓊琚誾誾而以徽徽然哉悅風韻之音倡元晶之旭頡翼無拘乃遊道之方矣衝祖則大而無外細而無內上圓下方天地形名內闡氤氲之氣東出西沒日月升沉巨化暹昱之明心物凝之炯然無不敏其令也奕善之逵章第二奕善之逵在用之常也視之大象大象無形形之則非眩於目自然光溢無極矣是以離婁能視猶斯未證其慧也聽之大音大音希聲聲之則非亂於耳自然慜適無方矣是以師曠能聽猶斯未證其聰也至聰至慧至變至通皆授生夷道之中矣表物窮理章第三表物窮理靖式若容睊移玄覽璟泄凝彤明則匿於暗生則伏其衰機禧釋憫以至常容淳伸之格乃絶禍患之門也契道登真章第四契道登真以致善功三界之敕非礙不通一者物之隨化道之體也應而顯形神之用也用之無用用之至矣二者機臨衆象仰啓瞳矇光而不耀者是以無色無色之色色之至矣三者符空非有執有不空不空之空是謂真空總而通之出乎無倫鞏性無生章第五鞏性無生悅之有化善應則終身無塞外繟寬舒曠然虛靜者人道與天道相通也嚏息和融氤氲應兆皓然精粹者沖氣與元氣相接也舉盻凝祥靈烏降瑞兩耀交光者睛瞳與日月合其明也然則飛玄六洞妙化三宫分而為之九氣聚而為之一真一真之變在乎無為之為也得之與失章第六得之與失應用不同得者貴精愛氣保命頥神抱其道而懷其德也失者矜叨嗜欲意亂心荒忘其本而匿其真也通玄釋僞勃窣威靈開元惺惚者遂即禔毅之功也斂意精思章第七斂意精思怡然致靖內敵琅函頠若嬰兒之貌也攝理之庸順常之豫者誼無過失正性善感其機也謐之則非睟之睟益慜之至也悀之則不覗之覗益昉之及也衷𢓜之變通易無極方隅不疐者是在用無化之化也道偉含融章第八道偉含融肆無不際上覆無極提挈乾綱天圓立像日月星臨垂光晝夜神而通之無不合其明也下宰無極掌握坤柔地方立像山谷盈虛依時泄化萬物生成無不在其中矣至弘至大大無不包至微至細細無不入衍之則混理同機甫攝誼無不和也非道之道章第九非道之道存而忘之順理之常忘其物而存其真者所以致其度也應物忘心棄常之理存其欲而失其本者所以致其卭也哲睿通之不然如斯非見之見是謂真見非應之應是謂真應應化不臨遍知無極之道也衷息之逵章第十衷息之逵知夫致敏靜者制其動正者制其邪順渝之憲鞏質規函存夷之敕者遂即裕常之肇也無所不化章第十一無所不化是謂大通納流而不溢者乃道之淵也凝虛而不滿者乃道之邃也混氣而不盈者乃道之弘也在朝而不明者乃道之常也在昏而不昧者乃道之理也應物而不絶者乃道之化也通神而不失者乃道之信也授命而不擇者乃道之德也司之具足孰證其真背之者乃自投其斃矣釋僞存真章第十二釋僞存真忘機絶慮殉窋俱無誠心篤志處其靜則喧撓不煩恬然守素神息安綿者所以澄其清也處其忠則禁戒無私怡然養浩昶奕淳亨者所以立其信也處其德則謙光晦跡精粹含容純風隱韻所以合其道也真道獨行穢道盡蠲知斯有礙是謂不然至倀至矩章第十三至倀至矩迷悟兩機迷者執其幻也悟者陶其真也真非目視視之則眩於物矣幻非意識識之則證其慧矣神盈虛谷裕必遊方睿而通之者宴坐華圜之間矣背覺合麈章第十四背覺合塵返渝至道有貨之貨預於無貨之貨者得而失之故以身之患也有用之用預於無用之用者存而忘之故以心之溷也有色之色預於無色之色者明而晦之故以目之瞵也有聲之聲預於無聲之聲者而泯之故以耳之䏁也有化之化預於無化之化者拯而侮之故以神之懵也守正歸淳精思翌敏者善嘏絶其尤也陶腆煢徽章第十五陶腆煢徽奚為痯徇囂之與華自執其嚚窋之與慁自致其惛慤孫妍釗奭然有悟惺臒者偃翕靈眸神霄宴息坐致自然自然為然是謂不然不然而然然之至矣讚曰祈真奉教志願諄諄齊心澡雪蕩穢除葷威靈繟奕剿鋭蠲氛忘形留質釋僞存真體如鐐屑用若璘㻞玉虛盈狀靈寶滋純扶曦昶奕契道登晨混元凝祖太一無分先天曆化是謂生神沖明論上清之道章第一上清之道妙化無疆一氣分而天地判二儀合而日月明三才應象萬物滋生頥神運氣保煉元精凝而化之感然有象應之則千真具宰通之則萬聖齊臻千真萬聖無或不在斯悟之明之是謂混微之要者哉玄陽晶璨章第二玄陽晶璨焕明十方散瓊瑛之秀放玉瑞之祥上彌乾綱下覆坤柔恢張萬化之樞斡運千機之柄物不禀而不生神不通而不靈靈滋衆妙昱遍五方之畤者哉沖明赫奕章第三沖明赫奕曨𣋞交光焰炊日月之晶烽熾乾坤之體焕然輝燦周回萬返之靈釋然洞達方攝千𡼢之睿混內凝珠經嗣靈哲升上絳霄之宫宴坐九陽之闕帝命仙真永延遐壽無衰矣元始之體章第四元始之體潔白虛盈純素無物淡泊無形無形之形能育衆形無色之色能張衆色非無非有有無自應非動非靜動靜自隨天不禀而不清地不感而不寧物不通而不化神不受而不靈至道之常人在其中日用而不知如魚在水不識其水人之在道不識其道魚識水則弊淨深潭不吞香餌久而成大者超於吕梁化龍之狀乃得水之妙也人識其道弊居幽靜去華薄絶嗜欲內存元氣外抱神風久而功備者超於玄關化為羽客真人授其度者乃得道之要也表裏精思章第五表裏精思內含靈哲玉煉真形化肌無血體若冰霜者是存精保命之理也外抱靈風神飛展翼輕舉升玄存亡不測透金石遊方之外者是煉神合道之機也動靜之機章第六動靜之機善用不忒明混元象帝之先曉大洞虛谷之外靜則皓曠無心卓然獨立大體絶其塞也動者內施元氣外爍神光混入太虛遍應實其腹也歸宗則純而無雜證祖則睿而不測是以撥築之風心無斷常之見也太素之分章第七太素之分周而三過一者彝敵之䉂綽奕無隅覆載物無不濟者是謂皇宫之域也二者扶曈流燦焕爛諸方長養物無不惠者是謂華陽之國也三者泄化登琳凝祥煒燁混裏含胎者是謂養我之鄉也形生濁質章第八形生濁質盥雪之心心清無欲迪僴其威動則應其虛虛則溢其氣氣壯保其精精壯保其神神不靈而道不清氣不定而性不明明幽不疐與道通真通真之翼出化先天之表也道尊無位章第九道尊無位配偶無雙恢張萬化洪攝千機及乎大道不足為其物未嘗無象之象也山嶽崩摧風雷迅烈及乎大道不足為其聲未嘗無音之音也鑽之九地降逸黃泉及乎大道不足為其深未嘗下玄無底也仰之三天升彌昊境及乎大道不足為其高未嘗上玄無頂也日月星輝交光燦爛遍照十方者對吾大道不足為其明也太空無物洞徹無心寂寥絶跡者對吾大道不足為其虛也至玄至妙是謂萬法之宗至幽至微是謂三乘之祖慧而無窮神而不測者何聖焉乃無上玄元之理也至信不慝章第十至信不慝適然無惄性曆開途龍頡日月之明神翌玄都鳳羽乾坤之體碾路無蹤敵夷非跡運化盤礴之中常居泰華之域也神機之變章第十一神機之變六正同科一者頥身不塞五膽皆通七竅應無不順也二者叩道幽邃極理寬舒大闡象無不包也三者元氣流行周回虛梵布化物無不和也四者沖氣保滿內施不絶融息混理之元也五者胎光微密瞬盻星流參羅鬱密無不保其耀也六者神帝出化日炫高奔珠玉金石無不發其光也上合三宫是謂氣中之氣神中之神道中之道三乘混一如太虛無物之象矣煜遍知明章第十二煜遍知明孰證其慧在用而不契其常在體而不鞠其晊疵之甚愲之深隨流而迷源捨本而逐末遠道之儀者死矣育善之期誠肅之志釋然開化精穆太虛無殊者也志廉貞潔章第十三志廉貞潔謹愼精誠和柔清淨恭順通亨志廉則守真無欲抱道無私也貞潔則居塵不染懷玉無瑕也謹愼則非理莫作非道不為也精誠則直忠非曲正信無邪也和柔則陽生順命氣化歸神也清淨則皎然不垢瑩徹無心也恭順則運用不絶隨化無方也通亨則與道同一純粹無雜也進善不忒乃得道之要也頥精養氣章第十四頥精養氣保煉神真舉身輕麗綽約隨風乘六虛之飈遊乎大方之外者具化無黷隨機順命應變不失其常也下降則同地之寧生成萬物不匠而自合其功也升上則同天之清密羅萬象不炳而自張其明守中無失同虛之化統攝萬靈不傳而自得其度然則含橫巨聖遍歷諸方及乎玄陽者猶斯覆載而不普也道常無物章第十五道常無物混氣通元法天象地長養成熟皆在其中矣假使胎卵濕化蠢動含靈無不賴其德水谷山原金石草木無不借其真矣人若悟之存精無失養浩無虧保煉形神混同一則是謂玄之又玄之理也讚曰太古初張運化玄陽開元神帝瞬目胎光明沖黃甫朗照青蒼下通源海上徹恢綱金堂結秀寶洞凝祥光如玉屑瑩若冰霜融滋丹體點化神方無窮妙理不測真常抱元知足死而不亡圓明論混沌未開章第一混沌未開中於恍惚杳杳冥冥無能辨形溟溟涬涬焉能致明曰洪濛摶握剖判初分顯於元氣者運於至精者也動乎升降者定乎浮沉者也天地弘於覆載日月象於照臨萬物禀於生成通而化之易乎至神無所不可無所不之曰應其體用其真立乎象致乎神乘於政信者可以全其聖功者也道之至無章第二道之至無為之至有有之者神之化也無之者靜之極也動靜之逵天文之象地理之形中息之變固之則存其靈以至於命悀之則播其精以至於性曰焕然非跡釋然有應者及陽全其體也全其體則合其真備其物則纍其身其身不殆出乎天地無倫者哉期彝之勑章第二期彝之勑遜羽知方煢而化者外以閟之內以闡之政以頏而降降以敵而沉曰圜而陶者內以闔之外以闢之政以頡而升升以司之浮曰上之通下之存中乎息非以高明孰能有於此哉一氣之政章第四一氣之政分化形生立其體返乎真政於道者極乎象帝者也曰通之元混之先明於四達表於一真之理者何謂邪政於性及乎命釋然出化圜羽先天先天之制易乎位者可以還於象矣混元之化章第五混元之化氣象之分政于動靜者運乎浮沉者也曰天地立其位山澤通其氣川谷盈其虛虛之致其神曰道化之精氣邪德化之血脉邪上下觀之若芤之體中流之息若楓之用曰近而不可親親之者遠矣遠而不可踈踈之者近矣及乎通化者得乎遠近之所也非以探𧷤孰能理於此哉政于物象章第六政于物象混于致空奕乎性裕乎存左右之所者辨乎精義也順乎理者兟兟之進者也明乎道者悾悾之信者也曰剛之體柔之用剛柔之粹易象之極曰道之化德之生天地分於清濁日月運於躔度萬物從於造化化而欲作常以鎮之鎮之者返于至道之中矣乾元天體章第七乾元天體道廣嘉通會合羣靈者資乎衆妙者也曰愛於天下者天下自愛者是吾至精者也順於天下者天下自順者是吾至神者也曰居中處正與道玄同全其元象任其自然矣誠肅之志章第八誠肅之志唯心之佶伊尹于性性之穆穆然哉不然則䏁之瞵之憮政于未明者也曰矻矻於形愲愲於性者迷之深矣惑之甚矣曰默然而敏之者明而所以通之者何謂邪蓋以聖人明虛無而為體自神化而為用也飛瞳頄釋眩若璘琚拯于至理者焕乎天地之中者也抱一歸淳章第九抱一歸淳中於見素欲於未萌者致乎元象者也返于至道者復于神帝者也曰忘其一致殉窋形名暨乎憒慢者患於終身者也窮乎理者易乎常道者也曰至道之神神之至通明於衆妙入乎玄門奕善之真章第十奕善之真與物不雜清虛曠遠應化無窮運行不息者與天地同其一也情性不專與道之殊者悔之禗之以致於患矣暻之遜之以致於性矣曰抱其真者釋其僞也輔其正者除其邪也曰猶如敵僴之威换然出化善窺俁俁之儀也明於一至保利純亨資乎乾用者乘乎變化之功也乾元彌廣章第十一乾元彌廣渺邈無方其道曰大矣奚為契焉屈伸之兆旬盻靈眸運乎至神者集乎常用者也曰攝于羣心政于一輳臻乎理者孰不能自㬎也曰離其迷入其悟抱其德防其危明資至道光澤於天下者萬物從其化也曰無不安其分無不司其命法此行道利潤於周方者豈不為重玄之始者也道法資純章第十二道法資純湛然不動沖淵若虛者㴭溟無所窮極者也旬乎升降者運乎浮沉者也曰柔順之德嘉美之功隨時渝變化象還真闡乎聯眐者明乎肁暒之終矣曰太玄之際至德咸和頡頏昴昴者晏圜上清之宫也萬化開元章第十三萬化開元致于一真一真之變大無不通細無不際集乎衆妙者明于元象者也曰登琳徽㠭幽邃凝𣪯眑𡪽無隅者淘注伴式之規也伴渝媊戬㬎上乾元俯臨衆象者肁化于太始之先也侗肁之馗章第十四侗肁之馗偉無不濟泛泛溟洋者飛蹤晛奕者也曰夆之致理奚為禗焉未然則倪㑗不保疵礙于惺矣是以聖人之敏默然而定豁然而升者扶瞀闡慧者也曰移睛憭璙其德㰬焉弘于致教者奄攝覆載之者也終於至道章第十五終於至道非執有為不以自然胡之敏曰眐化孰癸精粹之真燦然凝秀者惺乎萬象之元也彝子曰師之有矣曰然哉孰之為曰先天之先至道之始始終不變至道之元元始之化可以吾之師矣曰大哉神明彌羅梵域幽邃無方生天生地萬化存焉隨方而化化之無極從夷而應應之無疆明乎衆象者是吾致道之神者也讚曰上清真教元始開張太玄周匝妙化無疆圓明寶鑑洞徹十方道眼俱備日月交光諸天焕爛遍地輝煌威神繟奕精粹純陽保和太利萬物安康靈源資始哲睿通倡旬乎天地混一乾剛上清太玄集卷之一
