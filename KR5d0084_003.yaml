front:
  text: 上清太玄集卷之三上三
  hash: sha256:c813d583a8d2a82fc834f249025554a0ce06874af400b46143a867a2e6f5d54e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0084_HFL_003-001a, image: hfl/0730/0730-056.png}
body:
  text: 姑射侯善淵述太常玄昭明虛銘大矣哉玄元之教也化導羣迷闡揚宗祖廣博宏辯英彦莫能究其㫖精微妙說庸愚豈可度其源義理幽深眞空莫測包括萬象緫御千眞巍巍罕見杳杳難名至理起於乾元象妙生乎太易統形類而臻乎一體攝羣心而盡赴同機至常之道日用者孰能知矣且天澤潤於羣芳甘苦者自殊其味玄言接於衆士迷悟者各異其功秀而不實物以喪之慧而不純德以衰之失正則返爲竒詐遯善則復爲妖邪内適通玄心清意淨外感明機道備神全昭昭兮進乎元象默默兮昇乎中天天無浮翳焕四氣之朗清地接華夷變一色之純素然而道之虛德之明氣之爽慧之靈忘質昇象可以遊於太上玉京讚曰神氣相感利用屈伸忘形存體挫銳解紛龍遊瑞彩虎嘯祥雲天開火熾地裂光熏道亨明甫德正清淳内蔵衆妙外顯諸仁非象之象不神而神玄靈奕奕星貌誾誾太明洞濟元神銘太易之先二儀未構空洞杳冥元精感激眞氣流通天地鬱象日月開明三才方序萬彙生焉然覆載之中惟人最靈爭奈賢愚不等愚者蔽於一曲昧而失之終身不救賢者明於大同政而理之始道無遺芝菌蘭蓼同其芳而無辨者非鳳雉麟犢同其類而無鑒者悮夫大人者誘天地之正導虛無之精含神光大德化無方惟物不然知其代謝不識其根明於出入不見其門而神降應之沉守其地文與物同化表坤元厚載無疆也而神昇應之浮守其天壤與星曆居明乾元遍覆無極也夷然政焕乎明洞鑒圓成虛極無隅混太沖浩渺無涯也然則忘其形入乎體抱其元返於未始知其所以然而然也讚曰道弘光普德廣彌深神昇氣降天浮地沉安魂定𩲸抱陽負陰烏飛兔走虎嘯龍吟印懸月角劔落波心火中種玉水底撩金碧霞寳桂素羽瓊琳玄光透體圓象盈簪太眞緫要摘微銘經云五色令人目盲五音令人耳聾望而知之曰神聞而知之曰聖離婁能視耳之亡聦師曠能聽目之失明洞微曰博善瞦矀拯於素淨暗也者希其聲者也千里有聲之聲矣明也者融其形者也眐千里有形之形矣朚質曰非也吾之事者目能明而耳能聦之適大象則觀無色之色無不明矣廓大音則聽無聲之聲無不聞矣曔氏曰不然汝之心愠由瞀之不精晄然相若𥇓之至聦䎽然相若之至明鄧析曰聾瞽之甚也以天下目見則無不明以天下耳聽則無不聞以天下知慮則無不知此三者存於不爲者也玄子聞之笑曰由有所待觀彼用心費形胥失其道也吾之心非視聽者至於聦明者也非一形者至於多身者也然則不窮而極不爲而成不行而至不匠而工無可也無不可也無能也無不能也挑達暀圍不可盡然至然無然而然無不然者也讚曰妙哉玄道上德至仁聞知之聖望覺而神凝魂釋僞晦𩲸留眞昇浮沉降徃屈來伸陽明繟繹靈耀慡兟五符瞳輳三色雲臻恬惔淨和素朴清淳内傳金氣玄照玉晨太一沖虛元象銘太一玉虛玄眞緫御生地生天賜元氣而匠成物象不始不終垂上德而普濟黎民有生者皆賴其氣禀化者緫俚其精默然守之未嘗少適閟而定之寂然無心闢而感之焕然有象眞元下降妙化無疆含横廣大金玉容光靈芝秀野保命延昌此者廼應地之沉也元氣上昇昂霄峻臒渺邈羅都象含天質宴息瓊琳妙齡遐感者廼合天之浮也三台共輳五福齊臻混入中元純潔貞心晳凝象外易遘要道之中矣然則葛洪萬卷未詳其趣惠子五車焉入其機金書玉篆須憑師匠而可明寳質琅函全在口耳之悮入輕泄則殃連九祖謹授則福生十方此道者廼玉清聖境虛皇元老無上至眞脫形易象入聖重玄之機也汝乃秘之愼之勿示非人勿示非人矣讚曰上清華方下連中央光滋天瑞昢奕丹祥鐐精滿室璱鬱盈倉金枝點雪玉桂凝霜含横神秀妙化靈陽玉霄羅臺翬適星光上朝聖境面啓元皇福延弘祚永壽時康太寧虛梵圓通銘混沌之中寂寥何有元氣流通純精感激然後眞一生焉眞一應兆神明出化廼無中之有有中之無大則包羅無外廣不可窮小則隱芒無内微不可測氤氲漸著天地混茫清通瑩撤萬象之含光濁滯弊蒙一眞之浩散四生六道或去或來何日之休期五藴九邪隨聲隨色甚時之了首若也迴頭慷慨志烈貞剛慧刀一舉劈恩山之取玉神劔雙揮决苦海之求珠玄光罔象囹圄忘機存精固氣啓通太始之天抱道守一混入靈陽之地周遊萬國頓一體之圓成潤植百川藴二儀之含化至道虛心内藏諸用神明實腹外顯諸仁三心巨智五眼圓明應無住相如月日之澄輝體有著空似盲夫之入闇知不知爲知見不見爲見道能如是修行踵玄門成天下之變讚曰大道無方感之者昌虛寂靈風玄冥丹央太素精明寳華神光五方淨和八極清涼碧瑛羅天紫霄中皇元氣慶雲虛梵瑞祥金簡玉書鳳篆龍章名標仙籍其理非常大盅容素精思銘道無方位德有成虧契於理者無德之可名别於事者有名之可辨彼我同元是非一氣適於非非之是也辨於是是之非也奚爲幻夢若鋒物相吹如此觀之孰能知其然也明於理者隳肢體黜聦明離形去智妙用靈機乘太虛一氣之前冐象帝三明之表遊乎浩渺入於無有之間通於大同水火利刃焉能斃者哉然則三尸未滅六欲不生適陽精則寳符九氣消陰質則道契一眞金爐火熾鳳含海月騰空玉鼎湯煎龍吞寳珠戲水鉛凝汞結丹桂流霞點星瑶昇於紫闕化琅然韻徹清都琳宫積翠寳璨容明華妍純潔啓通於至道之中矣讚曰道德資始陰陽物先胚洪溟溟混物蠲蠲四一玄素二三蒼丹黄華蕩穢紫氣凝鉛氣明三境精耀九天高上虛皇中天靈仙清微寳化禹餘昇遷鬱羅霄臺浩劫綿綿太初混物玄眞銘元罡未判藏混沌杳冥之精一氣始分顯天地日月之象三才以著四達方明燥勝則春生夏長淨極則秋收冬藏萬彙含靈皆迴心之就日千眞易御緫負陰之抱陽啓之明之盻眞元之遘體通之變之望玄象而脫形二神耀素一氣沖明淵淵玄玄出乎乾天冥冥默默莅乎坤元深思兮形忘𩲸散近慮兮道備神全清如玉屑瑩若秋霜寂虛朴淡古實淳恬鄭衛之聲䏁而聦之非亂於耳華麗之色瞀而明之不滑其心泳水蹈火遌之而不慴承虛觸實易之而不危千變萬化無以窮極其爲何哉迺純氣精陽之守也未然則志清淨處無爲絶憂愁除思慮忘增愛去人我抱神守一純粹無雜默朝象帝自然長生之道矣讚曰道齡德昌天玄地黄日月沖明星辰耀光氤氲飛篆元精傾陽萬彙通玄千靈感祥神渝汞白精化鉛霜玉泉玎玎金水琅琅三氣流霞五雲丹英翠微仙眞碧虛星皇太古冥陽洞神銘夫龍漢赤明之前溟涬大梵寥廓無光杳冥昏默不知所然厥後眞精感激元氣流通天地成象萬有生焉然萬有之中惟人爲貴修之則在昇失之則在墮若能迴眸返故體入妙圓守柔處虛隱跡匿光其道曰勝其德曰昌辨之則多辱明之則多蔽得之則多失存之則多亡知進退虧盈不失於天地正中者吉凶利害焉能斃哉其德者澄之不清撓之不濁妙而無爲也飾之不榮污之不辱玄而自然也杳兮冥兮中有精焉恍兮惚兮中有信焉無狀之狀無物之象包羅太極緫括羣方臨邊居妙離物存眞其理有常見而異俗其道有同體而移風迷之則亡眞遘幻幻若波漚浮沉汨没隨流而失於大川悟之則脫殻頥精神光内照虛淨無疵雲收天瑩霧歛日明露太清之華暇現無上之眞元德無不政道無不亨通神易象象適星徽恞然妙化者躡梯玄而昇於玉晨之官也讚曰妙道無方混逷元岡水激丹池滔熾雲房靈音清清天韻琅琅流精金明飛神玉光玄黄慶氛虛白吉祥隳質負陰威眸抱陽九色輝霞一眞煒煌星結鬱羅玉霄昂昂上清玄化瑆微銘大道出乎太極之先上德化于天地之始混混沌沌淪默無光恍恍惚惚焕乎有物物非常物是謂至精至精無象象出玄明忘其形入乎體虛含虛也忘其浩益乎元氣含氣也忘其心焕乎明神含神也其神者象若懸珠珠無形質應無不現同於水象乎水同於火象乎火同於金石象乎金石同於虛無象乎虛無上窺青天仰之彌高下潛黄泉鑚之彌堅揮斥八極大方無隅在天成象在地成形太虛廣漠其中有神神機運化應無不周適其形形化氣適其氣氣化神適其神神化虛適其虛虛化道道適圓象象若星儀星儀由適適乎太始之元先天曆化是謂逸士名遂之功者也讚曰上清玄境理寂幽深元神昇降象帝浮沉肇制天地運移古今炎陵鳳叫水谷龍吟彌羅仙梵洞徹靈音日輝丹桂月照瓊林妙祥豐鬱玄瑞盈岑出乎雜類純一貞心曆超象外叡哲來欽太無萬梵天光銘道之可無啓之而不無德之可有感之而非有默然虛淨湛然常清谷神出化一徃一來推日月之昇降元氣流行一上一下隨天地之浮沉迭運陰陽而物生焉遷移寒暑而歲成焉四通五泰九和十合闡而明之眞不離假閟而昧之假不離眞迷悟同途緫歸其要仙凡異路各適其玄背覺合塵返遊魂之遘幻輔正除邪復疐𩲸之登辰聲之無聲大音不亂於眞人之耳色之有色高明無啓於愚鄙之心失常之理見而不見始落頑空契道之機知而不知終歸實相大成若缺豐智源而不示大白若辱襲其光而不耀抱其元藏其虛督其精奕其然愫而理之毖而適之三一忘𢡰混内無分象出先天道斯明矣讚曰太虛渺邈感而咸歸天眞有期公正無私清圓玉衡琅然璇璣擬諸形容象其物宜沖而不盈約之無虧湛然泠然玄之妙之上元清華中天紫微神函至精星貌徽徽上清太玄集卷之三
