body:
  text: 姑射侯善淵述林泉養浩寂寞山居好蒼峯只一家問云何是道笑指洞雲霞寂寞山居好溪深水照天問云何是道笑指玉峯川寂寞山居好臨風對月華問云何是道笑指翠煙霞寂寞山居好雲橫碧洞長問云何是道笑指雪中霜寂寞山居好煙嵐碧嶂間問云何是道笑指白雲間寂寞山居好林泉跨玉壺問云何是道笑指一輪孤寂寞山居好黃梅噴苑香問云何是道笑指滿天光寂寞山居好孤雲鎖翠巔問云何是道笑指鶴沖天寂寞山居好青松倚半空問云何是道笑指上靈宫寂寞山居好柴扉半掩斜問云何是道笑指夜明砂搜真絶念父母元情戀修行志意參問云何是道笑指慧光耽兄弟無情戀修行志意功問云何是道笑指慧光通妻子無情戀修行志意推問云何是道笑指慧光輝兒女無情戀修行志意搜問云何是道笑指慧光流恩愛無情戀修行志意侵問云何是道笑指慧光斟名利無清戀修行志意猜問云何是道笑指慧光開酒色無情戀修行志意求問云何是道笑指慧光眸財氣無情戀修行志意窮問云何是道笑指慧光瞳富貴無清戀修行志意尋問云何是道笑指慧光心世類無情戀修行志意明問云何是道笑指慧光睛破邪歸正莫覔鉛中汞休尋汞裏鉛問云何是道笑指玉花蓮何必搜心腎無勞論肺肝問云何是道笑指古長安莫論周天法休窮火候功問云何是道笑指水晶宫不必修陰性無由養幻心問云何是道笑指水中金莫覔龍和虎休尋姹與嬰問云何是道笑指暮雲晴服餌多生病休糧腹轉虛問云何是道笑指耀天珠潄咽重增病吞霞謾役情問云何是道笑指水銀城達士何燒煉迷徒説採陰問云何是道笑指曲江心不煩頻禮念焉用日持齋問云何是道笑指桂花開莫論精和氣休窮虎與龍問云何是道笑指玉芙蓉忘機息慮性拙心難悟情迷道不通問云何是道笑指紫微宫擺脫名韁絆衝開利鎖牽問云何是道笑指古溪邊世事多縈繫修真理不繁問云何是道笑指火龍翻性淳無橫禍心直免非災問云何是道笑指落紅梅情忘心返朴意滅性歸淳問云何是道笑指上靈椿了真非執相悟理勿勞形問云何是道笑指轉燈庭念濁心難悟情昏性轉疑問云何是道笑指太淵池名利時時少功修漸漸多問云何是道笑指翠煙蘿心寬包法界量窄不容毫問云何是道笑指鶴飛皋貪淫心性昧戒色氣神靈問云何是道笑指月華清開明演化達士歸真正凡夫盡落非問云何是道笑指月明溪後己為真行先人體聖功問云何是道笑指白雲中欲要登仙位須憑志篤堅問云何是道笑指月當軒有客尋機要無人達妙玄問云何是道笑指五千言無為猶是幻有作又成非問云何是道笑指紫靈芝三教歸一體萬法悉皆同問云何是道笑指太虛中盡被無明障都緣業火牽問云何是道笑指日光鮮指迷如引線得悟若穿針問云何是道笑指玉壺金見有非為有言空未必空問云何是道笑指坎離中欲求清淨法莫共利名交問云何是道笑指白雲拋通微真要玉女籠輕素金嬰裹絳紗問云何是道笑指日晶華海藏凝珠翠龍宫伴水銀問云何是道笑指玉京春鬼子穿金户神公透玉窗問云何是道笑指汨羅江黃婆乘白馬赤子跨青牛問云何是道笑指月當秋乾坤相否泰日月自交光問云何是道笑指水銀行抽添分水火加減辨陰陽問云何是道笑指白雲房金龍蟠寶鼎玉虎繞丹爐問云何是道笑指一冰壺風吹寰宇靜兩過暮雲晴問云何是道笑指太虛明幽微神莫見玄妙鬼難看問云何是道笑指玉爐寒沖天生瑞氣滿地泛靈砂問云何是道笑指美金花除邪決正鼎煉三尸滅爐燒五鬼亡問云何是道笑指碧天長剪斷青龍尾劈開白虎頭問云何是道笑指月華樓豁開金水岸劈碎玉京山問云何是道笑指夕陽關慧刀誅鬼魅神劔斬妖魔問云何是道笑指上天河龍吟青霧起虎嘯黑風生問云何是道笑指太陽星劔封三界靜符鎮五方安問云何是道笑指玉虛壇強兵除六害戰勝殺三尸問云何是道笑指轉光旗敲開無縫鎖打碎鬼門關問云何是道笑指玉連環屏欲憑神劔除情仗慧刀問云何是道笑指月登高酒色財和氣都來一劔揮問云何是道笑指白雲飛頥真釋偽滯法難明祖窮經不見宗問云何是道笑指玉華峯見物中無相明空復有形問云何是道笑指古風庭堪歎浮生事於身不久長問云何是道笑指甲龍光濟物難明性回觀認本心問云何是道笑指洞淵深上通三界遠下達九幽深問云何是道笑指碧波心盡説無中有皆言有裏無問云何是道笑指太玄珠地裂分金井天開湧玉泉問云何是道笑指月中仙迷邪千里遠悟正亦非遙問云何是道笑指玉芝苗執有皆非有知空未是空問云何是道笑指碧潭中無心由自障作相亦為魔問云何是道笑指定風波混俗無雜念和光不染塵問云何是道笑指自然人月澄天地秀風靜太虛寬問云何是道笑指紫金丸雲根生瑞草水谷秀靈芽問云何是道笑指玉皇家擊物三江響敲空四海鳴問云何是道笑指洛陽城壺中收日月鼎內撮乾坤問云何是道笑指太玄門赤蛇水底轉鳥龜火裏朝問云何是道笑指徹丹霄滿山輕霧起極目淡煙橫問云何是道笑指雨初晴水中青到蛭雪裏白蝦蟆問云何是道笑指大牛車金雞如走玉玉兔似飛金問云何是道笑指五雲深志清如玉潔謹靜若冰清問云何是道笑指玉京城三一混元東海陽光燦西江月色鮮問云何是道笑指地和天燒成兩鼎藥煉就一爐丹問云何是道笑指玉京山頥神如朗月通道若清風問云何是道笑指玉晨宫兩條玉柱杖一對剔天關問云何是道笑指雪三間木人三隻眼石女兩雙眉問云何是道笑指水牛兒嵒前開兩曜頂上現三星問云何是道笑指洞圓成劈開天鼎眼露出杳冥精問云何是道笑指紫芝生睁開眉底眼露出目中睛問云何是道笑指珏光瑛道心常不昧法眼自然明問云何是道笑指素光清舒眉開慧眼後目現神光問云何是道笑指露明堂題題題訣正除迷開妙教演真機分明真指脫灑無疑妄言天地折速報業相隨兩眼滴為凝血一身墮落傾危酆都永受刀山劫萬刃攢身銼肉泥訣訣訣方便提挈救群生無分别大道明傳天機漏泄煉性似銀霜透入玲瓏雪放開兩道清光抱定一輪明月壽同天地永無窮不離目下朝金闕善善善慈悲方便行周旋功施遍普濟群生不分貴賤應物顯真常露箇靈雯面一條氣焰明空兩點神光出現祕受天符玉帝宣金童引入長生殿惡惡惡嫌貧欺弱損道德行輕諾善惠不為凶豪喜作狡佞虎狼心很毒窺人藥酆都譴責無詞罪感剛鋒焰爍寒冰凛凛劔千層身遭悔懊前程錯戒戒戒於身穩快去三毒除六害斷除邪見莫學奇怪今世不修真來生還宿債清廉謹愼無私處一勿生憎愛聚散氤氲噴苑香祥光結就天花蓋定定定頥神養命守真源歸真正默默澄清寥寥虛靜沖玄固蒂真契道心通聖自然百怪潛藏始覺萬神齊慶混合靈光入太初空中現出明心鏡清清清絶念忘情修正覺頓圓成海靜沖虛浩洌林京玉壺秋水冷金井碧寒傾雲開露出高天靈臺皎潔分明三千境上澄神廓月樓獨坐看蓬瀛靜靜靜虛心入定立真功修真行灑灑清涼澄澄覺性湛湛素波淵渺渺秋江映三天明月無塵萬里仙風碧瑩物物頭頭一劔揮孤然獨坐修身命稽稽稽歸元復始有中生無中起神遊溟漠貫穿表裏內外覺虛空三陽流入體同塵物我歸元萬化生乎無彼碧潭一派起寒光遍照蓬壺明徹底首首首通神户牖望南辰盻北斗千變之尊萬化之主運機天斗柄斡轉夷門肘闡開玉兔金精混合靈空惠口曠然溢目遍生涯升玄道太無中有珍珍珍無舊無新除貴賤絶踈親自然升降暗攝鬼神光明沖赫日皎潔瑩無塵大道同觀一體悟來無我無人七寶林中嬰姹戲高空風月近為鄰重重重無極無盡日月同天地共遍濟虛空撼搖不動奣鄂不纖瑕赫奕寥無縫用吾大力神通拶碎細微可近任從烏兔往來飛靈光始覺知常用修修修慷慨回頭開道眼闡清眸華池沖滿神水盈流日光明淨境月瑩照清秋坐看天文玉篆行騎地馬金牛昊景經行無過迹越踏天空物外遊行行行謹愼至誠修上士處無爭頥神養氣保命長生步虛通大道旋繞踏空清古徑端然夷正不迷郊野奔傾路土紅塵飄不到一程遊玩上琳京刀刀刀三尺吹毫無垢膩絶塵囂剪除鬼魅劈碎塵勞山頭擒兕虎海底斬龍蛟夜寄南辰北斗明封海嶽天腰樣入空中人不識一條清氣上丹霄槍槍槍致大無方輝日燦耀天光善降鬼魅戰退魔王豁開圓覺海刺透碧空蒼立起衝天拄地橫持鎮壓邊疆學人還會金槍法不戀蛆蟲臭穢瘡龍龍龍異出超群行勇猛坐英雄口噴炎火耳咂寒風兩眼藏日月一腹納乾坤舒爪扳翻法界磨角擦透崑崙一聲霹靂驚天吼三江四海盡知聞虎虎虎中央牝母衆獸王群山祖勇猛英雄乾坤主甫一毛吞四海兩眼消今古扳山動地搖天跑空踏開紫府怒然哮吼聒天衢一聲震地驚玄武神神神無相法身心之寶道之珍大包天地細入微塵撥開星斗柄斡轉日光輪暗藏不測之機明分太古玄真砸破千門開萬法長空灼灼化陽純氣氣氣無遮無閉天地根虛無系大道相通神機相契匝界混元沖沖和周普濟綿綿運息通融默默頥真相制自然虛谷化元神玉花散處朝天帝明明明地靜天清太虛闊曠然宏寰中虛靜海島雲晴旱日炎炎燦神光睍睍凝照鑒萬物臨晞銀淵滿目夷平靈空任我精神戲玉童跳入水晶城精精精透日沉瀛氤氲秀瑞氣生風恬浪淨泛暈流星交光烹玉雪耿耿月華明乾坤立為金鼎漱溢滿水銀平昕天擊玉翠霞琳燦燦寥空現太清真真真瑩淨光新細無測大無窮彌羅元始梵昊夷通風清飄坎户月朗射離宫在欲神淵無欲居塵道大無塵道兮非道知常道神化無神所以神空空空太極相通含大象盡包容五行不到八卦難窮寥寥沖上下落落任西東無迹無形無影非青非緑非紅亘古亘今難辨别強名大道立乾坤見見見本來頭面開慧目神光睍鑒焕無形太空出現兩道雷光飛燦爛銀如練隨機物我同居應用知常萬變一輪慧目射天階玉嬰跳入通明殿聞聞聞審意沉沉歸本性覺真心滌除鄭衛聲色不侵是非焉入耳常聽虎龍吟不鼓自然天樂鳴聞太古之音惠谷聰聰清韻響一聲透入九霄林知知知內外天機通真妙達玄微無修無證無作無為玲瓏光翡翠龍子昱朱衣表裏明通瑩徹心開萬法皆非寰海一輪心月顯精華閃出耀光輝覺覺覺周遭一匝有神通無名朴遍體虛空法亦非法達者本無為不悟雙睛瞎分明説破玄機對面神思渺邈一條天徑淨無塵金烏迸散銀光撒盡盡盡地搖天運透谷神通玄牝習之彌遠用之彌近遠望越天衢近者通方寸尋尋地角無蹤渺渺娑婆不動睍銘清虛體太空陽淵廣大誰無分德德德杳冥恍惚外虛心內實腹月匝離宫清風入國一顆耀天珠照破無明黑同塵耿耿融和貫世蠲蠲無物一陰消盡一陽生虛空遍濟無瑕玉可可可無因無果絶貪嗔去人我意靜消煙心清滅火踢破祖師關掣開龍鳳鎖瑕琳寶貝無窮內隱玄珠一顆玄珠分處玉嬰朝滿懷抱定金蓮朵儀儀儀照坎明離神相契道相携望空拏住心上無迷天清通妙法地靜得幽微天地心同一體明分曠劫希夷亘古綿綿無所契神遊碧落太淵齊為為為了正無迷開性覺悟心知滌除作用不念禪機般般都打過物物劒光輝體合天空海靜悟來萬法皆非玄中自有香風動神化澆漓月滿西常常常靜坐消詳頓靜境覺清涼開明童子引入仙鄉篆煙籠地秀炳燭耀天光賜我蟠桃桂酒醺醺醉卧高陽驀聞一𣲖清音奏玉女爭扶入洞房陽陽陽遍滿諸方德顯化道開