body:
  text: 姑射侯善淵述繼古韻和骷髏頌十首骷髏非骷髏非一堆白骨卧沙堤榮華富貴今何在空伴白楊千古碑骷髏貪骷髏貪名利財色飽經諳劈碎塵勞居物外一靈真性出雲庵骷髏嗔骷髏嗔滅火灰心絶我人養就神光沖碧落一天空淨掃紅塵骷髏癡骷髏癡識破般般總不知抱守一靈真覺性祥光冉冉昱朱衣骷髏憂骷髏憂跳出浮華萬事休坐看一天元始道凝空心月照清秋骷髏知骷髏知回光返照不思議認得本來真面目靈光一派接天齊骷髏笑骷髏笑恩山裂破搜玄妙遍觀天地匝虛空圓明亘劫無虛耗骷髏言骷髏言了達希夷不假難空中養就無名物冥冥杳杳接光寒骷髏説骷髏説一條玉柱通天徹萬道霞光倚太空真心始覺自然别骷髏休骷髏休逍遙坦蕩樂無憂蛻殼任遊天漢國乘鸞跨鳳入瀛洲又繼古韻地氣騰騰漸結凝亂橫天漢太無晴被余拂盡昂簮看獨顯高空惠日明一掃碧天空宇靜皓然三界暮雲晴懷中抱出團團月萬象參羅絶點明迷雲拂盡三山瑩俗霧衝開四遠晴直下邊強安足定昂頭一匝太虛明覺海澄澄秋水瀅寥空湛湛素波晴靈童捧出無瑕玉光耀無邊處處明久匿昏衢天地暗雲收霧斂豁然晴隨風抱下天邊月萬象叢中獨自明舒手擘開雲漢頂杳冥廓落太空晴乾元許我神通大睒爍陽光萬里明又繼古韻豁然一點達真機奪得玄珠世罕稀瑩淨不繁塵污染侍香金鼎篆煙飛琴堂默默頓玄機門外苔青過迹稀道院寂寥無俗物松風飄落亂紅飛了達真詮上上機空中髣佛絶塵稀陽光一點穿無有穩駕香風鶴亂飛吾留一法奪天機占了神功絶世稀自有靈童朝玉闕汨羅江上跨龍飛了得玄玄絶妙機豫家至道罕然稀空中蠢出無名朴一點靈光天外飛金關斡轉運樞機數點流星出世稀神力拶開乾坎位撼搖滄海搏天飛遍應十方遍滿塞氤氲飄落人間處處通神契道淵炎日瑩性同圓海月華風元始天尊設化遍娑婆普濟蒼生道氣和返照還元拋雪浪回光玉露灑星河通真識破皮囊幻化身細搜玄妙躍凡籠坎離迸出神光爍日月相交透鼎紅體用道力神威遍大千無形無影透山川曹溪浪淨遊魚戲天岸波清覺海淵背覺衆生不覺過青春昧了靈明浩劫真躁性凶頑多執閉無明火發縱貪嗔迷真眼前日月隔天涯滿目清虛翳膜遮洗滌囂塵明返復玉嬰神變洞雲霞運化一氣虛無太始中高空爛熳曉霞紅包羅宇宙無纖翳照破乾坤慧力通沖和祥煙塞户藴金關橐籥虛空任往還流注水銀平滿鼎雲濤高泛玉京山開元初發玄元道氣生壺中一味雪花烹通流灌鼎瑶池淨咽罷還純透體清混合鉛汞相吞入鼎爐烹煎日月煉虛無崑崙火發無煙焰養就神丹射玉壺神淵渺渺仙源海眼深雙泉輕泛水中金龍藏潭底風波定虎卧溪邊運古音聚化皆成大道化神功撮聚玄機入鼎中煉就金丹光皎潔一丸封上五明宫擒玄江邊扯住烏龍尾頂上扳翻白虎頭奪得夜明珠一顆千條光焰接天流雙關神鬼相交各所情自然心定顯真靈能教姹女扶桑戲解使嬰兒弄月明升降三宫升降産靈芽爐鼎飛霜吐翠砂輝落滿天紅蘂綻乾坤遍撒美金華開明道眼觀天一派清還將寶鼎水銀平紅霜片片飄金户白雪團團降玉京生成陰陽交换稟天然萬化生乎一法蠲得一無拘真自在逍遙獨暢箇中玄真人靈寶真人法位尊常登月殿躍神林三清境上遊空廓四海鳴聞玉珮音神化真人獨坐隱雲寥凝翠煙嵐接遠朝寂上撮睛光月聚玉蓮羅列兩三苗胎光周天一點流星落遍照壺中光閃爍煉就胎仙入故鄉悠悠永住三清閣通明火翳點開通法眼無明撥盡透星羅高天推出千堆玉平地騰空萬丈波曠體無名無我亦無形一體同觀古帝京淺智鈍根生執見豈知光列眼淵明真筌太玄真覺出塵勞頓悟虛心道眼高自有玉童朝紫府鬱羅天上跨金毛威神豫抱天風真夙骨因師點化作仙才寰中莫有銅頭漢舞劔交光劈寶臺仙桂月宫丹桂無人折紫府蟠桃向日開二物採來收入鼎一般香味馥仙階混物凝真森森接蒼天浩鬱臨空鎖翠煙高捲碧霞開月殿夷門羽化列金仙神劔磨開三尺如霜雪日曜爭光飛電撤昨夜三更法報讎青鋒點污猩猩血識破利名財色勿剛求火院何時是徹頭爭似逍遙雲水客杳冥空外得真修出關笻杖橫挑巨藥瓢雲袍風送過浮橋袖携三尺青鋒劔斬斷烏龍數百條精微精聚玄微道太明移神寰海樂清平一陽運入三花鼎二氣收歸七寶瓶水火東溟滚出燒空火西海澄凝浪碧紅二物混成天地秀滿朝精耀遍和融廣慧劔斫金山石火流三尸併盡萬緣休被豫撒起謾天網撈箇虛空似日頭有無空裏尋空認得空豁然空裏見神通從今不問紅塵事自有瓊花滿洞中秋夜一氣盤浮絶漢晴蕭蕭夜雨灑秋聲時人不見常娥桂唯我蟾宫獨自行威光萬緣豁盡消諸業頓覺希夷絶妙玄數片黑雲揮島外一懷心月滿空天元和一氣初分天地判三才立象化靈機移心返入黃金室産箇明珠照幌幃訣正道德陰符太始篇學人不曉謾求仙金書玉篆人輕棄怎辨吾師玄又玄靜用誰向玄中立靜機湛然常守太淵池日輪斡轉開心徑天地常觀作細微絶念身靜心清意亦清內容常守氣神寧搜開寶藏玄珠燦光鑑蓬壺萬象明降龍擘開天頂任遨遊正見蛟虬戲廓舟大喊一聲山海破劔尖追下赤龍頭神丹一顆飛丹鎮上方元神精燦日爭光炎凝焰爍燒空界嚇退群陰盡化陽神通按劔神威過華陰咬牙忿怒騁胸襟攢眉唬破群魔膽睁目驚摧百怪心通玄離欲虛心開慧目凝空晴倚無瑕玉玲瓏翠色放英華遍照十方知可足混合降落天魂騰地魄沖和上下無瑕謫太方周匝遍無隅走玉飛金相間隔功高道德清名播海涯天厨賜福善功加有朝翔翥飛霄漢升入雲深弄翠霞神威偶因携劔上天羅殺退群陰百萬多玉兔驚回尋窟竅金烏飛上桂枝柯威靈坐間飛劔騁神威摧落天綱太華齊扳下月宫擒玉兔蹉翻日殿捉金雞離降聖觀已同達士明真偽不契迷徒説是非有日丹成飛宇宙太虛曠體是余歸陳仙問空中不空至道無形若太空移神混物體皆同江山極數猶存此天地無窮在彼中賈仙問不空不有不空不有是圓成執此圓成亦假名了達太玄生實相相中無物湛然清郭仙問玄之又玄問道玄中復有玄立機天外一重天混元上下無纖障妙化圓通大覺仙黨仙問杳冥杳杳冥冥精恍惚神威拶碎天筋骨凝空豁落太淵明獨立乾坤無一物劉老先生問體用不知仙路神用仙機體大方凝陽闡出好祥光先生已得歸真路不覺隨風入帝鄉焦小仙問出家擺脫塵清業火牽功名富貴盡除蠲男兒已立衝天志奪取名標挂列仙劉先生問真空妙用真空至道杳無蹤妙用頥神萬象同太一壺中收皓月廣寒殿裏弄清風董仙問至死不退盡終一志若初心至死無由入罪林常守藥爐三鼎玉每存丹竈一壺金李仙問不屬中間與內外外遍無體內無修中道離微絶所求萬法一齊俱拂盡更無間事繫心頭齊長老問大道忽然頓覺悟心珠照破塵寰一物無道士得資為正教禪僧以此號真如陳仙問龜毛兔角木馬嗥天磨兔角泥牛吼地刮龜毛生擒二物歸黃道永鎮乾坤不動搖梁仙問入道歸真幼年貞烈若冰清夙有仙風慧骨靈睡裏唤回開道眼夢中驚覺頓圓成大張仙問不居山不住庵只此一著如何頓放以此故述二頌不繫青山不住庵神飛天外出煙嵐鶴隨紫府朝仙主鳳引寥陽謁老聃跳出茅閭不隱山蹉跎信任樂清間隨風永住乾坤裏抱月常居天地間張仙問不觀假相所認真形一堆臭穢終歸假兩點睛光不足矜欲認本源真法體同觀相外若飛星齊長老問鵝在瓶中長大飛出兩般俱不壞生居小隱入瓶中不懼翔鸞意氣雄欲問兩全俱決聖鵝飛天外寶瓶豐郭仙問火裏清涼焰火炎炎燦日光形神俱妙得清涼永同太始無增減已得玄元立久長李仙問證道相逢目擊道知通識破千經萬法空不在名山頻禮問免伊雲水苦參同郭仙問至死不迷大道一條平穩路蓋因自昧不知歸豫今指你通天徑升入瑶宫辨細微董仙問曹溪認得曹溪兩路侵京山掩映對雙林雖流小水成涓滴透入靈源覺海心黨仙問上天梯先生欲識上天梯立玉橫金倚翠微若到蟾宫觀此景也教惺爽悟丹機雷仙問至神合道道法三才已久長神通至妙覺清涼混成一氣歸元首獨立先天道德鄉郭仙問不神而神凡夫都總祭邪神誰肯回觀認本真若向此中心決正清涼路上笑紅塵閻仙問內外相通閉目澄虛達妙玄開光應物混先天沖和一道祥光起透入寥陽象帝前張老問國之利器中元上德明金國三寶盈留光美玉物利常將潤百關皇天賜我真清福王仙問希言自然希言至道自然别不似飄風時暫歇道德常同樂亦之通玄無失妙清絶張仙問知白守黑放開慧日照千光上下容明盡化陽夜靜抱元常默默寂然不動應時長大閻仙問妙法大清妙式洞虛玄達者心開渡法船越出洪波登彼岸元神透入焰陽天劉老仙問三教歸一如來妙法談真性太上玄機説太丹孔子五常明日用三乘混一太虛間老子如來孔聖同世人不曉鬥爭風假名三教云何異總返蒼蒼一太空小張仙問生之畜之道發機生德畜之陰陽泄化自依時若將此理回光照仰望蟾宫看桂枝董公問虛無生有道法虛無本自然生成大地覆三天中間日月明空象開闢陰陽萬古傳張老宿問甚門户是修行清淨門中認的端莫教塵事向心攢林間若指曹溪路坐看如來入涅槃張仙問天性人也天性冥冥通祖道達人以此稱名號頥心機密混中元此是神仙真祕奧王先生問日用道德慈惠忠廉志氣清澄空顯出谷神靈執其大象安平泰左右逢原玩玉京陳仙問無遮無閉太始門開通慧目靈光照徹明虛谷谷神不死永安康遍納諸方無偃塞大閻仙問善惡果報惡行自招災禍應善功天賜福相隨吉凶兩事由人造至在臨時各自為王仙問三要混一剔起上天一鼎竅精光赫日通明照玄元生殺立初機三一混成真要妙張仙問內中日月日月交光大小分燒丹方使鼎爐薰聖功漸覺神明出乘鳳凝陽謁帝君張公問升降浮沉日魂月魄定浮沉上下融明大小侵聖智剖開天井玉神功拶出滿坑金大閻仙問三一無分靈波滚底三光秀神水盈流一法均獨立寥寥知有象孤然默默混元分勸道衆學爐火時人都總學燒金誰肯除貪煉本心達道不教財色染修真何用利名侵陳仙問絶學絶學無憂通妙理乖慵懶墯不成真若將懵懂為仙道騃女忙郎盡出塵大張先生問性命視之無物聽無聲視聽猶然亦假名這箇本來無可比有如風月照天庭惜氣存精養命機坎中神火復燒離一陽生起乾元象丹就升仙謁紫微陳哥問無疑離覺無聞絶見知契神合道兩忘機心中不起無明障妙化升玄入太微陳公問北斗七元橫海運樞機斡轉天輪萬象隨斗柄指回開上竅衆星拱受至玄微陳小仙問大國烹小鮮大國無為帝象權民安其業若烹鮮鬼神相會中黃位日月扶真合自然勸門人善惡不定心有二用天網恢恢覆載通察人善惡在其中好將志氣歸真正免使功勤盡落空許仙問獨立而不改上清至道獨為先混一無生大象全寂靜卓然無易變亘初常在立幽玄許仙問混物而無窮一顆靈光射太空混然獨立遍無窮古今不改長如此大納乾坤一體同張仙問歸真明物開元剖覺明真物善達先賢同上德內抱靈源杳杳精外存神識昏昏默黨仙問天地為體虛空為用天象乾元地象坤陰陽否泰併相吞剛柔已定浮沉位中道虛心慧日奔張仙郭仙問在家修行同塵不染善居家在欲無私别世華不若張騫超苦海張河天賜抱靈槎柳老宿問佛因果大