盻清圓不見又還重缺光接光接玉桂寒林冰潔訴衷情林泉退隱作生涯寂寞棄繁華中山翠微仙子滿目泛靈砂凝素液混丹霞坼瑶葩雲濤煙浪島外方壺那裏人家太虛寥廓杳無涯元氣混中華回眸斡旋鼎鼐玉液泛金砂輝神彩迸光霞晃瓊葩雲收波渺海淨天空廣漠之家夜行船盥雪囊中無俗物恣踈慵有誰拘束不患虛名無榮無辱佻佻幾人相逐獨坐絃歌巵盈醁昂簪看斷雲相續池上遊龜洞前行鶴風月水山松竹可借芳年窮妙理中途滯教門無主道院凄涼故人踈淡那更暮天愁雨塊坐賔橫空無語赤心訴有誰知委拂袖歸山碧溪深處説與落花流水酹江月寂虛妙道混杳冥恍惚通微清絶出化先天明象帝滿目流霞光屑濁質消亡琅函滋益寶鼎靈砂結丹華凝秀素玄一色澄徹精䁘㪇抧盈空清如秋夜海桂無圓缺耀古輝今沖晧氣滿滿玉壺春雪瑩日純精貞心幽粹保益真仙悅丹書迎詔上朝三景羅列玄元至道大無隅寂寂寥寥獨立遍應諸方通上下極目天光微密隱顯存亡穿無貫有善用無轍迹琅然泄化太虛一點靈質登林透入真陽圓明普照不許纖塵匿理必期然仍未悟説與門人端的日殿祥光蟾宫瑞彩萬派瓊波益神凝形釋玉嵒依舊橫碧南柯子瞬目迷千劫揚眉隔萬山一真分瑞出雙關混入華元到此有何難隳質飛金翼疑陽透玉環惺然洗覺夢魂間雲去無心物外獨清間決列心清操真剛志氣真超然不落斷常坑眼界寬舒焕焕照華清錦繡乾坤瑩玲瓏世界明澄澄虛璧頓圓成蛻殼精䁘一點碧天星厭靜曾居市嫌喧却住山通真何處不清間內外逍遙不備利名攀蛻質空中顯忘形物外觀二神凝素出陽關鶴性佻佻一去古長安紅窗逈玄門尋休胡覓指汝等修行端的常清淨意不浮遊保元精無失煉陽魂消陰質兩眉間神光飛出通斗柄斡轉天關抱一輪紅日棄凡情歸真理擊雙關玄門高啓吐神光射透簾幃現靈陽妙體金烏精玉兔髓晃乾坤清華光暐紅窗迥昞曜圓明照蓬壺徹底點絳唇背劔携笻躡徑穿雲過青苔破嵐嶂松邊拂石臨溪坐酒飲單巵一弄清音和無不可孰與朋儔明月清風我秀色氤氲鬱鬱繚空廓光飛爍夢適吞珠一點胎星落謫降人間愧恨當初錯情消索誘引門生共赴青都約江月晃重山斗柄指回一性璇璣斡轉雙關滔天洪浪雪華翻中秋夜江月晃重山獨步上星壇劔光橫宇角逼人寒五靈仙子抱青鸞飛入華胥閬苑太平令芝堂無事啓丹經香煙裊慧燈明聲和流水玉音清雲收絶霧斂眄平一色瑶池淨洞天玄照瑞光凝分明見豁然惺回眸返入道圓成便忘形羽化虛皇付我天符令武陵春太上混元真一氣瑩淨若瓊琚清勝白雲不卷舒明見有中無冷淡靈光空蕩漾變現總無拘上下周流出六虛一顆夜明珠一葉梧桐窗外落金菊出踈籬策杖昂簮信步移迷我曲江池鶴駕匆匆歸舊路回首赴仙期雲映青童笑問伊家住武陵溪黃鶯兒呆老呆老幻夢惑迷一生顛倒甚每日皺著眉兒把身心作惱勸汝回頭歸大道搜玄微幽奧煉丹光混入中元現玉辰容貌惜嬰嬌猛悟回頭把塵事都忘了急收心速歸大道空裏尋真向無中傳明教最好現丹華回光返照探賾精微表天奕幽深奧明內外浮沉顛倒一氣雙關混百神分三要玄妙瑞雲扶玉辰容貌轉調採桂枝分明相外歸宗祖道眼俱全出入綿綿升降浮沉任往還最幽玄日精月髓安爐內一氣烹煎丹就凝然皎皎光明衮上天化飛仙望遠行太玄妙訣悟來不須言説心地豁然開覺清涼內通徹透五藴山頭現山霜天皓月照千古分明無圓缺赤子琳宫歇敏把丹枝折玩長春景界洞鑒離生滅向無陰樹下獨坐逍遙靜絶聽無絃曲調於中别上平西啓玄精明真氣洞元中間日魂月魄相融內分三色混然一體若芙蓉玉辰圓鑒瑞雲浮光射瑶宫散陰氛凝純粹歸神化運靈空象懸明燦耀玲瓏中天遊奕鬱羅霄景玉音清絳節霓旌捧瓊輿寶梵仙風沁園春處世為人德重恩深莫過二親始懷胎十月三年乳哺回乾就濕多少辛勤長大成人心生五眼外姓調唆各令門誰省悟似鴟梟𧓄報應因巡休休枉恁勞神更莫忘當初懷哺恩念靈烏返報寒猿避箭誠心孝敬何况為人諸事不違順承顔色飲膳寒溫時用均存終始道光于四海德播清淳啓訴芳年猛悟回頭縱情任真棄父娘兄嫂妻男姪女孤雲野鶴二十餘春風瑞漂萍隨方安分一任交人笑我慵君休怪厭浮生虛矯省悟前身明知相外元神燦寶淨無瑕絶點塵易四時乘馭指天為蓋地權為載日月為輪輾破星河衝開牛斗聚散浮空五色雲通三界現虛皇聖祖元始天尊滿庭芳糧畚擔簦雲山水陸遠途不避風霜為求天寶與汝訴衷腸至理先明一性二儀現三殿恢彰玄關外臨空奕奕杲日布紅光群靈皆受命誰能保守玉府元陽萬神交燦九氣混中央結就玄珠一顆輝神彩光列南昌寥陽館華房出入齊唱滿庭芳上清太玄集卷之九
