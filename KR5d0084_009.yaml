front:
  text: 上清太玄集卷之九上九
  hash: sha256:f4e6e1b09c3396aa851a16481994ca3273b200480536120ff311406a3ce8ce19
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0084_HFL_009-001a, image: hfl/0731/0731-100.png}
body:
  text: 姑射侯善淵述訴衷情中朝金國聖皇明有慶賀清平天元運周甲子正是好修行歸真靜體真清氣神靈玄門闡化太上真風接引群生玉爐金鼎虎龍蟠紅焰滿周天溫涼自然水火晝夜轉烹煎精鬱鬱氣綿綿養胎仙功成遷轉寶輦香車捧上瑶天愛河深處好抽頭名利繫人愁回首去遊江上煙鎖一孤舟琴一弄酒三甌樂清幽風鄰月伴醉卧瓊林夢入瀛洲初開江月透雙林隱映素波深風恬湛然瑩淨清夜好知音白醪酒自然斟信時吟無縈無繫豁暢開懷一任浮沉逍遙無繫樂清間信步且隨緣人來問歸何處遙指曲江邊楊柳岸半籠煙乍晴天瀟瀟清夜悄悄無人月滿空船一天清秀一溪雲風月近為鄰琴劔酒棊書畫隨分樂天真竹籬映草堂新靜無塵朝菌不見滿目瓊花間隔靈椿古今多少利名人棄命鬥爭功英豪盡歸何處都總落沉空爭如我洞庭中遣家童金觥輕泛醉卧當軒一枕清風衆生薄福樂聲聞精進謹持功修齋坐禪禮念終久落頑空真實相有無中好家風玄元宗祖太始門開體照圓通英公清列出塵緣不擊利名牽逍遙任居雲水知命樂天然窮妙理悟幽玄謹修仙功成歸去引汝朝元穩步金蓮神仙妙訣古今傳誰會此幽玄龜蛇自然呼吸玄牝氣綿綿鉛中汞汞中鉛兩俱全抽添加減進火功夫煉就胎仙減字木蘭花無情苦海壤壤衆生由貪愛爭似余家寂寞林泉别世華頥真養浩肌肉冰清如玉貌出入無間婥約隨風飄上天深根固蒂天寶流霞光滿濟返照連天冉冉程程玄又玄無生無滅湛湛孤然明皎潔昕散雲寥點破清虛上九霄秋風浩浩極目霞琳澄瑞繞隔岸蘆花隱映煙籠三兩家天真秀鬱謫降寰中光滿室保祐千春朱頂青松延壽同初心奉道謹守精嚴光返照元始扶真真物相生恍惚中凝空落落明月清風相倚託達彼無憂回首煙霞物外遊五行四象戊己攢盈如何樣黑水紅雲白馬青牛兩下分金車寶輦大道夷然烹玉線碾路如銀般載嬰兒出世塵功名富貴致使沉淪空手去改面回頭一失人身永劫休歸純返朴背境滌塵真正覺一顆圓光焕焕煌煌入大方今生不悟指望來生何處去六道交加一步危亡永劫差君還識破塵世般般都打過雲水逍遙穩泛虛舟物外漂浮生苦惱塵世忙忙何日了一旦無常福致他人業自當君還省悟棄捨冤親尋出路萬事都休性命之中子細搜居家學道兩事不成擔閣了欲要修真不染浮華半點塵虛心實腹只此登仙真軌則功滿朝元金闕寥陽化羽仙淫聲美色底死謾生難棄捨艷態嬌妻兒女恩情總送伊除情去欲惜氣存神如珠玉一點精金失了難為復再尋長思仙出家人要求真遍計長空絶點塵明知虛谷神日為鄰月為親天地之中轉法身方知物外人默然澄湛然清晝夜三光性自盈頭頭物物明道無形育神靈透海穿山混杳冥真人出世程恣遨遊玩清秋掩映曹溪細水流瓊花兩岸頭滿浮漚飲忘愁日落星稀月上樓沉沉醉玉洲看清音見浮沉法眼星眸運古今紅輪兩間侵火珠林水真金不比他方去遠尋承當認本心虎龍調坎離交神水涓涓注玉瓢雲濤雪浪漂寶池澆溉靈苗初綻瓊梅翠嫩搖芳菲物外飄道無邊性光圓認得龜蛇兩下纏陰陽合地天汞和鉛氣神全光迸流霞耀晃然方知玄又玄勿行功免勞神清靜無為認本真和光不染塵外其身自然人間向天邊玩日輪雲遊玉洞春聚玄霜浸瓊漿二物調和火裏藏烹煎滿鼎香味非常色清光咽罷還純透體涼醺醺現玉皇既為人勿因循百歲光陰有幾能虛勞染世塵好修真養元神兩耀交光碾玉輪陰精一點純祕精精滿盈盈密扣金關逆上行玄珠顆顆傾內靈靈外明明內外相交一點星飛騰上玉瑛南柯子煉質心猿退焚真意馬疏一靈圓覺頓真如洞達淵玄光鑒照元初坎虎形如玉離龍色似珠雲奔電激貫虛無霹靂峥嶸舞弄戲玄珠大道親之遠玄機退未踈太虛凝秀自如如一派靈源瀲灧貫從初北海鸞渝黑南山鳳染朱翱翔雲外出虛無日月交光奪取夜明珠匹配陰陽理嬰公伴細腰調和鉛汞要終朝水底金精移入火中燒煉就通神劔修成智慧刀降龍伏虎斬邪妖夜吐光芒誰敢語聲高鳳去飛還遠鶴隨翼羽臯石中隱玉蛤珠韜木長沉丁草秀紫芝苗獸變獅麟象蛇渝化海蛟魚分水谷變鯨鰲人道相通雲步越丹霄雨過春將晚風來又早秋百年光景轉頭休富貴榮華渾似水中漚勸汝修身早玄門志意搜勿交塵事擊心頭祕息三田莫遣賊人偷太上玄元祖生居浩劫先首初傳教五千言演正無疑誰曉此幽玄盡喫迷心藥誰餐續命丹邪門曲教自纏綿死墮陰囚永劫鎮黃泉踏破塵勞網衝天志決貞手中持劔轉環睛日耀爭光睒爍瑩天明覺海千尋底靈波萬里傾群魔消散鬼神驚點化純陽永永住蓬瀛欲問修真理君還會得麼鯨鵬出海透星羅夜宿蟾宫飛上桂枝柯吉善靈禽少凶邪怪鵬多一群一隊謾蹉跎荆棘為巢不見鳳凰窠坐看華胥景神遊玩寶方一雙童子抱龍光焕焕煌煌撮聚入中央産出靈仙子功成入帝鄉玉霄榜上應科場奪取仙摽寶洞執圭璋不曉身中寶寧知物外篇不通真教亂狂顛指望蓬萊仰卧摸青天欲識鉛中汞須知汞裏鉛兩般顛倒自如然放出靈飛空外舞胎仙仙鄉子咄這醜形骸臭穢蛆蟲塞滿懷地水火風虛積聚沉埋類我平生惹禍災欲免死生催莫執凡軀作聖胎保煉琅膏凝結處成胚沐浴嬰兒坐寶臺瀟灑古音庭獨坐榰頥看道經玄覽滌除塵事冗安寧一洗機心耳目醒恬惔冷清清一炷名香滿院馨門外不知誰到此璫玎風順微聞玉佩聲獨坐看黃庭始覺身心內外明瑩靜不交塵事惱心澄固養靈源徹底清輕泛雪花烹寰宇空浮瑞氣生雲綻霜天明月照相迎一顆靈砂逆上行一葉舟擺脫塵情寃業此是利名休歇清淨謹威儀宴瑶池水靜澄澄冰潔顯焕碧潭秋月月裏悟丹枝性光輝不覺形軀衰老受盡許多縈惱誰肯死前休苦貪求識破修行早早認取自家珍寶珍寶價無酬永存留道契希夷恍惚辨正其中有物物物自然通盡包容月白風清滿目寶篆玲瓏馥郁寥落遍精空有無中頂笠披莎歸去漸入蘆花深處渌岸纜漁舟釣綸收輕泛壺中一味野鶴孤雲相濟橫管韻清幽樂無愁大道本無一物遍納十方沖塞無外亦無心不容針要見闡開清目認得本元虛谷非淺亦非深滿壺金大道孤然獨立善用本元轍迹寰海好雲遊玩清秋月色扶空澄瑞微現桂紅輕翠嘉景最奇幽賽瀛洲運動一陽初出照破太空微密萬象總潛形炫然明凝化鼎中靈質丹就剎那功畢仙子上雲英玩蓬瀛海底凝珠鮮潔天上瑩然清絶中道太虛寬滚神丹光勝一輪秋月照鑒本無圓缺清爽逼人寒透琅玕照海凝珠光爍貴賤不分彈雀可惜本來珍污泥津認取勿令差錯瑩淨免繁縈縳決正出囂塵玩長春顛倒一陽初起萬化混元同體光燦射瑶宫滿堂紅瞭正圓明開啓上下貫穿無底天地悉皆空太玄中酹江月貪財競色利名牽縈繫何時休歇鎮日忙忙如夢想顛倒心猿馬劣昧地謾天多能已會以巧翻為拙萬般虛假積成宿世冤業勸君省悟回頭攀緣棄捨做箇逍遙客訪道求真尋妙指早願超離生滅不悟玄機剔開毛塞付耳親傳説壺天景色現前秋夜明月幽微精粹混陽光一點殷紅清絶上下融和開慧目躍出心珠凝結闡化靈明神光顯現內外相通徹浮雲消散放開天外心月虛無運轉孤然圓明寂照萬古無纖缺與道同元包象法物物頭頭俱攝遍應諸方無極太始混一無分别古今賢聖盡歸此處休歇玄元道體大無方無隅無形無物濕化胎生皆受氣感應通玄潛伏包括乾坤含容天地日月皆收蓄回光返照曠然攝化盈目分明頓著心珠沖虛豁朗燦燦開神谷養就胎仙肌貌雪出入隨風香馥暮嗅靈芝朝餐仙桂夜隱蟾宫宿怡然歡樂求同先聖真福長江素靜夜瀟瀟天如玉案冰潔秀色氤氲寥象廓極目瑕琳光攝獨坐頥神簾幃光透顯出玲瓏雪凝然澄湛太虛一點通徹神飛兩翼翱翔蟾宫殿裏夜宿瓊枝歇得遇真筌無損益永受真人提挈功行雙全金童玉詔受命寥陽闕玉霄宫裏永排仙位羅列茅庵瀟灑靜無塵獨坐垂簾孤僻鎮日間間清淡泊别有恬然活計握固存真心無雜念忘我兼忘世玉嬰神變自然與道相契光明照耀十方凝空燦燦大闡非為細遍納無極通造化物物頭頭俱濟掌握乾坤完容法體玉貌真清麗超凡出世上朝三暻神帝浮生似夢奈光陰百歲都能幾許富貴榮華時暫過剛甚厮牽厮繫總為兒孫嬌妻女壻生死難為替回頭省也瞥然不染塵翳逍遙物外無拘風鄰月伴便是余生計石上溪邊猿送果酒滿十方吟綴醉卧煙霞今宵還醒意欲歸何致玉霄宫裏月中攀折仙桂一天清翠混陽和微密寂寥無物致靜頥心開上竅通化靈明虛谷育養元神真人出現放曠無拘束皇天道父賜余無限清福天心正法盟威紫虛道德上品三乘籙金簡玄科封慧劔心印清光無欲己病先除心邪攝正百怪皆潛伏不繁法信自然被褐懷玉無形道體運陽光密布通微恢鄂炫惚昏衢烹浩氣沖塞英華盈落瑩日千尋清風萬里顯焕神光爍夷門羽化太玄一派靈廓孤然脫灑無雙於中清淨不許纖塵著養就胎仙神貌雪出入無間婥約紫府遊行瑶宫飲宴賜我逍遙樂金童捧盞妙音引上龍閣初心奉道望功高仙舉超騰碧落歲久年深心反復不覺情迷縈縳伏虎銅繩降龍鐵索繫住踏雲腳難為出路永沉千丈寥壑臨危受苦推誰情無決斷悔恨當初錯意欲修真名利惱酒色財氣俱著家計不成修行退墮至死無撈摸勸君省悟免煩兩下擔閣太玄正教離繁華修整真清真靜清靜之中開道眼舒展銀霞流井溢落精空沖盈法界滿滿收金鼎烹煎日月混純天地齊永寂寥獨立無雙孤然不改萬法心俱省變化飛升朝上帝返入清陽真境不夜長春神仙聚會授命靈童請玉嬰吟送一杯長壽酩酊滿庭芳靜室頥神寧心默運內觀一點真陽洞虛豁朗焕焕透明堂照見虛空法界先天地獨立無雙三光秀圓明實相浩劫應時長回頭誰問己眼前頓著不用思量自然契道物我兩俱忘唯有清風皓月通神化無極之光升玄路混元一氣拍塞遍諸方祖道無修真常妙用悟來表裏相通靈光現處照見杳冥中晃耀清虛浩大無遮障拍塞沖融希夷甫從來面目返本復歸空真空明皎潔唯然曠大難測難窮一天吾道寂湛出凡籠妙化方生正祖通元首返本歸宗超三界移神脫殼物外顯陽蹤太極精微天真鬱秀混元溢目無涯玄珠升降輝耀迸光砂聚入壺中託化歸真正不染囂華回頭省清虛妙體返照秀靈芽汞鉛凝漸結純陽丹就永劫無差一瓢春醖三尺斬妖邪信步縱橫自在龜鶴引深入煙霞逍遙處長春洞裏時復玩仙葩海角天涯尋朋訪友悄無一箇知音鬪爭人我財色利名侵聞説邪淫妄語𢬵身命一向鑽尋真常教余言直勸返報怨還深休休寧奈也澄清默運攝養真心混元一氣升降定浮沉迤邐收歸寶鼎純陽就點鐵成金通玄妙群魔消散方顯鬼神欽迅速韶光俄然過了算來剛甚劬勞紅顔衰朽緑鬢漸踈焦由自爭名競利全不念生死難逃輪回處似環螻蟻來往幾千遭君還心省悟明通周象撥易窮爻地天通泰離坎自相交陰返陽生運化純精粹清氣沖霄胎光現神風綽約飛步玩瓊瑶臘正風交瓊梅初綻水寒冰潔嚴涼雀臨高樹魚入碧潭藏海淨天空浩浩玄珠降睒爍凝祥胎星現清名播世道德自昭彰群仙皆喜聚壇前謹謹祝壽玄陽金虬浚液玉獸旋噴香唯願遐齡滿壽同天地永劫延長升仙處鸞迎鳳引雲步現虛皇獨立星壇高穹仰望志誠修設威儀名香頻爇謹謹奏青詞唯願衆生慕道心通解無執無迷歸真正玄門隱密一志永無移都緣心返復狂圖捏怪紐班胡為色