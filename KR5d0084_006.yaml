front:
  text: 上清太玄集卷之六上六
  hash: sha256:9ff7add2dccd55adeba1a86f086c8829e8619234fce2892500bcc70c7300e6d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0084_HFL_006-001a, image: hfl/0730/0730-166.png}
body:
  text: 姑射侯善淵述七言絶句六十首妙哉心適大方家不逐中流接遠涯醉裏墜車因白酒醒中執履為清茶元精出汩透天飛婥約遊風遜二儀因此脫胎歸未始青童邀我赴丹池幼年何事去擔家子細尋思可歎嗟不是象玄流入鼎至今猶自駕鹽車龍涎鳳燭篆煙馨目照踈林浩氣清一枕寒風驚鶴夢星壇猶叫步虛聲幽關遺照便忘形兩耀交光一處明物我兩忘全體現混成一點太虛精放開眉羽亮天宏杲日靈風耀太清换體不容風火性自知身屬少微星一爐金火發鉛華晃耀乾坤起翠霞內守不交陰鬼盜自然寶鼎結靈砂養就一爐丹鳳髓煉成兩鼎赤龍精放開宇宙通天目混沌初分眼界明更闌獨坐月當秋瑞氣輕浮十二周欲返神霄歸舊路古嵒一帶碧霞收飛鳶妙出勝雲梯采木雕成巧弄機材與不材須自適林中棄彈返遊歸擺脫塵緣已别離男兒一志永無移水雲迷隔三千里非做神仙誓不歸俯仰周回十萬尋醉魂飛入碧天心扶童遠接瑶池口吸盡蟾華一味金幻軀久匿病沉沉换體交光耀寶岑積翠影浮煙浪急火龍飛出碧潭心瞬目扶眉惠日開滿川風景面前來京山劈碎搜神寶露出無瑕玉一堆心居物外自翛然碧海輕浮一葉蓮蓮吐花生凝日笑隨風飄上玉京天佇立昂霄玩物華瑶池兩岸發金花醉魂廓達遊方外悟入玄都象帝家玄元太一妙含宏混內氤氲滿目生唯有二神交兩曜陰靈化作一天星洞觀煙浪碧蒼蒼混海蛟虬戲夜光光灼太無宏日角萬靈咸輳證當陽祥雲密布江天匝吟羽虹霓穿日角怪得香風滿坐來琳宫玉樹花爭發戲珠龍出海門開紫霧騰空遍九垓透入咸池吞日月十方仙子盡驚回高捲珠簾向外觀松風杲日透琅玕七珍聚入琉璃宅晶耀銀霞玉一團遊奕金明混太虛眉山月谷瑞雲浮不通此事得何以空作昂霄一丈夫碧玉嵓前萬樹花天然占得好生涯仙童笑對西來客近日高陽酒味家復返神霄歸舊路玉清宫裏恣徘徊星河澄潔無人識兩朵瓊花一處開開荒種下玉芝苗決破瑶池旋溉澆道氣周流沖碧海靈風遍匝滿清霄日精月髓烹非走地魄天魂煉不雕换質留直長在世九光霞裏任逍遙曲江霧散寥天徹空對紅陽飛片雪金碧流光耀太清寒林自有瓊花結世網塵情已别離玄門訣正更何疑男兒若有衝天志不做神仙待幾時執幻何須訊幻機悟機還是轉生迷傷嗟雲水東遊客枉去荆山空手歸百足夔蛇遞去憐遊風神化亦徒然直須未始先天祖才入吾家第一玄昨夜三更月色鮮涓涓風露瀉清圓琅然一曲誰吟送疑是琳宫醉玉仙渭水終南獨往還因尋列士過潼關市賢野叟不相顧帶雨連雲歸舊山暫離仙島向人間苦海淘淘度化難冒雪披風歸舊隱夜涼携劔過潼關九年功濟效希夷返舍含凝泄玉機昔日昂霄歎不已林間又是喻株拘執幻師文訊幻機更詢楊氏轉成迷鹿分得失知多少似醉乘車四體隳聲咳言鋒敵惠盎恨無主令見梁鴦不家廢業充狙欲荆棘時端待紀昌賢世人鍾笑遠家自知靈廓杳無涯因求火鏡三杯酒味勝盧同七碗茶轍魚久困待西江為我良賔話子陽皆曰得珠安用道幸逢東郭訴衷腸萬疊蒼峯倚翠微一川筠水接江湄昔年授劔歸何處今日含光付與誰瑞激天光耀太清彤庭火灹虎龍精煉成寶鑑通天瑩兩道神光一處明臨風唱和詩千首對月盈杯酒百鍾間卧古嵓忘彼我醉魂飛入廣寒宫古道元分太始先混然三界獨綿綿鯨鵬出海蹤橫去飛到瑶池六月天悔將異伎復追攀祿貴榮門取自難適見主公矜勇力造成一葉與君看鯢鰌淺污儘為基制使𩼊𩸀未可宜但得天風扶羽翼摶扶羊角上瑶池火輪碾破碧琉璃兩道金光迸彩飛因得象玄流入鼎自然遊奕九清微誰念途中困轍魚同流剛笑病肌膚北溟煙浪終須别啓翐圖南過五湖誰見神人貌甚虛吸風飲露雪肌膚暫離姑射煙嵐窟穩駕飛龍上玉都混元何事最幽深寶梵巍巍冠古今因得瓊林飛素羽一輪日赤照天心間與梅張信口吟二公知識結交深有如風月澄今古照破天心十萬尋敲空擊物鬼神驚倚步隨行借力輕待我玉霄登甲地恁時携汝化龍形一爐金火耀天衢露出無瑕照海珠混裏豁然凝玉象煉成仙子妙功夫玉泉湧泛流金井倏忽南丹勳北溟劈碎玄珠迸彩霞玄珠飛上崑崙頂圓明萬梵無中有一派丹陽沖惠口因看瓊林簇簇花二鵝傾下壺天酒混元大漢風吹裂眉宇玉蟾吞海月寶宴天光照五陵丹瑛散盡黃花結携笻信步訪煙蘿爭奈荒岐逆旅多二妾不須知美惡嗟余無惠效韓娥三色氤氲射絳宫朱扉掩映瑣真容冰輪碾破玄岡路運化一天太古風撥物拈花總是虛交人何處用功夫如來昔説威神力試問禪流會得無一上層樓眼界明直疑身世到華清中天不假雲軒力飛入炎宫伴曉星昂霄終日看金烏火府朱陵煉玉爐寶梵蕩形超物表九靈仙子上清都靈眸保煉入彤庭黃氣濤濤蕩穢形俯仰洞虛皆應徹鬱羅霄景耀華清七言全篇芝堂積翠話玄微直指丹經泄玉機海底翻騰紅瑪腦山頭擊碎碧琉璃蟾宫玉兔遊苔徑日殿金烏宿桂枝兩段光明歸一處無英公子上瑶池昔年浪失不還家今日回眸返翠霞金火溢爐殊五彩朱砂滿鼎發三華江邊扯斷烏龍尾嶺畔敲開白虎牙洞鑒五明通大有便乘鶴馭駕雲車洞房深處夜瀟瀟猿馬擒來伴寂寥玉兔趁蟾騰宇角金烏抱日轉天腰龍蟠藥鼎三花聚虎繞丹爐五氣朝煉就靈砂居象外玉京仙府路非遙偶涉長淵暫寄居有如待兔守空株不遭伯樂馳鹽馬似遇莊生困轍魚豈念昔年求罔象唯知今日得玄珠隴西邂逅重相見謹寫衷懷寄子與詹何何事釣綸收𩷧鯉騰波掣斷鈎喜脫淺溪離苦海幸逢長水得優遊甘居草室迎山叟忘却朱門謁貴侯村飲醉歸誰送去牧童扶我倒騎牛嗟余內外不知遊悮入雲山作擊留浪失玄珠須索隱水澄心月絶搜求一條青霧從天降兩道紅霓滚地流既到炎宫分子母旁通七耀大方周寄語松形鶴髮翁好搜玄妙躍凡籠三關氣象沖天白一顆金丹射鼎紅汞結玉陽離水殿鉛凝金氣入炎宫流珠逆上崑崙頂看盡瑶池浩浩風效法非徒得負恩弊邪匿正昧天真倚神託道為生計抱子偎妻闡教門有識蒼生憎上士無知魍魎謗達人莫言天地無分鑒遠在兒孫近在身五言全篇折股因亡馬疵眸為産牛鹿分恂國相蝶夢啓莊周姑射歸神化壺丘返外遊東門為我伴南郭亦吾儔幼歲機投聖中年貌若癡鷗驚忘素質犬吠换緇衣二妾何須訊三神自有期季咸非得相文摯善通醫梟雞誰執幻環舞自圖乖鋭出焚山火矜持措肘柸負乘君子器向示小人才近狀非同智虛勞千尺臺匪輩胡為度良工量可裁易持心淨戒難受日清齋鼎煮連根菜爐燒帶葉柴自驚魚困轍斗水不為災門人情淡泊道院亦瀟踈野菜經年有家糧近日無我聞心已許公見意何如列禦經遊衛何方自適居臨事知間貴澄心覺道尊古師親效破暫借助玄門火石奚矜鋭商丘未適惛三年成一葉由自享天恩訣破上仙機崑山列二儀丹爐神火聚寶鼎夜光輝煉質成金液頥顔化玉霓威神明大有鯤翼到天池得遇真仙訣幽居煉谷神通玄忘彼我達妙絶踈親尹氏幻為僕役夫妄作賔不矜覺與夢象外有長春長嘯笑非肖釣愚不釣魚芒針施剖粒立木譽長途會唱恩須遠知音道不踈俯觀門弟子同志一人無擊瓦踈童稚嘲詩樣寶瓶訊曦知遠近愍物辨生成却幻祛環舞迎君對圈幈煉砂調碧玉换骨赴青城路次驚三布中途畏五漿弊童難相馬鄰子已亡羊匪久圖章戴胡為效紀昌不矜秋水至心適杳無疆大道現三身三身總一真驪龍潛匿水丹鳳起祥雲兩竅傾金液雙關煉玉神惠光飛紫闕灼灼耀天輪劈開無縫塔放出混元精氣布三江靜雲收四海明金蛇遊水府玉兔走炎城煉就堅白性歸休入太清萬鎰施猶寡一毫濟有餘優遊三事美逸樂百年居燕邑無心去華胥有意趨存亡才頓識復忘在須臾隱照透瓊林瑶華散寶岑彤庭金鳳叫月殿玉龍吟煉質凝三氣頥神散九陰象玄如寶鑒常在碧天心五言絶句二首碧眸光落地紅日焰通天五色雲霞內瑶池一葉蓮內外皆為假中間總屬虛指於未悟者何處用功夫七言絶句分明説破真消息天眼沖虛憑慧力上下圓通一物無堂堂露箇恢洪翌玄元至道奚能識寂寂寥寥無縫入叩硬威風拶破天凝空萬點流星出元始虛皇生太古堪宜萬世玄元主域中四大獨為先亘劫流傳天地祖頥神叩道明玄德杳隔煙蘿澄渺默躍出飛仙入大華悠悠永住寥陽國心通妙趣明真格達彼清虛極探賾至道平夷取次遊升玄永作大羅客天地之中如橐籥善通聲色從相約玄中不鼓好清音一派笙篁穿鳳閣玉清聖祖留三甲應上玄玄真妙法運出瓊花降碧霄紅霜片片香風壓精誠制魄升魂圛秀氣清清籠珙璧意逐陽華入翠峯玉嵓極目空山碧擺脫塵寰非久溺混同太始知端的神威氣象匝天心道播陽精明瀝瀝道殺三尸憑慧力靈陽丹點純陰匿俄然不覺內忘形坐致雲宵神宴息內滌精空光玉屑冰清瑩若秋江月絳宫微覺水晶寒寶璨星輝飛片雪太虛一點天光密拍塞沖和無縫入踏破乾坤萬丈顛凝空飛出流星急玉井流泉非即潰鳴琅韻徹青山對瓊波沖透嶽雲中浪打崑崙石粉碎金井玲瓏光日皓雲瑛飛出瑶池島晶簾風捲透清香天瑩無塵傳六寶斡開法眼眉毛睫睛粲瞳矇傾暐曄匝地威風出四維迎天萬派靈光攝元始生居浩劫先開明三境立重玄生天生地從伊變劫壞長存尚儼然道化三宫極妙玄混元神帝暗相傳胎光運入靈陽體六洞飛精出九天笻杖斡開圓覺海戒刀劈碎玉京山龍宫捧出玄珠燦窈窕流光天地間規質琳琅逆上巔靈烏降落海鰲邊形移影轉隨風去物换星流浪接天神劔磨開顛馬怕慧刀揮處耍猿驚乾坤迥絶羣魔首一派威光世界傾夜擲琅琊入海雄豁開水府見龍宫衆奼捧出明珠獻焰灼雲霄碧漢中戒壇寶獸旋噴香環珮鳴琅和玉璫真聖降臨還本位復携神劔上魁罡勸汝心存道德鄉余聞仙院立科場神霄有榜傳金籙紫府無人奏玉章御易龍遊赤帝鄉羅元仙子坐華陽兩條地氣橫牛斗一道天光鎮碧蒼絳宫才覺篆煙香風順微聞玉珮璫清夜不知誰奏表真人壇上步元罡修行須得谷神靈一點圓明照上清湛湛霜天興古月澄澄覺海浸流星一顆靈砂耀太清混然虛谷見無形圓通法界千真瑩煙照乾坤萬象明古道平夷可進程兩條岐路接天庭乘龍姹女遊金闕跨虎嬰兒玩玉京踏破崑崙撞透天返余至道復歸元虎騰山嶽蒼峯轉龍躍深淵海浪翻闡開慧目見神光一派純陰盡化陽渾似日頭興世界有如明月遍諸方拂靄神遊宴碧鄉二輪交併碾天罡龍飛日殿烹金液鳳熾蟾宫飲玉漿屏絶塵緣物外尋昂簪笑傲樂情吟移神步步隨風去送我輕肌上寶岑道降氤氲景色嘉始生天地妙無涯飛精神秀沖霄頂抱日臨空易太華避風偎日眼慵開內匹陰陽育聖胚始信男兒身有孕自然物外舞仙胎配將天地作丹爐日月團團裏面居海底煉成真至寶蒼頭烹就混元珠斬猿調馬化龍駒駝我隨風入太虛一點流星飛月殿兩條紅焰上天吳襲夷從覺飲真風異出人間事不同欲問先生何所止穩騎鶴背翼鰲宫坐間雲霧鎖寒溪霹靂峥嶸聒太微銀浪萬條傾碧澗瓊波一𣲖瀉瑶池日魂月魄放寒暉二物擒來在坎離海底忽聞龍虎吼山頭驚見鳳鸞飛姑射層巒影翠浮洞中神化雪肌膚遊乎四海憑何力鶴馭乘飊出玉都放開玉兔趁靈烏趕上夷門入太初萬道金光輝宇宙千條銀霧照虛無一真須得煉三竒復用三奇合二儀若把二儀同一體金丹自是透天飛美目淨兮觀天象聰聰耳聽步虛聲大哉可道隨方有至妙真常混日凝炎爐注鼎煉紅砂三色氤氲放彩霞寶璨玲瓏飛宇宙混元丹降入中華身如稿木性如灰默默澄虛養聖胎坐尚琳宫來問道昂簪高笑桂花開蒙眉俊目躍心珠降落金盤五綵舒內遣玉童收日海與吾同赴洞天居鉛汞配時憑日月鼎爐安處用乾坤三陽真火燒靈質一粒金丹逆上奔咫尺無情苦海深意隨流浪入波心天真一失迷千劫亘古循還直至今升玄知覺道幽深廓徹靈源匿幻心倏忽諸方遊曆遍善能涉古始知今驚回一覺悟仙鄉始信神凝惠日光赤子爐中傾玉液胎仙鼎裏混瓊漿至道幽深極妙玄上清真教豈虛言君還若有男兒志盡把天機付耳傳盡説修丹未説丹金丹咫尺太虛間一丸赫赫明寰宇日用如同隔萬山俯察坤柔見地寧仰觀乾道眩天清浮沉定位中間顯混合虛空日月明內滌心猿育性珠外除意馬煉昏衢靈光透入金烏窟混合圓明體太虛輕敲玉鎖洞門開兩奕神風透户來有意抱鸞飛月殿無陰樹下恣徘徊四般有漏終歸假一性圓明未足真直待玉霄名列位恁時方表出家人雲瑛飛盡曉霜天清夜無塵月正圓坐致琳宫將欲近九光霞裏捧金仙坎離相匹俗塵局日月交光透體明水火煉成無漏子寶瓶捧出玉華嬰雨滴金晶透玉窗華陽仙子入中皇少微星落清江底鶴壓林梢雪點霜水潔無魚浪接天玄靈飛去入精淵華陽不逐紅塵去自有神風合太玄上清太玄集卷之六
